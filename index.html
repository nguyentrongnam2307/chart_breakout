<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 Chart — EMA50</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f5f2; --surface: #ffffff; --border: #e0ddd8; --border-dark: #c8c4bc;
  --ink: #1c1a18; --ink-2: #3d3a36; --muted: #000000; --faint: #000000;
  --red: #c0392b; --red-lt: #fdf1f0; --blue: #2c4a7c; --blue-lt: #f0f3f8;
  --green: #1a7a52; --green-lt: #edf7f2;
  --sh: 0 2px 12px rgba(28,26,24,.07); --sh-md: 0 6px 28px rgba(28,26,24,.10);
}
body { background: var(--bg); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 14px; line-height: 1.7; -webkit-font-smoothing: antialiased; }

/* ── NAV ── */
.topnav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 52px; display: flex; align-items: center; justify-content: space-between; gap: 1rem; overflow: visible; }
.nav-brand { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
.nav-mark { width: 28px; height: 28px; border: 1.5px solid var(--border-dark); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.58rem; font-weight: 700; letter-spacing: 0.5px; color: var(--muted); flex-shrink: 0; }
.nav-title { font-family: 'Noto Serif JP', serif; font-size: 0.88rem; font-weight: 700; color: var(--ink); letter-spacing: 0.5px; }
.nav-right { display: flex; gap: 1.5rem; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.5px; align-items: center; }
.nav-tags { display: flex; gap: 1.5rem; }
#nav-auth button { background: transparent; border: 1px solid var(--border-dark); border-radius: 4px; color: var(--ink-2); font-size: 0.72rem; font-weight: 700; padding: 0.3rem 0.9rem; cursor: pointer; transition: background .15s; white-space: nowrap; font-family: 'Noto Sans JP', sans-serif; }
#nav-auth button:hover { background: var(--bg); }
.nav-user { display: flex; align-items: center; gap: 0.5rem; font-size: 0.7rem; color: var(--muted); cursor: pointer; position: relative; padding: 0.3rem 0.5rem; border-radius: 4px; transition: background .15s; flex-shrink: 0; }
.nav-user:hover { background: var(--bg); }
.nav-avatar { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border-dark); object-fit: cover; }
.nav-user-name { font-size: 0.72rem; font-weight: 600; color: var(--ink-2); max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: var(--surface); border: 1px solid var(--border-dark); border-radius: 6px; box-shadow: var(--sh-md); min-width: 140px; z-index: 999; overflow: hidden; display: none; }
.nav-dropdown.open { display: block; }
.nav-dropdown-item { display: block; width: 100%; text-align: left; padding: 0.55rem 1rem; font-size: 0.72rem; font-weight: 600; color: var(--red); background: transparent; border: none; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: background .12s; }
.nav-dropdown-item:hover { background: var(--red-lt); }

/* ── PAGE ── */
.page { max-width: 1080px; margin: 0 auto; padding: 1.5rem 2rem 5rem; }


/* ── SECTION ── */
.sec { margin-bottom: 1.2rem; }
.sec-head { display: flex; align-items: center; gap: 1rem; margin-bottom: 0; cursor: pointer; user-select: none; padding: 0.55rem 0; }
.sec-head:hover .sec-title { color: var(--ink-2); }
.sec-num { font-family: 'Noto Serif JP', serif; font-size: 0.7rem; color: var(--faint); font-style: italic; min-width: 20px; }
.sec-title { font-size: 0.62rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-weight: 500; }
.sec-line { flex: 1; height: 1px; background: var(--border); }
.sec-chevron { font-size: 0.55rem; color: var(--faint); transition: transform .25s; margin-left: 0.3rem; flex-shrink: 0; }
.sec-head.open .sec-chevron { transform: rotate(180deg); }
.sec-body { overflow: hidden; transition: max-height .3s ease, opacity .25s ease, margin-top .25s; opacity: 1; margin-top: 1.4rem; }
.sec-body.collapsed { max-height: 0 !important; opacity: 0; margin-top: 0; }

/* ── RULES ── */
.rules-grid { display: grid; grid-template-columns: repeat(3, 1fr); border: 1px solid var(--border); }
.rule { padding: 1.4rem 1.5rem; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--surface); transition: background .15s; position: relative; }
.rule:hover { background: #faf9f7; }
.rule:nth-child(3n) { border-right: none; }
.rule:nth-child(4), .rule:nth-child(5), .rule:nth-child(6) { border-bottom: none; }
.rule-id { font-size: 0.58rem; letter-spacing: 2px; color: var(--faint); text-transform: uppercase; margin-bottom: 0.55rem; }
.rule strong { display: block; font-size: 0.85rem; font-weight: 700; color: var(--ink); margin-bottom: 0.3rem; line-height: 1.3; }
.rule p { font-size: 0.75rem; color: var(--muted); line-height: 1.55; }
.rule::before { content: ''; position: absolute; left: 0; top: 0; width: 2px; height: 0; background: var(--red); transition: height .2s; }
.rule:hover::before { height: 100%; }

/* ── CASE CARDS ── */
.cases-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.4rem; }
.case-card { background: var(--surface); border: 1px solid var(--border); box-shadow: var(--sh); display: flex; flex-direction: column; position: relative; overflow: hidden; transition: box-shadow .25s, border-color .25s, transform .2s; }
.case-card:hover { box-shadow: var(--sh-md); border-color: var(--border-dark); transform: translateY(-4px); }
.wm { position: absolute; right: -0.5rem; bottom: 3.5rem; font-family: 'Noto Serif JP', serif; font-size: 9rem; font-weight: 700; line-height: 1; pointer-events: none; user-select: none; z-index: 0; }
.c1 .wm { color: rgba(44,74,124,0.05); } .c2 .wm { color: rgba(28,26,24,0.04); } .c3 .wm { color: rgba(192,57,43,0.05); }
.case-bar { height: 3px; }
.c1 .case-bar { background: var(--blue); } .c2 .case-bar { background: var(--ink-2); } .c3 .case-bar { background: var(--red); }
.card-body { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; }
.case-head { padding: 1.5rem 1.6rem 1.1rem; }
.case-tag { font-size: 0.58rem; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 700; margin-bottom: 0.7rem; display: flex; align-items: center; gap: 0.5rem; }
.c1 .case-tag { color: var(--blue); } .c2 .case-tag { color: var(--ink-2); } .c3 .case-tag { color: var(--red); }
.case-tag::after { content:''; flex:1; height:1px; opacity:0.18; }
.c1 .case-tag::after { background: var(--blue); } .c2 .case-tag::after { background: var(--ink-2); } .c3 .case-tag::after { background: var(--red); }
.case-title { font-family: 'Noto Serif JP', serif; font-size: 1.15rem; font-weight: 700; line-height: 1.3; color: var(--ink); margin-bottom: 0.45rem; }
.case-desc { font-size: 0.73rem; color: var(--muted); line-height: 1.6; }
.tl { padding: 0.6rem 1.6rem 0.4rem; flex: 1; display: flex; flex-direction: column; }
.tl-step { display: flex; min-height: 52px; }
.tl-left { display: flex; flex-direction: column; align-items: center; width: 28px; flex-shrink: 0; padding-top: 2px; }
.tl-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--border-dark); background: var(--surface); flex-shrink: 0; z-index: 1; transition: border-color .2s, background .2s; }
.case-card:hover .tl-dot { border-color: var(--muted); }
.c1 .tl-dot.lit { border-color: var(--blue); background: var(--blue); }
.c2 .tl-dot.lit { border-color: var(--ink-2); background: var(--ink-2); }
.c3 .tl-dot.lit { border-color: var(--red); background: var(--red); }
.tl-line { width: 1px; flex: 1; background: var(--border); margin: 3px 0; }
.tl-content { padding: 0 0 1rem 0.9rem; flex: 1; }
.tl-lbl { font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; color: var(--faint); font-weight: 500; margin-bottom: 0.28rem; }
.tl-val { font-size: 0.78rem; color: var(--ink-2); line-height: 1.5; }
.chips-sm { display: flex; flex-wrap: wrap; gap: 0.22rem; margin-top: 0.25rem; }
.chip-sm { padding: 0.1rem 0.5rem; font-size: 0.65rem; font-weight: 700; border: 1px solid var(--border-dark); background: var(--bg); color: var(--ink-2); border-radius: 3px; }
.chip-sm.bl { border-color: #a8bad8; background: var(--blue-lt); color: var(--blue); }
.chip-sm.rd { border-color: #e8a09a; background: var(--red-lt); color: var(--red); }
.choch-tag { display: inline-flex; align-items: center; gap: 5px; padding: 0.18rem 0.65rem; font-size: 0.7rem; font-weight: 700; border-radius: 3px; margin-top: 0.25rem; }
.c1 .choch-tag { background: var(--blue-lt); color: var(--blue); border: 1px solid #a8bad8; }
.c2 .choch-tag { background: #f4f3f0; color: var(--ink-2); border: 1px solid var(--border-dark); }
.c3 .choch-tag { background: var(--red-lt); color: var(--red); border: 1px solid #e8a09a; }
.sig-dot { width: 5px; height: 5px; border-radius: 50%; animation: blink 2s ease-in-out infinite; flex-shrink: 0; }
.c1 .sig-dot { background: var(--blue); } .c2 .sig-dot { background: var(--ink-2); } .c3 .sig-dot { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.note-box { margin-top: 0.4rem; padding: 0.45rem 0.7rem; font-size: 0.67rem; border-radius: 3px; line-height: 1.5; font-style: italic; }
.c1 .note-box { background: var(--blue-lt); color: var(--blue); border-left: 2px solid var(--blue); }
.c3 .note-box { background: var(--red-lt); color: var(--red); border-left: 2px solid var(--red); }
.case-foot { padding: 0.9rem 1.6rem; border-top: 1px solid var(--border); font-size: 0.73rem; font-weight: 700; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
.c1 .case-foot { color: var(--blue); background: var(--blue-lt); }
.c2 .case-foot { color: var(--ink-2); background: #f4f3f0; }
.c3 .case-foot { color: var(--red); background: var(--red-lt); }

/* ── COMPARE ── */
.compare-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
.cmp { background: var(--surface); padding: 1.8rem; display: flex; flex-direction: column; gap: 1rem; }
.cmp-top { display: flex; align-items: baseline; justify-content: space-between; }
.cmp-pct { font-family: 'Noto Serif JP', serif; font-size: 2.8rem; font-weight: 700; letter-spacing: -2px; line-height: 1; }
.c1-txt { color: var(--blue); } .c2-txt { color: var(--ink-2); } .c3-txt { color: var(--red); }
.cmp-case { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--faint); }
.cmp-name { font-size: 0.85rem; font-weight: 700; color: var(--ink); line-height: 1.3; }
.cmp-sub { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }
.cmp-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.cmp-fill { height: 100%; border-radius: 2px; }

/* ── TRADE HISTORY ── */
.kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 1.2rem; }
.kpi-card { background: var(--surface); padding: 1.1rem 0.8rem; text-align: center; }
.kpi-val { font-family: 'Noto Serif JP', serif; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; margin-bottom: 0.25rem; color: var(--ink); }
.kpi-label { font-size: 0.55rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--faint); }
.kpi-green .kpi-val { color: var(--green); }
.kpi-red .kpi-val { color: var(--red); }

.th-toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
.upload-zone { flex: 1; min-width: 200px; border: 1.5px dashed var(--border-dark); border-radius: 6px; background: var(--surface); padding: 1rem 1.4rem; display: flex; align-items: center; gap: 0.8rem; cursor: pointer; transition: border-color .15s, background .15s; position: relative; overflow: hidden; }
.upload-zone:hover { border-color: var(--blue); background: var(--blue-lt); }
.upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-icon { font-size: 1.3rem; flex-shrink: 0; pointer-events: none; }
.upload-text { pointer-events: none; }
.upload-text strong { display: block; font-size: 0.8rem; color: var(--ink); }
.upload-text span { font-size: 0.7rem; color: var(--muted); }
.filter-tabs { display: flex; gap: 0.3rem; flex-wrap: wrap; }
.ftab { padding: 0.3rem 0.9rem; font-size: 0.68rem; font-weight: 700; border-radius: 3px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all .15s; letter-spacing: 0.5px; font-family: 'Noto Sans JP', sans-serif; }
.ftab.active, .ftab:hover { border-color: var(--ink-2); color: var(--ink); background: var(--bg); }
.ftab.f1.active { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
.ftab.f2.active { border-color: var(--ink-2); color: var(--ink-2); background: #f4f3f0; }
.ftab.f3.active { border-color: var(--red); color: var(--red); background: var(--red-lt); }
.ftab.f4.active { border-color: var(--green); color: var(--green); background: var(--green-lt); }

.tbl-wrap { border: 1px solid var(--border); background: var(--surface); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 720px; }
thead th { padding: 0.8rem 1rem; text-align: left; font-size: 0.57rem; letter-spacing: 2px; text-transform: uppercase; color: var(--faint); font-weight: 500; background: #faf9f7; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.79rem; vertical-align: middle; color: var(--ink); line-height: 1.5; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #faf9f7; }
.td-tag { display: inline-block; padding: 0.15rem 0.55rem; font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; border-radius: 3px; }
.td-buy { background: var(--blue-lt); color: var(--blue); border: 1px solid #a8bad8; }
.td-sell { background: var(--red-lt); color: var(--red); border: 1px solid #e8a09a; }
.td-case { display: inline-block; padding: 0.12rem 0.45rem; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.8px; border-radius: 3px; }
.td-case.tc1 { background: var(--blue-lt); color: var(--blue); border: 1px solid #a8bad8; }
.td-case.tc2 { background: #f4f3f0; color: var(--ink-2); border: 1px solid var(--border-dark); }
.td-case.tc3 { background: var(--red-lt); color: var(--red); border: 1px solid #e8a09a; }
.profit-pos { color: var(--green); font-weight: 700; }
.profit-neg { color: var(--red); font-weight: 700; }
.del-btn { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--faint); font-size: 0.65rem; padding: 0.18rem 0.45rem; cursor: pointer; transition: all .15s; font-family: 'Noto Sans JP', sans-serif; }
.del-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-lt); }

.empty-state { text-align: center; padding: 3rem 2rem; border: 1px solid var(--border); background: var(--surface); }
.empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; opacity: 0.4; }
.empty-title { font-size: 0.85rem; font-weight: 700; color: var(--ink-2); margin-bottom: 0.3rem; }
.empty-sub { font-size: 0.75rem; color: var(--muted); }

/* ── MODAL ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); max-width: 480px; width: 100%; box-shadow: var(--sh-md); border-radius: 4px; }
.modal-head { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 1.6rem; border-bottom: 1px solid var(--border); }
.modal-head h3 { font-size: 0.85rem; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--faint); font-size: 1.2rem; cursor: pointer; padding: 0 0.2rem; font-family: 'Noto Sans JP', sans-serif; }
.modal-close:hover { color: var(--ink); }
.modal-body { padding: 1.4rem 1.6rem; }
.parsed-preview { background: var(--bg); border: 1px solid var(--border); padding: 0.8rem 1rem; border-radius: 3px; font-size: 0.78rem; color: var(--ink-2); margin-bottom: 1.2rem; line-height: 1.8; }
.form-row { margin-bottom: 1rem; }
.form-label { display: block; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--faint); margin-bottom: 0.4rem; }
.form-input, .form-select { width: 100%; border: 1px solid var(--border); background: var(--surface); padding: 0.55rem 0.8rem; font-size: 0.82rem; color: var(--ink); border-radius: 3px; font-family: 'Noto Sans JP', sans-serif; transition: border-color .15s, box-shadow .15s; }
.form-input:focus, .form-select:focus { outline: none; border-color: var(--blue); background: var(--surface); box-shadow: 0 0 0 3px rgba(44,74,124,0.12); }
.modal-foot { padding: 1rem 1.6rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 0.6rem; }
.btn { padding: 0.55rem 1.2rem; font-size: 0.78rem; font-weight: 700; border-radius: 3px; cursor: pointer; transition: all .15s; border: 1px solid transparent; font-family: 'Noto Sans JP', sans-serif; }
.btn-secondary { background: var(--bg); border-color: var(--border-dark); color: var(--ink-2); }
.btn-secondary:hover { border-color: var(--ink); }
.btn-primary { background: var(--ink); color: #fff; }
.btn-primary:hover { background: var(--ink-2); }

/* ── MODAL RULES ── */
.modal { max-width: 540px !important; }
.modal-body { max-height: 78vh; overflow-y: auto; }
.rule-section-title { font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; color: var(--faint); font-weight: 600; margin-bottom: 0.55rem; padding-bottom: 0.35rem; border-bottom: 1px solid var(--border); display: block; }
.rule-row { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; margin-bottom: 0.45rem; }
.rule-row span { font-size: 0.75rem; color: var(--ink-2); flex: 1; }
.rule-row .rsel { flex: 0 0 auto; width: 165px; border: 1px solid var(--border); background: var(--bg); padding: 0.3rem 0.6rem; font-size: 0.75rem; color: var(--ink); border-radius: 3px; font-family: 'Noto Sans JP', sans-serif; }
.tf-checks { display: flex; gap: 0.55rem; flex-wrap: wrap; margin-top: 0.3rem; }
.tf-check { display: flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; color: var(--ink-2); cursor: pointer; }
.tf-check input { cursor: pointer; accent-color: var(--red); }
.rule-fields { display: none; }
.rule-fields.active { display: block; }
/* ── WL MODE BAR ── */
.wl-mode-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; flex-wrap: wrap; gap: 0.5rem; }
.wl-mode-tabs { display: flex; gap: 0.3rem; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 3px; }
.wl-mtab { padding: 0.3rem 1rem; font-size: 0.7rem; font-weight: 700; border-radius: 3px; border: none; cursor: pointer; background: transparent; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; transition: all .15s; }
.wl-mtab.active { background: var(--ink); color: #fff; }
/* ── WL VIEW FILTERS ── */
.wl-view-filters { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.2rem; padding: 0.8rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; }
.wl-filter-group { display: flex; align-items: center; gap: 0.5rem; }
.wl-filter-label { font-size: 0.58rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--faint); font-weight: 600; white-space: nowrap; }
.wl-filter-btns { display: flex; gap: 0.25rem; }
.wl-fbtn { padding: 0.28rem 0.85rem; font-size: 0.67rem; font-weight: 700; border-radius: 4px; border: 1.5px solid var(--border-dark); background: var(--bg); color: var(--muted); cursor: pointer; transition: all .15s; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; }
.wl-fbtn:hover { border-color: var(--ink-2); color: var(--ink-2); background: #ebe8e2; }
/* Default active — "Tất cả" buttons */
.wl-fbtn.active { border-color: var(--ink); background: var(--ink); color: #fff; box-shadow: 0 2px 6px rgba(28,26,24,.22); }
/* Bias buttons active */
#vf-bias .wl-fbtn[data-val="up"].active, #vf-bias-h1 .wl-fbtn[data-val="up"].active  { border-color: var(--blue); background: var(--blue); color: #fff; box-shadow: 0 2px 6px rgba(44,74,124,.30); }
#vf-bias .wl-fbtn[data-val="dn"].active, #vf-bias-h1 .wl-fbtn[data-val="dn"].active  { border-color: var(--red);  background: var(--red);  color: #fff; box-shadow: 0 2px 6px rgba(192,57,43,.30); }

/* ── WL PAIR CARDS ── */
.wl-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.7rem; }
.wl-pair-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 0.75rem 0.9rem; cursor: pointer; transition: border-color .15s, box-shadow .15s, background .15s; min-width: 0; }

.wl-pc-symbol { font-size: 0.8rem; font-weight: 700; color: var(--ink); margin-bottom: 0.45rem; display: flex; justify-content: space-between; align-items: center; }

.wl-c-label { font-size: 0.52rem; font-weight: 700; letter-spacing: 0.5px; padding: 1px 4px; border-radius: 2px; background: var(--ink); color: #fff; flex-shrink: 0; white-space: nowrap; }

@media (max-width: 600px) {

  .wl-badge { font-size: 0.55rem; padding: 1px 4px; }

  .wl-pc-note { font-size: 0.5rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

}

/* Separator between HTF context and entry rows */
.wl-pc-row.hl-separator { height: 1px; background: var(--border); margin: 3px 0; padding: 0; }

/* TF group header */

#toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--ink); color: #fff; padding: 0.6rem 1.2rem; border-radius: 4px; font-size: 0.78rem; font-weight: 500; opacity: 0; transition: all .3s; z-index: 200; white-space: nowrap; pointer-events: none; }

/* ── CONFETTI CANVAS ── */

/* ── HOURGLASS SPIN ── */
@keyframes hg-flip {
  0%   { transform: rotate(0deg);   }
  40%  { transform: rotate(0deg);   }
  50%  { transform: rotate(180deg); }
  90%  { transform: rotate(180deg); }
  100% { transform: rotate(360deg); }
}

/* ── WATCHLIST ── */

.wl-badge.b-wait-dn  { background: #fdf5f4; color: var(--red);  border: 1px solid #e8a09a; opacity: 0.82; }

// ── FIRESTORE ─────────────────────────────────────
async function loadTrades() {
  if (!currentUser) return;
  try {
    const col  = collection(db, 'trades', currentUser.uid, 'entries');
    const snap = await getDocs(query(col, orderBy('openTime','desc')));
    allTrades  = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTable(allTrades);
    updateKPI(allTrades);
  } catch(e) { showToast('Lỗi tải dữ liệu: ' + e.message); }
}

window.deleteTrade = async (id) => {
  if (!confirm(window.t('js.confirm.delete'))) return;
  await deleteDoc(doc(db, 'trades', currentUser.uid, 'entries', id));
  allTrades = allTrades.filter(t => t.id !== id);
  renderTable(currentFilter === 'all' ? allTrades : allTrades.filter(t => t.case === currentFilter));
  updateKPI(allTrades);
  showToast(window.t('js.toast.deleted'));
};

// ── MT5 PARSER ────────────────────────────────────
window.handleUpload = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const raw    = ev.target.result;
    const parsed = parseMT5(raw);
    if (!parsed.length) { showToast(window.t('js.toast.noparse')); return; }
    // Filter already saved (by posId)
    const savedIds = new Set(allTrades.map(t => t.posId));
    const fresh = parsed.filter(t => !savedIds.has(t.posId));
    if (!fresh.length) { showToast(window.t('js.toast.alldone')); return; }
    pendingTrades = fresh;
    pendingIdx = 0;
    openNextModal();
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
};

function parseMT5(html) {
  // Strip UTF-16 BOM
  const clean = html.replace(/^\uFEFF/, '');
  const parser = new DOMParser();
  const doc    = parser.parseFromString(clean, 'text/html');
  const rows   = Array.from(doc.querySelectorAll('tr'));
  const trades = [];
  let inPos    = false;

  for (const row of rows) {
    const th = row.querySelector('th div, th b');
    if (th) {
      const txt = th.textContent.trim();
      if (txt === 'Positions') { inPos = true; continue; }
      if (txt === 'Orders' || txt === 'Deals') { inPos = false; }
    }
    if (!inPos) continue;

    // Visible tds only (skip hidden)
    const tds = Array.from(row.querySelectorAll('td:not(.hidden)'));
    if (tds.length < 12) continue;

    const timeText = tds[0]?.textContent.trim();
    if (!timeText.match(/\d{4}\.\d{2}\.\d{2}/)) continue;
    if (tds[0]?.querySelector('b')) continue; // summary bold row

    const typeText = tds[3]?.textContent.trim().toLowerCase();
    if (!typeText.match(/^(buy|sell)$/)) continue;

    const t = {
      openTime:   tds[0]?.textContent.trim(),
      posId:      tds[1]?.textContent.trim(),
      symbol:     tds[2]?.textContent.trim(),
      type:       typeText,
      volume:     tds[4]?.textContent.trim(),
      openPrice:  tds[5]?.textContent.trim(),
      sl:         tds[6]?.textContent.trim(),
      tp:         tds[7]?.textContent.trim(),
      closeTime:  tds[8]?.textContent.trim(),
      closePrice: tds[9]?.textContent.trim(),
      commission: tds[10]?.textContent.trim() || '0',
      swap:       tds[11]?.textContent.trim() || '0',
      profit:     tds[12]?.textContent.trim() || '0',
    };
    if (t.symbol && t.openPrice && t.posId) trades.push(t);
  }
  return trades;
}

// ── MODAL ─────────────────────────────────────────
function openNextModal() {
  if (pendingIdx >= pendingTrades.length) {
    loadTrades();
    showToast(`Đã lưu ${pendingTrades.filter((_,i)=>i<pendingIdx).length} lệnh ✓`);
    pendingTrades = [];
    return;
  }
  const t = pendingTrades[pendingIdx];
  const profit = parseFloat(t.profit) || 0;
  const pHtml  = profit >= 0
    ? `<span style="color:var(--green);font-weight:700">+$${profit.toFixed(2)}</span>`
    : `<span style="color:var(--red);font-weight:700">−$${Math.abs(profit).toFixed(2)}</span>`;

  document.getElementById('parsed-preview').innerHTML = `
    <strong>${t.symbol}</strong> &nbsp;·&nbsp; ${t.type.toUpperCase()} &nbsp;·&nbsp; ${t.volume} lot<br>
    Open: <strong>${t.openPrice}</strong> &nbsp;→&nbsp; Close: <strong>${t.closePrice}</strong><br>
    ${t.openTime} → ${t.closeTime}<br>
    SL: ${t.sl||'—'} &nbsp;|&nbsp; TP: ${t.tp||'—'} &nbsp;|&nbsp; Comm: ${t.commission}<br>
    Profit: ${pHtml}
    ${pendingTrades.length > 1 ? `<br><span style="color:var(--faint);font-size:0.68rem">Lệnh ${pendingIdx+1} / ${pendingTrades.length}</span>` : ''}
  `;
  document.getElementById('modal-case').value = '';
  document.getElementById('modal-note').value  = '';
  document.getElementById('case-modal').classList.add('open');
}

window.skipTrade = () => {
  document.getElementById('case-modal').classList.remove('open');
  pendingIdx++;
  setTimeout(openNextModal, 200);
};

window.closeModal = window.skipTrade;

window.onCaseChange = (val) => {
  ['1','2','3','4'].forEach(n => {
    const el = document.getElementById('rules-'+n);
    if (el) el.classList.toggle('active', val === n);
  });
};

function getRuleData(caseNum) {
  const checks = (ids) => ids.filter(id => {
    const el = document.getElementById(id);
    return el && el.checked;
  }).map(id => document.getElementById(id).value);
  const val = (id) => { const el = document.getElementById(id); return el ? el.value : ''; };

  if (caseNum === '1') return {
    h4Bias:     val('r1-h4'),
    h1Break:    val('r1-h1break'),
    pullbackTF: checks(['r1-pb-m30','r1-pb-m15','r1-pb-m5']).join(', ') || '—',
    chochTF:    checks(['r1-cf-m30','r1-cf-m15','r1-cf-m5']).join(', ') || '—',
    entryTF:    'M1',
  };
  if (caseNum === '2') return {
    h4Bias:    val('r2-h4'),
    h1Bias:    val('r2-h1'),
    pullbackM5: val('r2-pb'),
    chochM5:   val('r2-choch'),
    entryTF:   'M5',
  };
  if (caseNum === '3') return {
    h4Bias:    val('r3-h4'),
    h1Bias:    val('r3-h1'),
    hoituTF:   checks(['r3-ht-h1','r3-ht-m30','r3-ht-m15','r3-ht-m5']).join(', ') || '—',
    chochM1:   val('r3-choch'),
    entryTF:   'M1',
  };
  if (caseNum === '4') return {
    h4Bias:    val('r4-h4'),
    h1Bias:    val('r4-h1'),
    hoituTF:   checks(['r4-ht-h1','r4-ht-m30','r4-ht-m15','r4-ht-m5']).join(', ') || '—',
    chochM1:   val('r4-choch'),
    entryTF:   'M1',
  };
  return {};
}

window.confirmSave = async () => {
  const caseNum = document.getElementById('modal-case').value;
  const note    = document.getElementById('modal-note').value.trim();
  if (!caseNum) { showToast('Vui lòng chọn Case trước khi lưu'); return; }

  const rules = getRuleData(caseNum);
  const t = { ...pendingTrades[pendingIdx], case: caseNum, note, rules, savedAt: new Date().toISOString() };
  try {
    await addDoc(collection(db, 'trades', currentUser.uid, 'entries'), t);
    document.getElementById('case-modal').classList.remove('open');
    pendingIdx++;
    setTimeout(openNextModal, 300);
  } catch(e) { showToast('Lỗi lưu: ' + e.message); }
};

function renderRulesRow(t, colspan) {
  if (!t.rules && !t.note) return '';
  const r = t.rules || {};
  const pairs = Object.entries(r).map(([k,v]) => {
    const labels = { h4Bias:'H4', h1Break:'H1 Break', h1Bias:'H1', pullbackTF:'Pullback', pullbackM5:'Pullback M5', chochTF:'CHOCH TF', chochM5:'CHOCH M5', chochM1:'CHOCH M1', hoituTF:'Hội tụ', entryTF:'Entry' };
    return `<span style="margin-right:0.8rem;white-space:nowrap"><span style="color:var(--faint)">${labels[k]||k}:</span> <strong>${v||'—'}</strong></span>`;
  }).join('');
  const noteHtml = t.note ? `<span style="margin-left:0.6rem;color:var(--muted)">📝 ${t.note}</span>` : '';
  return `<tr><td colspan="${colspan}" style="padding:0 1rem 0.65rem 2.5rem;font-size:0.7rem;border-bottom:1px solid var(--border);line-height:2">${pairs}${noteHtml}</td></tr>`;
}

function renderTable(trades) {
  const empty = document.getElementById('trade-empty');
  const table = document.getElementById('trade-table');
  const tbody = document.getElementById('trade-tbody');

  if (!trades.length) {
    empty.style.display = 'block';
    table.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  table.style.display = 'table';

  const caseLabel = { '1':'TH 01', '2':'TH 02', '3':'TH 03 ★' };
  tbody.innerHTML = trades.map(t => {
    const p     = parseFloat(t.profit) || 0;
    const pCls  = p >= 0 ? 'profit-pos' : 'profit-neg';
    const pStr  = p >= 0 ? `+$${p.toFixed(2)}` : `−$${Math.abs(p).toFixed(2)}`;
    const tCls  = t.type === 'buy' ? 'td-buy' : 'td-sell';
    const ccls  = `tc${t.case}`;
    return `<tr>
      <td><strong>${t.symbol}</strong></td>
      <td><span class="td-tag ${tCls}">${t.type.toUpperCase()}</span></td>
      <td><span class="td-case ${ccls}">${caseLabel[t.case]||'—'}</span></td>
      <td>${t.volume}</td>
      <td style="font-size:0.7rem;color:var(--muted)">${t.openTime}</td>
      <td><strong>${t.openPrice}</strong></td>
      <td style="font-size:0.7rem;color:var(--muted)">${t.closeTime}</td>
      <td><strong>${t.closePrice}</strong></td>
      <td style="color:var(--muted)">${t.sl||'—'}</td>
      <td style="color:var(--muted)">${t.tp||'—'}</td>
      <td style="color:var(--red)">${t.commission}</td>
      <td class="${pCls}">${pStr}</td>
      <td><button class="del-btn" onclick="deleteTrade('${t.id}')">✕</button></td>
    </tr>${renderRulesRow(t, 13)}`;
  }).join('');
}

function updateKPI(trades) {
  const profits = trades.map(t => parseFloat(t.profit) || 0);
  const net   = profits.reduce((a,b) => a+b, 0);
  const gross = profits.filter(p=>p>0).reduce((a,b)=>a+b,0);
  const loss  = Math.abs(profits.filter(p=>p<0).reduce((a,b)=>a+b,0));
  const wins  = profits.filter(p=>p>0).length;
  const total = trades.length;

  document.getElementById('kpi-total').textContent  = total || '—';
  document.getElementById('kpi-profit').textContent = total ? (net>=0?`+$${net.toFixed(2)}`:`−$${Math.abs(net).toFixed(2)}`) : '—';
  document.getElementById('kpi-win').textContent    = total ? Math.round(wins/total*100)+'%' : '—';
  document.getElementById('kpi-pf').textContent     = loss>0 ? (gross/loss).toFixed(2) : (gross>0?'∞':'—');
  document.getElementById('kpi-c1').textContent     = trades.filter(t=>t.case==='1').length || '—';
  document.getElementById('kpi-c3').textContent     = trades.filter(t=>t.case==='3').length || '—';

  const profitCard = document.getElementById('kpi-profit').parentElement;
  profitCard.classList.toggle('kpi-red',   net < 0);
  profitCard.classList.toggle('kpi-green', net >= 0);
}

const FX_PAIRS = [
  'EURUSD','GBPUSD','USDCHF','USDJPY','USDCAD',
  'AUDUSD','AUDNZD','AUDCAD','AUDCHF','AUDJPY',
  'CADCHF','CADJPY','CHFJPY',

  'GBPCHF','GBPJPY','GBPAUD','GBPCAD','GBPNZD',
  'NZDCAD','NZDCHF','NZDJPY','NZDUSD'
];
const WL_TFS = ['W','D','H4','H1','M30','M15','M5'];
let wlData = {};
let wlActivePair = null, wlActiveTF = null;
let wlSaveTimer = null;

const BIAS_CLASS = { up:'b-up', dn:'b-dn', side:'b-side', '':'b-none' };
const BIAS_CLASS_WAIT = { up:'b-wait-up', dn:'b-wait-dn' };
const BIAS_LABEL = { up: ()=>window.t('bias.up'), dn: ()=>window.t('bias.dn'), side: ()=>window.t('bias.side'), '': ()=>'—' };
const BIAS_LABEL_WAIT = { up: ()=>'<span class="hg">⏳</span> '+window.t('bias.up'), dn: ()=>'<span class="hg">⏳</span> '+window.t('bias.dn') };
const CASE_DOT   = { '1':'d1',   '2':'d2',   '3':'d3', '4':'d3' };
const CASE_LABEL = { '1':'C1', '2':'C2', '3':'C3', '4':'C4' };

function cellBadgeHtml(pair, tf) {
  const d = (wlData[pair] || {})[tf] || {};
  const isWaiting = !!(d.waiting && (d.bias === 'up' || d.bias === 'dn'));
  const bCls = isWaiting ? (BIAS_CLASS_WAIT[d.bias] || 'b-none') : (BIAS_CLASS[d.bias || ''] || 'b-none');
  const bLbl = isWaiting ? (BIAS_LABEL_WAIT[d.bias] ? BIAS_LABEL_WAIT[d.bias]() : '—') : (BIAS_LABEL[d.bias || '']() || '—');
  const STRUCT_KEY = {
    'CHOCH tăng': 'wp.choch.up',
    'CHOCH giảm': 'wp.choch.dn',
    'BOS tăng':   'wp.bos.up',
    'BOS giảm':   'wp.bos.dn',
  };
  const struct = d.struct ? `<span style="font-size:0.5rem;color:var(--muted)">${STRUCT_KEY[d.struct] ? window.t(STRUCT_KEY[d.struct]) : d.struct}</span>` : '';
  // Hiển thị C3 + C4 nếu alsoC4
  const caseDot = d.case
    ? `<span class="wl-case-dot ${CASE_DOT[d.case]}"></span><span style="font-size:0.55rem;font-weight:700">${CASE_LABEL[d.case]}</span>${d.case === '3' && d.alsoC4 ? `<span class="wl-case-dot d3" style="margin-left:2px"></span><span style="font-size:0.55rem;font-weight:700;color:#e6a817">C4</span>` : ''}`
    : '';
  // Badge trạng thái C1/C2/C3
  let c3StatusBadge = '';
  if (d.case === '1' || d.case === '2') {
    const tf12 = d.case === '1' ? 'M30' : 'M5';
    if (d.chochDone12) {
      c3StatusBadge = `<span style="font-size:0.5rem;color:var(--green);font-weight:700;white-space:nowrap;">✅ ${tf12}</span>`;
    }
  } else if (d.case === '3') {
    if (d.chochDone && d.chochDone.length) {
      c3StatusBadge = `<span style="font-size:0.5rem;color:var(--green);font-weight:700;white-space:nowrap;">✅ ${d.chochDone.join('/')} → ${HG} M1</span>`;
    } else if (d.waitM1) {
      c3StatusBadge = `<span style="font-size:0.5rem;color:var(--blue);font-weight:700;white-space:nowrap;">${HG} M1</span>`;
    }
  }
  const sub = (struct || caseDot || c3StatusBadge)
    ? `<div class="wl-sub" style="display:flex;align-items:center;gap:3px;flex-wrap:wrap;justify-content:center">${struct}${caseDot}${c3StatusBadge}</div>`
    : '';
  return `<button class="wl-cell-btn" onclick="openWlPopup('${pair}','${tf}',event)">
    <span class="wl-badge ${bCls}">${bLbl}</span>${sub}
  </button>`;
}

function renderWatchlist(data) {
  wlData = data || {};
  window.wlData = wlData; // expose for Trade Log sync
  if(typeof logRenderWL === 'function' && window.currentUser) logRenderWL();
  const tbody = document.getElementById('wl-tbody');
  if (!tbody) return; // chart-only page — no watchlist HTML
  tbody.innerHTML = FX_PAIRS.map(pair => {
    const shown = !!(wlData[pair] && wlData[pair].__show);
    const chk = `<label class="wl-show-toggle" title="Hiển thị ở Tổng quan">
      <input type="checkbox" ${shown ? 'checked' : ''} onchange="togglePairShow('${pair}',this.checked)">
      <span class="wl-show-box">${shown ? '✓' : ''}</span>
    </label>`;
    return `<tr class="${shown ? 'wl-row-shown' : ''}">
      <td class="wl-td-show">${chk}</td>
      <td class="wl-td-pair">${pair}</td>
      ${WL_TFS.map(tf => `<td>${cellBadgeHtml(pair, tf)}</td>`).join('')}
    </tr>`;
  }).join('');
  if (typeof renderWlCards === 'function' && document.getElementById('wl-view-mode')?.style.display !== 'none') renderWlCards();
}

window.togglePairShow = (pair, checked) => {
  if (!wlData[pair]) wlData[pair] = {};
  wlData[pair].__show = checked;
  // update row class and checkbox label live
  const rows = document.querySelectorAll('#wl-tbody tr');
  rows.forEach(tr => {
    const inp = tr.querySelector('input[type=checkbox]');
    if (!inp) return;
    const onchg = inp.getAttribute('onchange') || '';
    if (!onchg.includes(`'${pair}'`)) return;
    tr.classList.toggle('wl-row-shown', checked);
    const box = tr.querySelector('.wl-show-box');
    if (box) box.textContent = checked ? '✓' : '';
  });
  autoSaveWl();
  if (typeof renderWlCards === 'function') renderWlCards();
  if (typeof logRenderWL === 'function' && window.currentUser) logRenderWL();
};

window.onWpBiasChange = (val) => {
  const lbl = document.getElementById('wp-waiting-label');
  if (!lbl) return;
  if (val === 'up' || val === 'dn') { lbl.style.display = 'flex'; }
  else { lbl.style.display = 'none'; const cb = document.getElementById('wp-waiting'); if (cb) cb.checked = false; }
};

window.onWpCaseChange = (val) => {
  const isC1 = val === '1', isC2 = val === '2', isC3 = val === '3';
  const isC12 = isC1 || isC2;
  document.getElementById('wp-c12-tf-row').style.display = isC12 ? 'block' : 'none';
  document.getElementById('wp-c3-tf-row').style.display  = isC3  ? 'block' : 'none';
  // C1: M30, C2: M5
  if (isC12) {
    const tfLabel = isC1 ? 'M30' : 'M5';
    const lbl1 = document.getElementById('wp-c12-tf-label');
    const lbl2 = document.getElementById('wp-c12-choch-label');
    if (lbl1) lbl1.textContent = tfLabel;
    if (lbl2) lbl2.textContent = tfLabel;
  } else {
    const cd = document.getElementById('wp-c12-choch-done'); if(cd) cd.checked=false;
  }
  if (!isC3) {
    ['m30','m15','m5'].forEach(v => {
      const a = document.getElementById('wp-c3-'+v); if(a) a.checked=false;
      const b = document.getElementById('wp-choch-'+v); if(b) b.checked=false;
    });
    const wm1 = document.getElementById('wp-wait-m1'); if(wm1) wm1.checked=false;
    const ac4 = document.getElementById('wp-also-c4'); if(ac4) ac4.checked=false;
  }
};

window.openWlPopup = (pair, tf, e) => {
  e.stopPropagation();
  wlActivePair = pair; wlActiveTF = tf;
  const d = (wlData[pair] || {})[tf] || {};
  document.getElementById('wl-popup-label').textContent = `${pair} · ${tf}`;
  document.getElementById('wp-bias').value   = d.bias   || '';
  window.onWpBiasChange(d.bias || '');
  const wpWaiting = document.getElementById('wp-waiting');
  if (wpWaiting) wpWaiting.checked = !!(d.waiting);
  document.getElementById('wp-struct').value = d.struct || '';
  document.getElementById('wp-case').value   = d.case   || '';
  document.getElementById('wp-note').value   = d.note   || '';
  // restore c3tf checkboxes
  const c3tfs = d.c3tf || [];
  ['M30','M15','M5'].forEach(v => {
    const el = document.getElementById('wp-c3-' + v.toLowerCase());
    if (el) el.checked = c3tfs.includes(v);
  });
  // restore chochDone checkboxes (C3)
  const chochDone = d.chochDone || [];
  ['M30','M15','M5'].forEach(v => {
    const el = document.getElementById('wp-choch-' + v.toLowerCase());
    if (el) el.checked = chochDone.includes(v);
  });
  // restore waitM1 (C3)
  const wm1El = document.getElementById('wp-wait-m1');
  if (wm1El) wm1El.checked = !!d.waitM1;
  // restore alsoC4 (C3)
  const ac4El = document.getElementById('wp-also-c4');
  if (ac4El) ac4El.checked = !!d.alsoC4;
  // restore C1/C2 fields
  const isC1 = d.case === '1', isC2 = d.case === '2', isC3 = d.case === '3';
  const isC12 = isC1 || isC2;
  document.getElementById('wp-c12-tf-row').style.display = isC12 ? 'block' : 'none';
  document.getElementById('wp-c3-tf-row').style.display  = isC3  ? 'block' : 'none';
  if (isC12) {
    const tfLabel = isC1 ? 'M30' : 'M5';
    const lbl1 = document.getElementById('wp-c12-tf-label');
    const lbl2 = document.getElementById('wp-c12-choch-label');
    if (lbl1) lbl1.textContent = tfLabel;
    if (lbl2) lbl2.textContent = tfLabel;
    const cd = document.getElementById('wp-c12-choch-done'); if(cd) cd.checked = !!d.chochDone12;
  }
  // position popup near click
  const popup = document.getElementById('wl-popup');
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = e.clientX + 12, y = e.clientY + 12;
  popup.style.left = '0'; popup.style.top = '0';
  document.getElementById('wl-popup-bg').classList.add('open');
  const pw = popup.offsetWidth || 260, ph = popup.offsetHeight || 300;
  if (x + pw > vw - 8) x = vw - pw - 12;
  if (y + ph > vh - 8) y = vh - ph - 12;
  popup.style.left = x + 'px'; popup.style.top = y + 'px';
};

window.closeWlPopup = (e) => {
  if (e.target === document.getElementById('wl-popup-bg')) closeWlPopupDirect();
};
window.closeWlPopupDirect = () => {
  document.getElementById('wl-popup-bg').classList.remove('open');
  wlActivePair = null; wlActiveTF = null;
};

window.saveWlCell = () => {
  if (!wlActivePair) return;
  if (!wlData[wlActivePair]) wlData[wlActivePair] = {};
  const caseVal = document.getElementById('wp-case').value;
  const c3tf = caseVal === '3'
    ? ['M30','M15','M5'].filter(v => document.getElementById('wp-c3-' + v.toLowerCase())?.checked)
    : [];
  const chochDone = caseVal === '3'
    ? ['M30','M15','M5'].filter(v => document.getElementById('wp-choch-' + v.toLowerCase())?.checked)
    : [];
  const isC12 = caseVal === '1' || caseVal === '2';
  const chochDone12 = isC12 ? !!document.getElementById('wp-c12-choch-done')?.checked : false;
  const waitM1 = caseVal === '3' ? !!document.getElementById('wp-wait-m1')?.checked : false;
  const alsoC4 = caseVal === '3' ? !!document.getElementById('wp-also-c4')?.checked : false;
  wlData[wlActivePair][wlActiveTF] = {
    bias:        document.getElementById('wp-bias').value,
    waiting:     !!(document.getElementById('wp-waiting')?.checked && (document.getElementById('wp-bias').value === 'up' || document.getElementById('wp-bias').value === 'dn')),
    struct:      document.getElementById('wp-struct').value,
    case:        caseVal,
    c3tf:        c3tf,
    chochDone:   chochDone,
    chochDone12: chochDone12,
    waitM1:      waitM1,
    alsoC4:      alsoC4,
    note:        document.getElementById('wp-note').value.trim(),
  };
  renderWatchlist(wlData);
  closeWlPopupDirect();
  autoSaveWl();
};

function autoSaveWl() {
  if (!currentUser) return;

  document.getElementById('wl-saving-bar').textContent = window.t('wl.saving');
  wlSaveTimer = setTimeout(async () => {
    try {

      document.getElementById('wl-saving-bar').textContent = '✓ ' + window.t('wl.saved');

  if (!currentUser) return;
  try {
    const snap = await getDoc(doc(db, 'watchlist', currentUser.uid));
    renderWatchlist(snap.exists() ? (snap.data().pairs || {}) : {});

function renderWlCards() {
  const grid = document.getElementById('wl-cards-grid');
  if (!grid) return;
  const { bias, biasH1, case: caseF } = wlViewFilters;

  const CASE_BADGE_LABEL = { '1':'C1', '2':'C2', '3':'C3', '4':'C4' };
  const ENTRY_TFS_ORDER = ['M5','M15','M30','H1','H4'];
  const TF_ORDER = { 'M5':0, 'M15':1, 'M30':2, 'H1':3, 'H4':4 };
  const CASE_PRIORITY = { '4':4, '3':3, '2':2, '1':1 };
  const BIAS_ORDER = { 'up':0, 'dn':1, 'side':2, '':3 };

  // Build card HTML for a pair
  function buildCard(pair) {
    const pairData = wlData[pair] || {};
    const h1 = pairData['H1'] || {};
    const h1Bias = h1.bias;
    const biasClass = h1Bias === 'up' ? 'h1-up' : h1Bias === 'dn' ? 'h1-dn' : h1Bias === 'side' ? 'h1-side' : '';
    const caseEntry = WL_TFS.map(tf => pairData[tf]).find(d => d && d.case);
    const caseBadge = caseEntry ? `<span class="wl-case-dot ${CASE_DOT[caseEntry.case]}"></span>` : '';

    // HTF rows: W, D, H4 — each on its own row
    const htfRows = ['W','D','H4'].map(tf => {
      const d = pairData[tf] || {};
      if (!d.bias && !d.struct && !d.case && !d.note) return '';
      const _isWait = !!(d.waiting && (d.bias === 'up' || d.bias === 'dn'));
      const bBadge = d.bias ? `<span class="wl-badge ${_isWait?(BIAS_CLASS_WAIT[d.bias]||'b-none'):(BIAS_CLASS[d.bias]||'b-none')}">${_isWait?(BIAS_LABEL_WAIT[d.bias]?BIAS_LABEL_WAIT[d.bias]():''):( BIAS_LABEL[d.bias]?BIAS_LABEL[d.bias]():'')}</span>` : '';
      let rowContent = '';
      if (d.case) {
        let noteText = '';
        if (d.case === '1') {
          noteText = d.chochDone12 ? `✅ M30` : `${HG} M30`;
        } else if (d.case === '2') {
          noteText = d.chochDone12 ? `✅ M5` : `${HG} M5`;
        } else if (d.case === '3') {
          const tfs = (d.c3tf && d.c3tf.length) ? d.c3tf.join('/') : 'M30/M15/M5';
          const hasDone = d.chochDone && d.chochDone.length;
          if (d.waitM1 && hasDone) noteText = `✅ ${d.chochDone.join('/')} → ${HG} M1`;
          else if (d.waitM1) noteText = `${HG} M1`;
          else if (hasDone) noteText = `✅ ${d.chochDone.join('/')} → ${HG} M1`;
          else noteText = `${HG} ${tfs}`;
        } else if (d.case === '4') noteText = `${HG} EMA50`;
        const cLabel = `<span class="wl-c-label">${CASE_BADGE_LABEL[d.case]}</span>${d.case === '3' && d.alsoC4 ? `<span class="wl-c-label" style="background:#fff8e6;color:#e6a817;border-color:#e6c84c;margin-left:2px">C4</span>` : ''}`;
        let noteColor = '';
        if ((d.case === '1' || d.case === '2') && d.chochDone12) {
          noteColor = 'color:var(--green);font-weight:700;';
        } else if (d.case === '3' && (d.waitM1 || (d.chochDone && d.chochDone.length))) {
          noteColor = (d.chochDone && d.chochDone.length) ? 'color:var(--green);font-weight:700;' : 'color:var(--blue);font-weight:700;';
        }
        rowContent = `${bBadge}${cLabel}<span class="wl-pc-note" style="${noteColor}">${noteText}</span>`;
      } else {
        rowContent = `${bBadge}${d.note ? `<span class="wl-pc-note">${d.note}</span>` : ''}`;
      }
      return `<div class="wl-pc-row"><span class="wl-pc-tf">${tf}</span>${rowContent}</div>`;
    }).filter(Boolean);

    // Entry rows: H1 M30 M15 M5 (below separator)
    const entryRows = ['H1','M30','M15','M5'].map(tf => {
      const d = pairData[tf] || {};
      if (!d.bias && !d.struct && !d.case && !d.note) return '';
      const _isWait = !!(d.waiting && (d.bias === 'up' || d.bias === 'dn'));
      const bBadge = d.bias ? `<span class="wl-badge ${_isWait?(BIAS_CLASS_WAIT[d.bias]||'b-none'):(BIAS_CLASS[d.bias]||'b-none')}">${_isWait?(BIAS_LABEL_WAIT[d.bias]?BIAS_LABEL_WAIT[d.bias]():''):( BIAS_LABEL[d.bias]?BIAS_LABEL[d.bias]():'')}</span>` : '';
      let rowContent = '';
      if (d.case) {
        let noteText = '';
        if (d.case === '1') {
          noteText = d.chochDone12 ? `✅ M30` : `${HG} M30`;
        }
        else if (d.case === '2') {
          noteText = d.chochDone12 ? `✅ M5` : `${HG} M5`;
        }
        else if (d.case === '3') {
          const tfs = (d.c3tf && d.c3tf.length) ? d.c3tf.join('/') : 'M30/M15/M5';
          const hasDone = d.chochDone && d.chochDone.length;
          if (d.waitM1 && hasDone) {
            // Có CHOCH + đang chờ M1 → hiện đủ flow
            noteText = `✅ ${d.chochDone.join('/')} → ${HG} M1`;
          } else if (d.waitM1) {
            noteText = `${HG} M1`;
          } else if (hasDone) {
            noteText = `✅ ${d.chochDone.join('/')} → ${HG} M1`;
          } else {
            noteText = `${HG} ${tfs}`;
          }
        }
        else if (d.case === '4') noteText = `${HG} EMA50`;
        const cLabel = `<span class="wl-c-label">${CASE_BADGE_LABEL[d.case]}</span>${d.case === '3' && d.alsoC4 ? `<span class="wl-c-label" style="background:#fff8e6;color:#e6a817;border-color:#e6c84c;margin-left:2px">C4</span>` : ''}`;
        // Color note theo trạng thái
        let noteColor = '';
        if ((d.case === '1' || d.case === '2') && d.chochDone12) {
          noteColor = 'color:var(--green);font-weight:700;';
        } else if (d.case === '3' && (d.waitM1 || (d.chochDone && d.chochDone.length))) {
          noteColor = (d.chochDone && d.chochDone.length)
            ? 'color:var(--green);font-weight:700;'
            : 'color:var(--blue);font-weight:700;';
        }
        rowContent = `${bBadge}${cLabel}<span class="wl-pc-note" style="${noteColor}">${noteText}</span>`;
      } else {
        rowContent = `${bBadge}${d.note ? `<span class="wl-pc-note">${d.note}</span>` : ''}`;
      }
      return `<div class="wl-pc-row"><span class="wl-pc-tf">${tf}</span>${rowContent}</div>`;
    }).filter(Boolean);

    const sepRow = (htfRows.length && entryRows.length) ? `<div class="wl-pc-row hl-separator"></div>` : '';
    const rows = htfRows.join('') + sepRow + entryRows.join('');

    // ── Entry case summary block ──────────────────────────────────────────────
    // Collect all TFs that have a case assigned
    const ALL_TFS = ['W','D','H4','H1','M30','M15','M5'];
    const ENTRY_TF_LABEL = { 'M5':'M5', 'M15':'M15', 'M30':'M30', 'H1':'H1', 'H4':'H4' };
    const CASE_COLORS = {
      '1': { bg:'var(--blue-lt)', border:'#a8bad8', color:'var(--blue)' },
      '2': { bg:'#f4f3f0',        border:'var(--border-dark)', color:'var(--ink-2)' },
      '3': { bg:'var(--blue-lt)', border:'#a8bad8', color:'var(--blue)' },
      '4': { bg:'var(--red-lt)',  border:'#e8a09a', color:'var(--red)' },
    };
    const ENTRY_TF_FOR_CASE = { '1':'M30', '2':'M5', '3':'M1', '4':'M1' };

    const casePills = ALL_TFS.map(tf => {
      const d = pairData[tf] || {};
      if (!d.case) return '';
      const c = d.case;
      const col = CASE_COLORS[c] || CASE_COLORS['1'];
      const entryTF = ENTRY_TF_FOR_CASE[c] || '';

      // Progress indicator
      let prog = '';
      if (c === '1' || c === '2') {
        prog = d.chochDone12
          ? `<span style="color:var(--green);font-weight:700;font-size:0.52rem;">✅${entryTF}</span>`
          : `<span style="color:var(--blue);font-size:0.52rem;" class="hg">⏳</span><span style="font-size:0.52rem;">${entryTF}</span>`;
      } else if (c === '3') {
        const hasDone = d.chochDone && d.chochDone.length;
        if (d.waitM1 && hasDone) prog = `<span style="color:var(--green);font-weight:700;font-size:0.52rem;">✅→M1</span>`;
        else if (hasDone)        prog = `<span style="color:var(--green);font-weight:700;font-size:0.52rem;">✅→M1</span>`;
        else if (d.waitM1)       prog = `<span style="color:var(--blue);font-size:0.52rem;" class="hg">⏳</span><span style="font-size:0.52rem;">M1</span>`;
        else                     prog = `<span style="color:var(--blue);font-size:0.52rem;" class="hg">⏳</span><span style="font-size:0.52rem;">${entryTF}</span>`;
      } else if (c === '4') {
        prog = `<span style="color:var(--blue);font-size:0.52rem;" class="hg">⏳</span><span style="font-size:0.52rem;">M1</span>`;
      }

      const c4Extra = (c === '3' && d.alsoC4)
        ? `<span style="font-size:0.5rem;font-weight:700;color:#b8860b;background:#fff8e6;border:1px solid #e6c84c;border-radius:2px;padding:1px 3px;margin-left:2px;">C4</span>`
        : '';

      return `<div style="display:inline-flex;align-items:center;gap:3px;padding:2px 6px 2px 4px;border-radius:3px;border:1px solid ${col.border};background:${col.bg};">
        <span style="font-size:0.55rem;font-weight:700;color:${col.color};letter-spacing:0.3px;">C${c}</span>
        <span style="font-size:0.5rem;color:var(--faint);font-weight:600;">${tf}</span>
        ${c4Extra}
        ${prog}
      </div>`;
    }).filter(Boolean);

    const caseSummaryBlock = casePills.length
      ? `<div style="margin-top:0.55rem;padding-top:0.45rem;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:3px;">${casePills.join('')}</div>`
      : '';

    return `<div class="wl-pair-card has-data ${biasClass}" onclick="highlightWlCard(this)">
      <div class="wl-pc-symbol">${pair}</div>
      <div class="wl-pc-rows">${rows || '<div class="wl-pc-empty">Chưa có data trong các TF</div>'}</div>
      ${caseSummaryBlock}
    </div>`;
  }

  // Filter pairs
  const filteredPairs = FX_PAIRS.filter(pair => {
    const pd = wlData[pair] || {};
    if (!pd.__show) return false;
    if (bias && (pd['H4']||{}).bias !== bias) return false;
    if (biasH1 && (pd['H1']||{}).bias !== biasH1) return false;
    if (caseF && !WL_TFS.some(tf => {
      const d = pd[tf] || {};
      if (d.case === caseF) return true;
      if (caseF === '4' && d.case === '3' && d.alsoC4) return true;
      return false;
    })) return false;
    return true;
  });

  // Sort each pair: find smallest entry TF with a case
  const withMeta = filteredPairs.map(pair => {
    const pd = wlData[pair] || {};
    const h1b = (pd['H1']||{}).bias || '';
    const tfsWithCase = ENTRY_TFS_ORDER.filter(tf => (pd[tf]||{}).case);
    const minTFOrder = tfsWithCase.length ? Math.min(...tfsWithCase.map(tf => TF_ORDER[tf])) : 99;
    const minTF = tfsWithCase.find(tf => TF_ORDER[tf] === minTFOrder) || null;
    const topCase = WL_TFS.map(tf => (pd[tf]||{}).case).filter(Boolean)
      .sort((a,b) => (CASE_PRIORITY[b]||0) - (CASE_PRIORITY[a]||0))[0] || '';
    return { pair, minTF, minTFOrder, h1Order: BIAS_ORDER[h1b] ?? 3, caseOrder: -(CASE_PRIORITY[topCase]||0) };
  }).sort((a,b) => a.minTFOrder - b.minTFOrder || a.h1Order - b.h1Order || a.caseOrder - b.caseOrder);

  if (!withMeta.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem 2rem;color:var(--faint);font-size:0.78rem;">
      <div style="font-size:1.5rem;margin-bottom:0.5rem;opacity:0.4">👁</div>
      ${window.t('wl.view.empty')}<br>
      <span style="font-size:0.68rem;">${window.t('wl.view.empty.hint')}</span>
    </div>`;
    return;
  }

  // Group by smallest entry TF with case, render with group headers
  const TF_GROUP_LABELS = { 'M5':`M5 · ${window.t('lbl.entry')}`, 'M15':`M15 · ${window.t('lbl.entry')}`, 'M30':`M30 · ${window.t('lbl.entry')}`, 'H1':`H1 · ${window.t('lbl.entry')}`, 'H4':`H4 · ${window.t('lbl.entry')}`, null:window.t('tf.group.nocase') };
  let html = '';
  let lastGroup = undefined;
  for (const { pair, minTF } of withMeta) {
    const groupKey = minTF || null;
    if (groupKey !== lastGroup) {
      const cdId = groupKey ? `wl-cd-${groupKey}` : '';
      const cdHtml = groupKey ? `<span class="wl-tf-countdown" id="${cdId}">--:--</span>` : '';
      html += `<div class="wl-tf-group-header">
        <span class="wl-tf-group-label">${TF_GROUP_LABELS[groupKey] || window.t('tf.group.nocase')}</span>
        ${cdHtml}
        <div class="wl-tf-group-line"></div>
      </div>`;
      lastGroup = groupKey;
    }
    html += buildCard(pair);
  }
  grid.innerHTML = html;
  startCountdowns();
}

// ── COUNTDOWN CLOSE BAR (UTC+7) ───────────────────
const TF_MINUTES = { 'M5':5, 'M15':15, 'M30':30, 'H1':60, 'H4':240 };
let countdownTimer = null;

function getSecondsToClose(tfMinutes) {
  // UTC+7: offset = 7*60 minutes
  const nowMs = Date.now() + 7 * 60 * 60 * 1000;
  const totalSec = Math.floor(nowMs / 1000);
  const barSec = tfMinutes * 60;
  const elapsed = totalSec % barSec;
  return barSec - elapsed;
}

function fmtCountdown(sec) {
  if (sec >= 3600) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function tickCountdowns() {
  for (const [tf, mins] of Object.entries(TF_MINUTES)) {
    const el = document.getElementById(`wl-cd-${tf}`);
    if (!el) continue;
    const sec = getSecondsToClose(mins);
    el.textContent = fmtCountdown(sec);
    // urgent: last 60s for M5, last 90s for others
    const urgentThreshold = tf === 'M5' ? 60 : 90;
    el.classList.toggle('urgent', sec <= urgentThreshold);
  }
}

function startCountdowns() {
  if (countdownTimer) clearInterval(countdownTimer);
  tickCountdowns();
  countdownTimer = setInterval(tickCountdowns, 1000);
}

// ── SYNC FROM STRATEGY WATCHLIST ──────────────────────
function logSyncFromStrategy(){
  // window.wlData được expose từ Firebase module (strategy watchlist)
  const src = window.wlData || {};
  // Rebuild logWl chỉ gồm các pairs có trong strategy wlData (có __show hoặc có data)
  // Pairs không có __show vẫn giữ lại nếu đã có trong logWl (có note/bias...)
  // Priority: lấy ALL pairs từ FX_PAIRS mà có wlData entry
  const syncPairs = (window.LOG_PAIRS_ALL || LOG_PAIRS).filter(p => src[p] && src[p].__show);
  if(syncPairs.length === 0) { logRenderWL(); return; } // không có pair tick __show → render empty

  // Tạo mới logWl chỉ với các pairs từ strategy
  const newWl = {};
  syncPairs.forEach(p => {
    // Giữ lại data cũ nếu có (note, waitCase, struct, bias, alerts)
    const old = logWl[p] || {};

    // Collect ALL cases từ tất cả TFs (một pair có thể có nhiều case ở nhiều TF)
    const srcP = src[p] || {};
    const ALL_TFS = ['W','D','H4','H1','M30','M15','M5'];
    const srcCases = [...new Set(ALL_TFS.filter(tf=>srcP[tf]?.case).map(tf=>`C${srcP[tf].case}`))];
    const structTF = ALL_TFS.find(tf => srcP[tf]?.struct);
    const srcStruct = structTF ? srcP[structTF].struct : '';

    newWl[p] = {
      bias:      src[p]?.H4?.bias || old.bias || '',
      struct:    srcStruct     || old.struct    || '',
      waitCases: srcCases.length ? srcCases : (old.waitCases || (old.waitCase ? [old.waitCase] : [])),
      note:      old.note      || '',
      tf: {
        // Luôn ưu tiên dữ liệu mới nhất từ strategy wlData
        W:   (src[p]?.W?.bias   !== undefined ? src[p].W.bias   : old.tf?.W   || ''),
        D:   (src[p]?.D?.bias   !== undefined ? src[p].D.bias   : old.tf?.D   || ''),
        H4:  (src[p]?.H4?.bias  !== undefined ? src[p].H4.bias  : old.tf?.H4  || ''),
        H1:  (src[p]?.H1?.bias  !== undefined ? src[p].H1.bias  : old.tf?.H1  || ''),
        M30: (src[p]?.M30?.bias !== undefined ? src[p].M30.bias : old.tf?.M30 || ''),
        M15: (src[p]?.M15?.bias !== undefined ? src[p].M15.bias : old.tf?.M15 || ''),
        M5:  (src[p]?.M5?.bias  !== undefined ? src[p].M5.bias  : old.tf?.M5  || ''),
      }
    };
  });
  logWl = newWl;
  logRenderWL();
}
window.logSyncFromStrategy = logSyncFromStrategy;


// Firebase save helpers (use window.db/currentUser from the Firebase module)
// Lưu từng trade vào document riêng: logTrades/{uid}/entries/{tradeId}
async function logFbSaveTrades(){
  try{
    const uid=(window.currentUser&&window.currentUser.uid)||'shared_user';
    const col=window.fbCollection(window.db,'logTrades',uid,'entries');
    // Lưu từng trade riêng (không dùng batch) để dễ phát hiện trade nào lỗi
    for(const t of logTrades){
      const ref=window.fbDoc(col,t.id);
      // Kiểm tra size trước khi lưu
      const json=JSON.stringify(t);
      const sizeKB=Math.round(new Blob([json]).size/1024);
      if(sizeKB>900){
        showToast('⚠️ Lệnh '+t.symbol+' quá nặng ('+sizeKB+'KB) — bớt ảnh xuống');
        continue;
      }
      await window.fbSetDoc(ref,{...t,_savedAt:new Date().toISOString()});
    }
  }catch(e){
    console.warn('logFbSaveTrades error:',e);
    showToast('⚠️ Lưu thất bại: '+e.message);
  }
}

// Lưu 1 trade duy nhất — trade doc không chứa ảnh, ảnh lưu vào subcollection riêng
async function logFbSaveOneTrade(t){
  try{
    const uid=(window.currentUser&&window.currentUser.uid)||'shared_user';
    const tradeRef=window.fbDoc(window.db,'logTrades',uid,'entries',t.id);

    // 1. Tách ảnh ra khỏi trade object
    const {imgs, imgsByTF, imgUrl, resultImgs, ...tradeMeta} = t;

    // 2. Lưu trade document KHÔNG có ảnh
    await window.fbSetDoc(tradeRef,{...tradeMeta, _savedAt:new Date().toISOString()});

    // 3. Lưu từng ảnh vào subcollection images/
    const imgCol=window.fbCollection(window.db,'logTrades',uid,'entries',t.id,'images');

    // Xóa ảnh cũ trước (tránh duplicate khi edit lệnh)
    const oldSnap=await window.fbGetDocs(imgCol);
    for(const d of oldSnap.docs){ await window.fbDeleteDoc(d.ref); }

    // Gom tất cả ảnh
    const allImgs=[];
    LOG_IMG_TFS.forEach(tf=>{
      (imgsByTF?.[tf]||[]).forEach((img,i)=>{
        allImgs.push({id:tf+'_'+i, tf, type:'setup', url:img.url});
      });
    });
    (resultImgs||[]).forEach((img,i)=>{
      allImgs.push({id:'result_'+i, tf:'result', type:'result', url:img.url});
    });

    // Lưu từng ảnh — mỗi ảnh 1 document riêng
    console.log('[IMG SAVE] Tổng ảnh cần lưu:', allImgs.length, allImgs.map(x=>x.id));
    for(const img of allImgs){
      const sizeKB=Math.round(new Blob([img.url]).size/1024);
      if(sizeKB>900){
        showToast('⚠️ Ảnh '+img.tf+' nặng '+sizeKB+'KB — quá lớn, bỏ qua');
        console.warn('[IMG SAVE] Bỏ qua ảnh quá nặng:', img.id, sizeKB+'KB');
        continue;
      }
      const imgRef=window.fbDoc(imgCol, img.id);
      await window.fbSetDoc(imgRef,{tf:img.tf, type:img.type, url:img.url, _savedAt:new Date().toISOString()});
      console.log('[IMG SAVE] Đã lưu:', img.id, sizeKB+'KB');
    }

    if(allImgs.length) showToast('✅ Đã lưu lệnh + '+allImgs.length+' ảnh');
    else console.warn('[IMG SAVE] allImgs rỗng — imgsByTF:', JSON.stringify(imgsByTF)?.slice(0,200));
    return true;
  }catch(e){
    console.warn('logFbSaveOneTrade error:',e);
    showToast('⚠️ Lưu thất bại: '+e.message);
    return false;
  }
}

// Load ảnh của 1 trade từ subcollection (lazy — chỉ gọi khi mở modal)
async function logFbLoadImgsForTrade(tradeId){
  try{
    const uid=(window.currentUser&&window.currentUser.uid)||'shared_user';
    const imgCol=window.fbCollection(window.db,'logTrades',uid,'entries',tradeId,'images');
    const snap=await window.fbGetDocs(imgCol);
    console.log('[IMG LOAD] tradeId:', tradeId, '— docs found:', snap.size);
    const imgsByTF={};
    const resultImgs=[];
    LOG_IMG_TFS.forEach(tf=>{imgsByTF[tf]=[];});
    snap.forEach(d=>{
      const data=d.data();
      if(data.type==='result'){
        resultImgs.push({url:data.url});
      } else {
        const tf=data.tf||LOG_IMG_TFS[0];
        if(!imgsByTF[tf])imgsByTF[tf]=[];
        imgsByTF[tf].push({url:data.url});
      }
    });
    return{imgsByTF,resultImgs};
  }catch(e){
    console.warn('logFbLoadImgsForTrade error:',e);
    return{imgsByTF:{},resultImgs:[]};
  }
}

async function logLoad(){
  try{
    const uid=(window.currentUser&&window.currentUser.uid)||window.viewOnlyUid||'shared_user';
    if(!uid){
      logTrades=[];
      logWl=logInitWl();
      logAlerts={};
      logLimits={d:2,w:5,m:10};
    } else {
      // Đọc trades từ subcollection — mỗi doc là 1 trade (tránh giới hạn 1MB)
      // Đồng thời thử đọc doc cũ (migration: nếu còn data cũ thì nhập vào)
      const col=window.fbCollection(window.db,'logTrades',uid,'entries');
      const [trSnap,wlSnap,oldSnap,stratSnap]=await Promise.all([
        window.fbGetDocs(col),
        window.fbGetDoc(window.fbDoc(window.db,'logWl',uid)),
        window.fbGetDoc(window.fbDoc(window.db,'logTrades',uid)),
        window.fbGetDoc(window.fbDoc(window.db,'watchlist',uid)), // đọc thẳng strategy watchlist
      ]);
      // Trades từ subcollection mới
      const newTrades=[];
      trSnap.forEach(d=>newTrades.push(d.data()));
      // Migration: nếu có data cũ trong root doc và subcollection còn trống
      if(newTrades.length===0 && oldSnap.exists()){
        const oldTrades=oldSnap.data().trades||[];
        if(oldTrades.length>0){
          logTrades=oldTrades;
          // Tự động migrate sang format mới (không ảnh, chỉ meta)
          await logFbSaveTrades();
          console.log('Migrated',oldTrades.length,'trades to per-doc format');
        } else { logTrades=[]; }
      } else {
        logTrades=newTrades;
      }
      // Sort theo thời gian tạo
      logTrades.sort((a,b)=>(a.openTime||'').localeCompare(b.openTime||''));
      window.logTrades = logTrades; // expose cho chart module
      const wlData=wlSnap.exists()?wlSnap.data():{};
      logAlerts=wlData.alerts||{};
      logLimits=wlData.limits||{d:2,w:5,m:10};
      // Đọc thẳng từ strategy watchlist Firebase → không phụ thuộc window.wlData
      const stratPairs=stratSnap.exists()?(stratSnap.data().pairs||{}):{};
      const shownPairs=Object.keys(stratPairs).filter(p=>stratPairs[p]&&stratPairs[p].__show);
      if(shownPairs.length>0){
        const oldWl=wlData.wl||{};
        logWl={};
        shownPairs.forEach(p=>{
          const old2=oldWl[p]||{};
          const src=stratPairs[p]||{};
          const ALL_TFS=['W','D','H4','H1','M30','M15','M5'];
          const srcCases=[...new Set(ALL_TFS.filter(tf=>src[tf]?.case).map(tf=>`C${src[tf].case}`))];
          const structTF=ALL_TFS.find(tf=>src[tf]?.struct);
          logWl[p]={
            bias:src.H4?.bias||old2.bias||'',
            struct:structTF?src[structTF].struct:old2.struct||'',
            waitCases:srcCases.length?srcCases:(old2.waitCases||(old2.waitCase?[old2.waitCase]:[])),
            note:old2.note||'',
            tf:{
              W:  src.W?.bias  !==undefined?src.W.bias  :old2.tf?.W  ||'',
              D:  src.D?.bias  !==undefined?src.D.bias  :old2.tf?.D  ||'',
              H4: src.H4?.bias !==undefined?src.H4.bias :old2.tf?.H4 ||'',
              H1: src.H1?.bias !==undefined?src.H1.bias :old2.tf?.H1 ||'',
              M30:src.M30?.bias!==undefined?src.M30.bias:old2.tf?.M30||'',
              M15:src.M15?.bias!==undefined?src.M15.bias:old2.tf?.M15||'',
              M5: src.M5?.bias !==undefined?src.M5.bias :old2.tf?.M5 ||'',
            }
          };
        });
      } else {
        logWl=wlData.wl||logInitWl();
      }
    }
    LOG_PAIRS.forEach(p=>{if(!logWl[p])logWl[p]={bias:'',struct:'',waitCase:'',note:'',tf:LOG_TFS.reduce((a,t)=>({...a,[t]:''}),{})}});
  }catch(e){
    console.warn('logLoad error',e);
    logTrades=[];
    logWl=logInitWl();
    logAlerts={};
    logLimits={d:2,w:5,m:10};
    LOG_PAIRS.forEach(p=>{if(!logWl[p])logWl[p]=({bias:'',struct:'',waitCase:'',note:'',tf:LOG_TFS.reduce((a,t)=>({...a,[t]:''}),{})});});
  }
}

// ── LOG WATCHLIST ─────────────────────────────────
function logRenderWL(){
  // Đọc thẳng từ window.wlData (giống Tổng quan) — không qua logWl trung gian
  const src = window.wlData || {};
  const BIAS_CLS = {up:'b-up',dn:'b-dn',side:'b-side','':'b-none'};
  const BIAS_CLS_WAIT = {up:'b-wait-up',dn:'b-wait-dn'};
  const BIAS_LBL = {up:'↑ '+(window.t?window.t('wl.filter.up').replace('↑ ',''):'Tăng'),dn:'↓ '+(window.t?window.t('wl.filter.dn').replace('↓ ',''):'Giảm'),side:'↔ '+(window.t?window.t('wl.filter.side').replace('↔ ',''):'Side'),'':'—'};
  const BIAS_LBL_WAIT = {up:'<span class="hg">⏳</span> '+(window.t?window.t('wl.filter.up').replace('↑ ',''):'Tăng'),dn:'<span class="hg">⏳</span> '+(window.t?window.t('wl.filter.dn').replace('↓ ',''):'Giảm')};
  const CASE_COL = {'1':'var(--blue)','2':'var(--ink-2)','3':'var(--red)','4':'#b8860b'};

  // Chỉ lấy pairs có __show, giữ đúng thứ tự LOG_PAIRS
  let pairs = LOG_PAIRS.filter(p => src[p]?.__show);

  // Lọc theo case nếu có filter
  if(logFilterCaseSet.size > 0){
    pairs = pairs.filter(p => {
      const pd = src[p] || {};
      return LOG_TFS.some(tf => {
        const d = pd[tf];
        if (!d?.case) return false;
        if (logFilterCaseSet.has('C'+d.case)) return true;
        if (logFilterCaseSet.has('C4') && d.case === '3' && d.alsoC4) return true;
        return false;
      });
    });
  }

  const countEl = document.getElementById('lwl-count');
  if(countEl) countEl.textContent = window.t('js.watchlist.count').replace('{n}', pairs.length);
  const body = document.getElementById('lwl-body');
  if(!body) return;
  body.innerHTML = '';
  pairs.forEach(pair=>{
    const pd = src[pair] || {};
    const note = logWl[pair]?.note || '';
    const tr = document.createElement('tr');
    tr.className = 'log-wl-row';
    tr.dataset.pair = pair;
    tr.onclick = null;
    tr.innerHTML = `
      <td><span style="font-weight:700;color:var(--ink)">${pair}</span></td>
      ${LOG_TFS.map(tf=>{
        const d=pd[tf]||{};
        const bias=d.bias||'';
        const _isW = !!(d.waiting && (bias === 'up' || bias === 'dn'));
        const cls=_isW?(BIAS_CLS_WAIT[bias]||'b-none'):(BIAS_CLS[bias]||'b-none');
        const lbl=_isW?(BIAS_LBL_WAIT[bias]||'—'):(BIAS_LBL[bias]||'—');
        const c=d.case||'';
        const caseBadge=c?`<span class="wl-c-label" style="margin-left:3px;background:${CASE_COL[c]||'#888'};color:#fff">C${c}</span>${c==='3'&&d.alsoC4?`<span class="wl-c-label" style="margin-left:2px;background:#e6a817;color:#fff">C4</span>`:''}`:'';
        return`<td><span class="wl-badge ${cls}">${lbl}</span>${caseBadge}</td>`;
      }).join('')}
      ${window.isViewOnly ? '<td></td>' : `<td><button class="log-btn-addlog" onclick="logOpenChecklist('${pair}')">＋${window.t('lbl.log')}</button></td>`}`;
    body.appendChild(tr);
  });
}

// ── BASE64 IMAGE STORAGE ──────────────────────────
// Đọc ảnh gốc không nén — mỗi ảnh lưu vào document riêng trong subcollection
// Firestore giới hạn 1MB/document → ảnh dưới ~750KB là ổn (base64 tăng ~33%)
// Screenshot chart thường 100-400KB → hoàn toàn trong ngưỡng

function readImageAsBase64(file){
  return new Promise((resolve)=>{
    // Kiểm tra kích thước — cảnh báo nếu > 750KB
    if(file.size > 750 * 1024){
      showToast(`⚠️ Ảnh "${file.name}" nặng ${Math.round(file.size/1024)}KB — nên dưới 750KB`);
    }
    const reader = new FileReader();
    reader.onerror = () => resolve(null);
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

function logRenderSnapshot(sym, savedSnap){
  const wrap=document.getElementById('lf-snapshot-wrap');
  const symEl=document.getElementById('lf-snapshot-sym');
  const rows=document.getElementById('lf-snapshot-rows');
  if(!wrap||!rows)return;
  // Khi sửa lệnh cũ: dùng snapshot đã lưu, không lấy wlData hiện tại
  const src = savedSnap || (window.wlData||{})[sym] || {};
  const BIAS_LABEL={'up':()=>window.t('bias.up'),'dn':()=>window.t('bias.dn'),'side':()=>window.t('bias.side'),'':()=>'—'};
  const BIAS_CLS={'up':'b-up','dn':'b-dn','side':'b-side','':'b-none'};
  const TFS=['W','D','H4','H1','M30','M15','M5'];
  const hasSrc=TFS.some(tf=>src[tf]?.bias);
  // Always show wrap (manual mode needs it even if no wlData)
  wrap.style.display='';
  if(symEl)symEl.textContent=sym;
  const CASE_COL={'1':'var(--blue)','2':'var(--ink-2)','3':'var(--red)','4':'#b8860b'};
  if(hasSrc){
    rows.innerHTML=TFS.map(tf=>{
      const d=src[tf]||{};
      if(!d.bias&&!d.case)return'';
      const _snW=!!(d.waiting&&(d.bias==='up'||d.bias==='dn'));
      const bCls=_snW?(BIAS_CLASS_WAIT[d.bias]||'b-none'):(BIAS_CLS[d.bias||'']||'b-none');
      const bLbl=_snW?(BIAS_LABEL_WAIT[d.bias]?BIAS_LABEL_WAIT[d.bias]():'—'):(BIAS_LABEL[d.bias||'']());
      const cBadge=d.case?`<span style="margin-left:3px;font-size:0.6rem;font-weight:700;padding:1px 4px;border-radius:2px;background:${CASE_COL[d.case]||'#888'};color:#fff">C${d.case}</span>`:'';
      return`<div style="display:flex;align-items:center;gap:4px;padding:3px 6px;background:var(--surface);border:1px solid var(--border);border-radius:3px">
        <span style="font-size:0.6rem;color:var(--faint);font-weight:600;width:26px">${tf}</span>
        <span class="wl-badge ${bCls}" style="font-size:0.6rem">${bLbl}</span>${cBadge}
        ${d.note?`<span style="font-size:0.6rem;color:var(--muted);margin-left:2px">${d.note}</span>`:''}
      </div>`;
    }).filter(Boolean).join('');
    rows.style.display='flex';
  } else {
    rows.innerHTML='<span style="font-size:0.7rem;color:var(--faint)">Chưa có dữ liệu watchlist cho symbol này</span>';
    rows.style.display='flex';
  }
  // If manual checkbox is checked, keep manual mode visible
  const manualCb=document.getElementById('lf-snapshot-manual');
  if(manualCb?.checked) logToggleSnapshotManual(true);
}

window.snapCasePick = (btn, tf, caseVal) => {

    b.style.color=cols[b.dataset.case]||'var(--ink)';
    b.style.borderColor='var(--border-dark)';

  if(!isActive){
    btn.dataset.active='1';
    btn.style.background = cols[caseVal]||'var(--ink)';
    btn.style.color = '#fff';
    btn.style.borderColor = cols[caseVal]||'var(--ink)';
  }
};

  g('lf-entry-tf').value=trade?.entryTF||'';
  g('lf-session').value=trade?.session||'London';
  g('lf-emotion').value=trade?.emotion||'Bình tĩnh';
  g('lf-volume').value=trade?.volume||'';
  g('lf-open').value=trade?.openPrice||'';
  g('lf-close').value=trade?.closePrice||'';
  g('lf-sl').value=trade?.sl||'';
  g('lf-tp').value=trade?.tp||'';
  // Trigger RR calc after setting open/sl/tp
  setTimeout(()=>logCalcRR(),0);

  const rrActualEl=document.getElementById('lf-rr-actual');
  if(rrActualEl) rrActualEl.value=trade?.rrActual!=null?trade.rrActual:'';

  const outcome=trade?.outcome||'';
  ['sl','tp','be','open'].forEach(v=>{const el=document.getElementById('lf-outcome-'+v);if(el)el.checked=(outcome==='SL'&&v==='sl')||(outcome==='TP'&&v==='tp')||(outcome==='BE'&&v==='be')||(outcome==='Open'&&v==='open');});

  const closeTimeEl=document.getElementById('lf-close-time');
  if(closeTimeEl) closeTimeEl.value=trade?.closeTime||'';
  g('lf-note').value=trade?.note||'';
  // Load ảnh từ Firestore subcollection (lazy load khi edit)
  if(trade?.id){
    // Hiện modal trước, load ảnh sau để không bị chờ
    document.getElementById('lmodal-trade').style.display='flex';
    logFbLoadImgsForTrade(trade.id).then(({imgsByTF, resultImgs})=>{
      // Kiểm tra subcollection có ảnh không
      const subHasImgs = LOG_IMG_TFS.some(tf=>(imgsByTF[tf]||[]).length>0) || (resultImgs||[]).length>0;
      if(subHasImgs){
        // Ảnh mới: lấy từ subcollection
        LOG_IMG_TFS.forEach(tf=>{logModalImgsByTF[tf]=imgsByTF[tf]||[];});
        logModalResultImgs=resultImgs||[];
      } else {
        // Fallback data cũ: ảnh còn trong trade object (trước khi migrate)
        if(trade.imgsByTF){
          LOG_IMG_TFS.forEach(tf=>{logModalImgsByTF[tf]=(trade.imgsByTF[tf]||[]).map(x=>({...x}));});
          logModalResultImgs=(trade.resultImgs||[]).map(x=>({...x}));
        } else if(trade.imgs&&Array.isArray(trade.imgs)){
          logModalImgsByTF[LOG_IMG_TFS[0]]=trade.imgs.map(x=>({url:x.url||x}));
        } else if(trade.imgUrl){
          logModalImgsByTF[LOG_IMG_TFS[0]]=[{url:trade.imgUrl}];
        }
      }
      logImgGridRender();
      logResultImgGridRender();
    });
  } else {
    // Trade mới — không có ảnh
    logImgGridRender();
    logResultImgGridRender();
    document.getElementById('lmodal-trade').style.display='flex';
  }

  // Auto-detect closeTime nếu chưa có (load candles từ store hoặc Firebase)
  if(trade && !trade.closeTime){
    const TF_KEY_MAP = {M1:'m1',M5:'m5',M15:'m15',M30:'m30',H1:'h1',H4:'h4',D:'D'};
    const tfKey = TF_KEY_MAP[trade.entryTF] || 'm5';
    const sym2  = trade.symbol;
    const store = window.chtStore || {};
    let candles2 = store[sym2+'_'+tfKey] || [];
    if(!candles2.length){
      const anyKey = Object.keys(store).find(k=>k.startsWith(sym2+'_'));
      if(anyKey) candles2 = store[anyKey];
    }
    const runDetect = (cls) => {
      if(!cls.length) return;
      const found = window.chtDetectCloseTime && window.chtDetectCloseTime(trade, cls);
      if(found){
        const closeTimeEl2 = document.getElementById('lf-close-time');
        if(closeTimeEl2 && !closeTimeEl2.value) closeTimeEl2.value = found.closeTime;
        window.logAutoDetectOutcome && window.logAutoDetectOutcome();
      }
    };
    if(candles2.length){
      runDetect(candles2);
    } else if(typeof chtLoadFromFirestore === 'function'){
      const statusEl2 = document.getElementById('lf-autodetect-status');
      if(statusEl2) statusEl2.textContent = '⏳ Đang tải candle data...';
      chtLoadFromFirestore(sym2, tfKey).then(c => runDetect(c)).catch(()=>{});
    }
  }
}

window.logCalcRR = ()=>{
  const open=parseFloat(document.getElementById('lf-open')?.value);
  const sl=parseFloat(document.getElementById('lf-sl')?.value);
  const tp=parseFloat(document.getElementById('lf-tp')?.value);
  const rrEl=document.getElementById('lf-rr');
  if(!rrEl)return;
  if(isNaN(open)||isNaN(sl)||isNaN(tp)||sl===open){
    rrEl.value='';rrEl.style.color='var(--faint)';return;
  }
  const risk=Math.abs(open-sl);
  const reward=Math.abs(tp-open);
  const rr=+(reward/risk).toFixed(2);
  rrEl.value='1 : '+rr;
  rrEl.style.color=rr>=2?'var(--green)':rr>=1?'var(--ink)':'var(--red)';
  // Style rrActual if filled
  const rrActualEl=document.getElementById('lf-rr-actual');
  if(rrActualEl&&rrActualEl.value){
    const ra=parseFloat(rrActualEl.value);
    if(!isNaN(ra))rrActualEl.style.color=ra>=2?'var(--green)':ra>=1?'var(--ink)':'var(--red)';
  }
};

// ── AUTO-DETECT OUTCOME từ candle data ────────────────
window.logAutoDetectOutcome = ()=>{
  const entry  = parseFloat(document.getElementById('lf-open')?.value);
  const sl     = parseFloat(document.getElementById('lf-sl')?.value);
  const tp     = parseFloat(document.getElementById('lf-tp')?.value);
  const ot     = document.getElementById('lf-time')?.value;
  const type   = logGetType(); // 'BUY' or 'SELL'
  const sym    = document.getElementById('lf-symbol')?.value;
  const entryTF= document.getElementById('lf-entry-tf')?.value; // e.g. 'M5'

  const statusEl = document.getElementById('lf-autodetect-status');
  const set = (txt, color) => { if(statusEl){ statusEl.textContent=txt; statusEl.style.color=color||'var(--muted)'; } };

  if(isNaN(entry)||isNaN(sl)||isNaN(tp)||!ot||!sym){
    set('Điền đủ Entry / SL / TP / Open Time để tự phát hiện','var(--faint)');
    return;
  }

  // Lấy candles sau openTime từ chtStore
  const TF_KEY_MAP = {M1:'m1',M5:'m5',M15:'m15',M30:'m30',H1:'h1',H4:'h4',D:'D'};
  const tfKey = TF_KEY_MAP[entryTF] || 'm5';
  const store = window.chtStore || {};
  // Thử entryTF trước, sau đó dùng bất kỳ TF có data của sym
  let candles = store[sym+'_'+tfKey] || [];
  if(!candles.length){
    const anyKey = Object.keys(store).find(k=>k.startsWith(sym+'_'));
    if(anyKey) candles = store[anyKey];
  }
  if(!candles.length){
    set('⚠️ Chưa có candle data — upload CSV trước','var(--red)');
    return;
  }

  // openTime format "YYYY-MM-DDTHH:mm" = UTC (khớp candle.time UTC) → parse thẳng dạng UTC
  const toTs = s => {
    if(!s) return null;
    if(s.length<=16 && !s.endsWith('Z') && !s.includes('+') && !s.includes('-',10))
      return Math.floor(new Date(s+':00Z').getTime()/1000);
    return Math.floor(new Date(s).getTime()/1000);
  };
  const openTs = toTs(ot);
  if(!openTs){ set('Open Time không hợp lệ','var(--red)'); return; }

  // Lọc nến SAU thời điểm vào lệnh
  const afterCandles = candles.filter(c => c.time > openTs);
  if(!afterCandles.length){
    set('Không có nến nào sau Open Time trong data hiện tại','var(--faint)');
    return;
  }

  const isBuy  = type === 'BUY';
  const risk   = Math.abs(entry - sl);
  const rr1Target = isBuy ? entry + risk : entry - risk; // giá đạt RR 1:1

  let hitTp=null, hitSl=null, hitBe=null;
  let rr1Reached = false;

  for(const c of afterCandles){
    // Kiểm tra TP
    if(!hitTp){
      if(isBuy  && c.high >= tp) hitTp = c;
      if(!isBuy && c.low  <= tp) hitTp = c;
    }
    // Kiểm tra SL
    if(!hitSl){
      if(isBuy  && c.low  <= sl) hitSl = c;
      if(!isBuy && c.high >= sl) hitSl = c;
    }
    // Theo dõi RR 1:1
    if(!rr1Reached){
      if(isBuy  && c.high >= rr1Target) rr1Reached = true;
      if(!isBuy && c.low  <= rr1Target) rr1Reached = true;
    }
    // BE: đã đạt RR 1:1 và nến quay lại chạm entry
    if(rr1Reached && !hitBe){
      if(isBuy  && c.low  <= entry) hitBe = c;
      if(!isBuy && c.high >= entry) hitBe = c;
    }
  }

  // Xác định outcome theo thứ tự nến xảy ra trước
  const candidates = [
    hitTp ? { outcome:'TP', time:hitTp.time, candle:hitTp } : null,
    hitSl ? { outcome:'SL', time:hitSl.time, candle:hitSl } : null,
    hitBe ? { outcome:'BE', time:hitBe.time, candle:hitBe } : null,
  ].filter(Boolean);

  if(!candidates.length){
    set('📊 Chưa chạm TP / SL / BE — lệnh vẫn đang mở','var(--blue)');
    document.getElementById('lf-outcome-open')?.click();
    return;
  }

  // Với BE: chỉ tính nếu nó xảy ra TRƯỚC khi TP hoặc SL
  // → loại BE nếu TP/SL xảy ra trước nó
  const tpTime = hitTp?.time || Infinity;
  const slTime = hitSl?.time || Infinity;
  const beTime = hitBe?.time || Infinity;

  let result;
  if(beTime < tpTime && beTime < slTime){
    result = { outcome:'BE', candle: hitBe };
  } else {
    // Lấy cái xảy ra sớm nhất giữa TP và SL
    if(tpTime <= slTime) result = { outcome:'TP', candle: hitTp };
    else                 result = { outcome:'SL', candle: hitSl };
  }

  // Set radio outcome
  const radioMap = {TP:'lf-outcome-tp', SL:'lf-outcome-sl', BE:'lf-outcome-be'};
  document.getElementById(radioMap[result.outcome])?.click();

  // closeTime lưu cùng format UTC string với openTime (không cộng 7h)
  const closeTimeEl = document.getElementById('lf-close-time');
  if(closeTimeEl && result.candle){
    closeTimeEl.value = new Date(result.candle.time * 1000).toISOString().slice(0,16);
  }

  const colors = {TP:'var(--green)', SL:'var(--red)', BE:'#c9a84c'};
  // Hiển thị giờ UTC (khớp với tooltip chart "21:25 UTC")
  const timeStr = new Date(result.candle.time * 1000).toISOString().slice(0,16).replace('T',' ');
  set(`✅ Phát hiện: ${result.outcome} lúc ${timeStr} UTC`, colors[result.outcome]);
};

window.logViewImgByTF2=(tradeId,tf,tfIdx)=>{
  // Ảnh đã được render vào DOM bởi logLazyLoadThumbnails
  // → đọc src trực tiếp từ img trong thumbrow thay vì tìm trong RAM
  const row=document.getElementById('thumbrow-'+tradeId);
  if(row){
    const imgs=row.querySelectorAll('img');
    // Tìm img đúng TF và index
    let count=-1;
    for(const img of imgs){
      if(img.title.startsWith(tf+' ·')){
        count++;
        if(count===tfIdx){ logOpenImgViewer(img.src, tf); return; }
      }
    }
    // fallback: lấy theo tổng index
    if(imgs[tfIdx]){ logOpenImgViewer(imgs[tfIdx].src, tf); return; }
  }
  // fallback cuối: tìm trong RAM (data cũ)
  const t=logTrades.find(x=>x.id===tradeId);if(!t)return;
  if(tf&&t.imgsByTF){
    const url=(t.imgsByTF[tf]||[])[tfIdx]?.url||'';
    if(url){ logOpenImgViewer(url,tf); return; }
  }
  const legacyImgs=t.imgs&&t.imgs.length?t.imgs:(t.imgUrl?[{url:t.imgUrl}]:[]);
  const item=legacyImgs[tfIdx];
  const url=item?.url||item||'';
  if(url) logOpenImgViewer(url,'');
};

// Toggle ảnh cho 1 trade card — load on-demand khi click
window.logToggleImgs = async (tradeId) => {
  const row = document.getElementById('thumbrow-'+tradeId);
  const toggle = document.getElementById('thumbrow-toggle-'+tradeId);
  const label = document.getElementById('thumbrow-label-'+tradeId);
  if(!row) return;

  const isOpen = row.style.display !== 'none';
  if(isOpen){
    // Đóng lại
    row.style.display = 'none';
    if(toggle) { toggle.querySelector('span:last-child').lastChild.textContent=' ▼'; }
    return;
  }

  // Mở ra
  row.style.display = 'flex';
  if(toggle) { toggle.querySelector('span:last-child').lastChild.textContent=' ▲'; }

  // Nếu đã load rồi thì thôi
  if(row.dataset.loaded === '1') return;

  row.innerHTML = '<span style="font-size:10px;color:var(--faint)">⏳ '+window.t('js.img.loading')+'</span>';

  const t = logTrades.find(x=>x.id===tradeId);
  if(!t){ row.innerHTML=''; return; }

  let imgsByTF={}, resultImgs=[];

  if(t.imgsByTF && LOG_IMG_TFS.some(tf=>(t.imgsByTF[tf]||[]).length>0)){
    imgsByTF=t.imgsByTF; resultImgs=t.resultImgs||[];
  } else if(t.imgs&&t.imgs.length){
    imgsByTF={[LOG_IMG_TFS[0]]:t.imgs.map(x=>({url:x.url||x}))};
  } else if(t.imgUrl){
    imgsByTF={[LOG_IMG_TFS[0]]:[{url:t.imgUrl}]};
  } else {
    try{
      const loaded=await logFbLoadImgsForTrade(tradeId);
      imgsByTF=loaded.imgsByTF; resultImgs=loaded.resultImgs;
    }catch(e){ row.innerHTML='<span style="font-size:10px;color:var(--faint)">'+window.t('js.img.load.error')+'</span>'; return; }
  }

  const thumbStyle='height:50px;width:68px;object-fit:cover;border-radius:4px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:block;transition:border-color .15s,transform .15s;';
  let html='';
  LOG_IMG_TFS.forEach(tf=>{
    const imgs=imgsByTF[tf]||[];
    if(!imgs.length)return;
    const thumbs=imgs.map((img,i)=>`<img src="${img.url}" onclick="logViewImgByTF2('${tradeId}','${tf}',${i})" title="${tf} · ${window.t('js.img.unit')} ${i+1}" style="${thumbStyle}" onmouseover="this.style.borderColor='var(--ink-2)';this.style.transform='scale(1.04)'" onmouseout="this.style.borderColor='var(--border)';this.style.transform='scale(1)'" />`).join('');
    html+=`<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;"><span style="font-size:9px;font-weight:700;color:var(--faint);white-space:nowrap;min-width:22px;">${tf}</span><div style="display:flex;gap:4px;">${thumbs}</div></div>`;
  });
  if(resultImgs.length){
    const rThumbs=resultImgs.map((img,i)=>{
      const safeUrl=img.url.replace(/"/g,'&quot;');
      return `<img src="${safeUrl}" data-viewer-url="${safeUrl}" data-viewer-label="${window.t('js.img.result')}" title="${window.t('js.img.result')} · ${window.t('js.img.unit')} ${i+1}" style="${thumbStyle.replace('var(--border)','var(--green)')}" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform='scale(1)'" />`;
    }).join('');
    html+=`<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;"><span style="font-size:9px;font-weight:700;color:var(--green);white-space:nowrap;min-width:22px;">KQ</span><div style="display:flex;gap:4px;">${rThumbs}</div></div>`;
  }

  row.innerHTML = html || '<span style="font-size:10px;color:var(--faint)">'+window.t('js.img.none')+'</span>';
  row.dataset.loaded = '1';

  // Gắn click handler cho ảnh kết quả dùng data-viewer-url (tránh lỗi quote trong onclick)
  row.querySelectorAll('img[data-viewer-url]').forEach(img=>{
    img.addEventListener('click', ()=>logOpenImgViewer(img.dataset.viewerUrl, img.dataset.viewerLabel||''));
  });

  // Cập nhật label số ảnh
  const totalImgs = LOG_IMG_TFS.reduce((s,tf)=>s+(imgsByTF[tf]||[]).length,0)+resultImgs.length;
  if(label && totalImgs>0) label.innerHTML=totalImgs+' '+window.t('js.img.unit')+' <span style="font-size:9px;opacity:.5;">▲</span>';
};

// Load thumbnail cho tất cả trade card đang hiển thị
async function logLazyLoadThumbnails(trades){
  const uid=(window.currentUser&&window.currentUser.uid)||'shared_user';
  for(const t of trades){
    const row=document.getElementById('thumbrow-'+t.id);
    if(!row)continue;

    let imgsByTF={}, resultImgs=[];

    // Ưu tiên: data cũ còn trong trade object (không cần Firestore)
    if(t.imgsByTF && LOG_IMG_TFS.some(tf=>(t.imgsByTF[tf]||[]).length>0)){
      imgsByTF=t.imgsByTF;
      resultImgs=t.resultImgs||[];
    } else if(t.imgs&&t.imgs.length){
      imgsByTF={[LOG_IMG_TFS[0]]:t.imgs.map(x=>({url:x.url||x,tf:LOG_IMG_TFS[0]}))};
    } else if(t.imgUrl){
      imgsByTF={[LOG_IMG_TFS[0]]:[{url:t.imgUrl}]};
    } else {
      // Luôn thử load subcollection — dù imgCount = 0 hay undefined
      try{
        const loaded=await logFbLoadImgsForTrade(t.id);
        imgsByTF=loaded.imgsByTF;
        resultImgs=loaded.resultImgs;
      }catch(e){ continue; }
    }

    // Render thumbnails vào row
    const thumbStyle='height:50px;width:68px;object-fit:cover;border-radius:4px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:block;transition:border-color .15s,transform .15s;';
    let html='';
    LOG_IMG_TFS.forEach(tf=>{
      const imgs=imgsByTF[tf]||[];
      if(!imgs.length)return;
      const thumbs=imgs.map((img,i)=>`<img src="${img.url}" onclick="logViewImgByTF2('${t.id}','${tf}',${i})" title="${tf} · ${window.t('js.img.unit')} ${i+1}" style="${thumbStyle}" onmouseover="this.style.borderColor='var(--ink-2)';this.style.transform='scale(1.04)'" onmouseout="this.style.borderColor='var(--border)';this.style.transform='scale(1)'" />`).join('');
      html+=`<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;"><span style="font-size:9px;font-weight:700;color:var(--faint);white-space:nowrap;min-width:22px;">${tf}</span><div style="display:flex;gap:4px;">${thumbs}</div></div>`;
    });
    if(resultImgs.length){
      const rThumbs=resultImgs.map((img,i)=>`<img src="${img.url}" onclick="logOpenImgViewer('${img.url}','${window.t('js.img.result')}')" title="${window.t('js.img.result')} · ${window.t('js.img.unit')} ${i+1}" style="${thumbStyle.replace('var(--border)','var(--green)')}" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform='scale(1)'" />`).join('');
      html+=`<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;"><span style="font-size:9px;font-weight:700;color:var(--green);white-space:nowrap;min-width:22px;">KQ</span><div style="display:flex;gap:4px;">${rThumbs}</div></div>`;
    }
    if(html){
      row.innerHTML=html;
    } else {
      // Không có ảnh — ẩn row đi cho gọn
      row.style.display='none';
    }
  }
}

// ── LOG STATS ─────────────────────────────────────
function logDestroyChart(k){if(logCharts[k]){logCharts[k].destroy();delete logCharts[k];}}
function logRenderStats(){
  const kpiGrid=document.getElementById('lkpi-grid');
  if(!logTrades.length){if(kpiGrid)kpiGrid.innerHTML='<div style="color:var(--muted);padding:1rem">📊 '+window.t('js.noorders')+'</div>';return;}
  // Chỉ tính lệnh thuộc 4 case (loại case "other")
  const caseTrades = logTrades.filter(t=>LOG_CASES.includes(t.caseType));
  // Phân loại theo outcome trước, fallback sang profit nếu không có outcome
  const tpTrades  = caseTrades.filter(t=>t.outcome==='TP');
  const slTrades  = caseTrades.filter(t=>t.outcome==='SL');
  const beTrades  = caseTrades.filter(t=>t.outcome==='BE');
  const openTrades= caseTrades.filter(t=>t.outcome==='Open');
  const closedN   = tpTrades.length + slTrades.length; // BE không tính vào win rate
  // Net Profit tính tất cả (kể cả 0)
  const total=+caseTrades.reduce((s,t)=>s+(t.profit||0),0).toFixed(2);
  // Win rate = TP / (TP + SL), BE không tính vào win cũng không tính vào loss
  const wr = closedN ? +(tpTrades.length/closedN*100).toFixed(1) : 0;
  const gw = tpTrades.reduce((s,t)=>s+(t.profit||0),0);
  const gl = Math.abs(slTrades.reduce((s,t)=>s+(t.profit||0),0));
  const pf = gl>0?+(gw/gl).toFixed(2):'∞';
  const kpis=[
    {l:window.t('js.kpi.total'),    v:caseTrades.length,       u:'',                        cls:'', valcls:''},
    {l:window.t('js.kpi.winrate'),  v:closedN?wr:'—',          u:closedN?'%':'',            cls:'', valcls:''},
    {l:window.t('js.kpi.tp'),       v:tpTrades.length,         u:' '+window.t('js.order'),  cls:'',       valcls:''},
    {l:window.t('js.kpi.sl'),       v:slTrades.length,         u:' '+window.t('js.order'),  cls:'',       valcls:''},
    {l:window.t('js.kpi.be'),       v:beTrades.length,         u:' '+window.t('js.order'),  cls:'kpi-be', valcls:''},
    {l:window.t('js.kpi.open'),     v:openTrades.length,       u:' '+window.t('js.order'),  cls:'kpi-blue', valcls:''},
  ];
  if(kpiGrid){
    kpiGrid.style.gridTemplateColumns='repeat(6,1fr)';
    kpiGrid.innerHTML=kpis.map(k=>`
    <div class="log-kpi-card ${k.cls||''}">
      <div class="log-kpi-label">${k.l}</div>
      <div class="log-kpi-val ${k.valcls||''}">${k.v}<span class="log-kpi-unit">${k.u}</span></div>
    </div>`).join('');
  }

  // Equity curve
  const sorted=logTrades.slice().sort((a,b)=>new Date(a.openTime)-new Date(b.openTime));
  const eqData=sorted.reduce((arr,t,i)=>{const prev=arr[i-1]||0;return[...arr,+(prev+t.profit).toFixed(2)];},[]);
  logDestroyChart('equity');
  const ctx1=document.getElementById('lchart-equity')?.getContext('2d');
  if(ctx1){
    const grad=ctx1.createLinearGradient(0,0,0,160);
    grad.addColorStop(0,'rgba(44,74,124,.18)');grad.addColorStop(1,'rgba(44,74,124,0)');
    logCharts['equity']=new Chart(ctx1,{type:'line',data:{labels:sorted.map((_,i)=>'#'+(i+1)),datasets:[{data:eqData,borderColor:'var(--blue)',borderWidth:1.5,fill:true,backgroundColor:grad,pointRadius:0,tension:.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'var(--faint)',font:{size:9}}},y:{grid:{color:'rgba(0,0,0,.07)'},ticks:{color:'var(--faint)',font:{size:9}}}}}});
  }

  // Symbol profit
  const bySym={};
  logTrades.forEach(t=>{if(!bySym[t.symbol])bySym[t.symbol]=0;bySym[t.symbol]+=t.profit;});
  const symE=Object.entries(bySym).map(([s,p])=>({s,p:+p.toFixed(2)})).sort((a,b)=>b.p-a.p).slice(0,8);
  logDestroyChart('sym');
  const ctx2=document.getElementById('lchart-sym')?.getContext('2d');
  if(ctx2) logCharts['sym']=new Chart(ctx2,{type:'bar',data:{labels:symE.map(e=>e.s),datasets:[{data:symE.map(e=>e.p),backgroundColor:symE.map(e=>e.p>=0?'rgba(26,122,82,.70)':'rgba(192,57,43,.70)'),borderRadius:3,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(0,0,0,.07)'},ticks:{color:'#666',font:{size:9}}},y:{grid:{display:false},ticks:{color:'#444',font:{size:9}}}}}});

  // Case stats
  const caseEl=document.getElementById('lcase-stats');
  if(caseEl) caseEl.innerHTML=LOG_CASES.map(c=>{
    const t=logTrades.filter(x=>x.caseType===c);
    const closed=t.filter(x=>x.outcome==='TP'||x.outcome==='SL'); // BE không tính vào win rate
    const w=t.filter(x=>x.outcome==='TP');
    const wr2=closed.length?+(w.length/closed.length*100).toFixed(0):0;
    const col=c==='Case 04'?'#e6a817':wr2>=60?'#16a34a':wr2>0?'#2563eb':'var(--border)';
    const txtCol=c==='Case 04'?'#e6a817':wr2>=60?'#16a34a':wr2>0?'#2563eb':'var(--muted)';
    return `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:5px">
        <span style="color:var(--ink-2);font-weight:600">${c.replace('Case ','C')} <span style="color:var(--muted);font-weight:400">(${t.length})</span></span>
        <span style="color:${txtCol};font-weight:700;font-size:11px">${wr2}%</span>
      </div>
      <div style="height:5px;background:var(--border);border-radius:3px"><div style="height:5px;border-radius:3px;background:${col};width:${wr2}%"></div></div>
    </div>`;
  }).join('');

  // Session (chỉ tính lệnh thuộc 4 case)
  const sessEl=document.getElementById('lsess-grid');
  if(sessEl) sessEl.innerHTML=LOG_SESSIONS.map(s=>{
    const t=caseTrades.filter(x=>x.session===s);
    const closed=t.filter(x=>x.outcome==='TP'||x.outcome==='SL'); // BE không tính vào win rate
    const w=t.filter(x=>x.outcome==='TP');
    const wr2=closed.length?+(w.length/closed.length*100).toFixed(0):0;
    const col=wr2>=60?'#16a34a':wr2>=40?'#d97706':'#dc2626';
    return `<div class="log-sess-item"><div style="font-size:10px;color:var(--muted)">${s}</div><div style="font-size:18px;font-weight:700;color:${col}">${wr2}%</div><div style="font-size:10px;color:var(--ink-2)">${t.length} ${window.t('js.order')}</div></div>`;
  }).join('');

  // Emotion
  const emoEl=document.getElementById('lemo-stats');
  if(emoEl){
    const emoData=LOG_EMOTIONS.map(em=>{
      const trades_em=logTrades.filter(x=>x.emotion===em);
      const closed2=trades_em.filter(x=>x.outcome==='TP'||x.outcome==='SL');
      const w2=trades_em.filter(x=>x.outcome==='TP');
      return{name:em,wr:closed2.length?+(w2.length/closed2.length*100).toFixed(0):0,n:trades_em.length};
    }).filter(x=>x.n>0);
    // Map emotion key sang tên dịch
    const emoLabel={[LOG_EMOTIONS[0]]:window.t('js.emo.calm'),[LOG_EMOTIONS[1]]:window.t('js.emo.fomo'),[LOG_EMOTIONS[2]]:window.t('js.emo.hesitate'),[LOG_EMOTIONS[3]]:window.t('js.emo.confident'),[LOG_EMOTIONS[4]]:window.t('js.emo.tired')};
    emoEl.innerHTML=emoData.map(e=>`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:11px;color:var(--ink-2);width:70px">${emoLabel[e.name]||e.name}</span>
        <div style="flex:1;height:4px;background:var(--border);border-radius:2px"><div style="height:4px;border-radius:2px;background:${e.name==='FOMO'?'#dc2626':e.name===LOG_EMOTIONS[0]?'#16a34a':'#d97706'};width:${e.wr}%"></div></div>
        <span style="font-size:11px;color:var(--ink);font-weight:700;width:30px">${e.wr}%</span>
      </div>`).join('')+(emoData.find(e=>e.name==='FOMO'&&e.wr<45)?`<div style="font-size:11px;color:var(--red);margin-top:8px">${window.t('js.fomo.warn')}</div>`:'');
  }
  logRenderDD();

  // ── RR Helpers ────────────────────────────────
  // Auto: chỉ dùng RR tự động tính từ open/sl/tp (hoặc stored rr field)
  const getRR_auto = t => {
    const stored = parseFloat(t.rr);
    if(!isNaN(stored) && stored > 0) return stored;
    const open=parseFloat(t.openPrice), sl=parseFloat(t.sl), tp=parseFloat(t.tp);
    if(isNaN(open)||isNaN(sl)||isNaN(tp)||sl===open) return NaN;
    return +(Math.abs(tp-open)/Math.abs(open-sl)).toFixed(2);
  };
  // Actual: chỉ dùng rrActual (RR MAX thực tế), KHÔNG fallback về auto
  const getRR_actual = t => {
    const actual = parseFloat(t.rrActual);
    if(!isNaN(actual) && actual > 0) return actual;
    return NaN;
  };

  // Helper render horizontal bar chart
  function _renderRRChart(canvasId, chartKey, data, tooltipLabel) {
    logDestroyChart(chartKey);
    const ctx=document.getElementById(canvasId)?.getContext('2d');
    if(!ctx) return;
    if(data.length){
      logCharts[chartKey]=new Chart(ctx,{type:'bar',data:{labels:data.map(e=>e.label||e.s),datasets:[{data:data.map(e=>e.rr||e.avg),backgroundColor:data.map(e=>{const v=e.rr||e.avg;return v>=2?'rgba(34,211,151,0.95)':v>=1?'rgba(59,130,246,0.95)':'rgba(249,115,22,0.95)';}),borderRadius:3,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+tooltipLabel+': 1:'+c.parsed.x}}},scales:{x:{grid:{color:'rgba(0,0,0,.07)'},ticks:{color:'#666',font:{size:9}}},y:{grid:{display:false},ticks:{color:'#444',font:{size:9}}}}}});
    } else {
      const el=document.getElementById(canvasId);
      if(el) el.parentElement.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:160px;font-size:0.72rem;color:var(--faint)">Chưa có dữ liệu RR</div>';
    }
  }

  // ── RR theo Symbol × Case (auto + actual) ──────
  const CASES_SHORT=['C1','C2','C3','C4'];
  const CASES_FULL=['Case 01','Case 02','Case 03','Case 04'];
  const CASE_COLORS=['#0077bb','#ee7733','#009988','#cc3311'];

  // Tập hợp dữ liệu: symCaseRR[sym][caseShort] = {sumAuto, nAuto, sumActual, nActual}
  const symCaseRR={};
  // Win rate: symCaseWR[sym][caseShort] = {w, total}
  const symCaseWR={};
  // Session win rate: symSessWR[sym][session] = {w, total}
  const symSessWR={};
  // Per-case-session win rate: symCaseSessWR[sym][caseShort][session] = {w, total}
  const symCaseSessWR={};

  logTrades.forEach(t=>{
    const sym=t.symbol; if(!sym) return;
    const ci=CASES_FULL.indexOf(t.caseType); if(ci<0) return;
    const cs=CASES_SHORT[ci];
    const closed=(t.outcome==='TP'||t.outcome==='SL');

    // RR (TP only)
    if(t.outcome==='TP'){
      if(!symCaseRR[sym]) symCaseRR[sym]={};
      if(!symCaseRR[sym][cs]) symCaseRR[sym][cs]={sumAuto:0,nAuto:0,sumActual:0,nActual:0};
      const rA=getRR_auto(t); if(!isNaN(rA)&&rA>0){symCaseRR[sym][cs].sumAuto+=rA;symCaseRR[sym][cs].nAuto++;}
      const rM=getRR_actual(t); if(!isNaN(rM)&&rM>0){symCaseRR[sym][cs].sumActual+=rM;symCaseRR[sym][cs].nActual++;}
    }

    // Case Win Rate (all closed)
    if(closed){
      if(!symCaseWR[sym]) symCaseWR[sym]={};
      if(!symCaseWR[sym][cs]) symCaseWR[sym][cs]={w:0,total:0};
      symCaseWR[sym][cs].total++;
      if(t.outcome==='TP') symCaseWR[sym][cs].w++;
    }

    // Session Win Rate (all closed) — global per sym
    if(closed && t.session){
      if(!symSessWR[sym]) symSessWR[sym]={};
      if(!symSessWR[sym][t.session]) symSessWR[sym][t.session]={w:0,total:0};
      symSessWR[sym][t.session].total++;
      if(t.outcome==='TP') symSessWR[sym][t.session].w++;
    }

    // Session Win Rate per case (all closed)
    if(closed && t.session){
      if(!symCaseSessWR[sym]) symCaseSessWR[sym]={};
      if(!symCaseSessWR[sym][cs]) symCaseSessWR[sym][cs]={};
      if(!symCaseSessWR[sym][cs][t.session]) symCaseSessWR[sym][cs][t.session]={w:0,total:0};
      symCaseSessWR[sym][cs][t.session].total++;
      if(t.outcome==='TP') symCaseSessWR[sym][cs][t.session].w++;
    }
  });

  // Helper: render mini stats table for a symbol (case WR + session WR)
  const wrCol=p=>p>=60?'#16a34a':p>=40?'#d97706':'#dc2626';
  const mkSymSubHtml=(sym)=>{
    const caseData=CASES_SHORT.map((cs,i)=>{
      const x=(symCaseWR[sym]||{})[cs];
      if(!x||!x.total) return null;
      const pct=Math.round(x.w/x.total*100);
      return {cs,i,pct,w:x.w,sl:x.total-x.w,total:x.total};
    }).filter(Boolean);

    const sessData=Object.entries(symSessWR[sym]||{}).map(([s,x])=>{
      if(!x.total) return null;
      const pct=Math.round(x.w/x.total*100);
      return {s,pct,w:x.w,sl:x.total-x.w,total:x.total};
    }).filter(Boolean);

    if(!caseData.length&&!sessData.length) return '';

    const caseColors=['#2c4a7c','#3d3a36','#c0392b','#b8860b'];
    const caseBg=['rgba(44,74,124,0.08)','rgba(61,58,54,0.06)','rgba(192,57,43,0.08)','rgba(184,134,11,0.08)'];

    const tdSt='padding:3px 8px;font-size:0.62rem;text-align:center;border-bottom:1px solid var(--border)';
    const thSt='padding:2px 8px;font-size:0.55rem;letter-spacing:1px;text-transform:uppercase;color:var(--faint);font-weight:600;text-align:center;border-bottom:1px solid var(--border-dark)';

    let html=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">`;

    if(caseData.length){
      html+=`<table style="border-collapse:collapse;font-size:0.62rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden">
        <thead><tr>
          <th style="${thSt}">Case</th>
          <th style="${thSt}">WR</th>
          <th style="${thSt}">TP</th>
          <th style="${thSt}">SL</th>
          <th style="${thSt}">n</th>
        </tr></thead><tbody>`;
      caseData.forEach(({cs,i,pct,w,sl,total})=>{
        html+=`<tr style="background:${caseBg[i]}">
          <td style="${tdSt};font-weight:700;color:${caseColors[i]};text-align:left;padding-left:10px">${cs}</td>
          <td style="${tdSt};font-weight:700;color:${wrCol(pct)}">${pct}%</td>
          <td style="${tdSt};color:#16a34a;font-weight:600">${w}</td>
          <td style="${tdSt};color:#dc2626;font-weight:600">${sl}</td>
          <td style="${tdSt};color:var(--muted)">${total}</td>
        </tr>`;
      });
      html+=`</tbody></table>`;
    }

    if(sessData.length){
      html+=`<table style="border-collapse:collapse;font-size:0.62rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden">
        <thead><tr>
          <th style="${thSt}">Session</th>
          <th style="${thSt}">WR</th>
          <th style="${thSt}">TP</th>
          <th style="${thSt}">SL</th>
          <th style="${thSt}">n</th>
        </tr></thead><tbody>`;
      sessData.forEach(({s,pct,w,sl,total})=>{
        html+=`<tr>
          <td style="${tdSt};font-weight:600;color:var(--ink-2);text-align:left;padding-left:10px">${s}</td>
          <td style="${tdSt};font-weight:700;color:${wrCol(pct)}">${pct}%</td>
          <td style="${tdSt};color:#16a34a;font-weight:600">${w}</td>
          <td style="${tdSt};color:#dc2626;font-weight:600">${sl}</td>
          <td style="${tdSt};color:var(--muted)">${total}</td>
        </tr>`;
      });
      html+=`</tbody></table>`;
    }

    html+=`</div>`;
    return html;
  };
  // ── RR Table render helper (supports mobile case filter) ──────────
  const allSyms=[...new Set([...Object.keys(symCaseRR),...Object.keys(symCaseWR)])].sort();
  window._rrTableData={allSyms,symCaseRR,symCaseWR,symSessWR,symCaseSessWR,CASES_SHORT,CASE_COLORS,wrCol};

  function _buildRRTable(caseIdxFilter){
    const {allSyms,symCaseRR,symCaseWR,symSessWR,symCaseSessWR,CASES_SHORT,CASE_COLORS,wrCol}=window._rrTableData;
    const fmtRR=v=>v!=null?v.toFixed(2):'—';
    // Color-blind friendly: RR good=blue, mid=amber, bad=slate
    const colRR=v=>{if(v==null)return'var(--faint)';return v>=2?'#0077bb':v>=1?'#ee7733':'#bbbbbb';};
    // WR%: high=blue, mid=amber, low=slate
    const colWR=p=>{if(p==null)return'var(--faint)';return p>=60?'#0077bb':p>=40?'#ee7733':'#bbbbbb';};
    // TP=orange-amber, SL=slate
    const colTP='#ee7733';
    const colSL='#888888';
    const cases=caseIdxFilter!=null?[{cs:CASES_SHORT[caseIdxFilter],i:caseIdxFilter}]:CASES_SHORT.map((cs,i)=>({cs,i}));

    const isMob=window.innerWidth<640;
    const td=(extra='')=>`padding:${isMob?'2px 1px':'4px 3px'};text-align:center;font-size:${isMob?'0.52rem':'0.6rem'};${extra}`;
    const symW='width:1%;white-space:nowrap;';

    const lastCaseIdx=cases.length-1;
    let h=`<table style="width:100%;border-collapse:collapse;font-size:0.6rem;table-layout:auto">
      <thead>
        <tr>
          <th rowspan="2" style="${symW}padding:5px 6px 5px 8px;text-align:left;color:var(--faint);font-size:0.52rem;letter-spacing:1.5px;font-weight:600;vertical-align:bottom;background:var(--bg);border-top:3px solid var(--border);border-left:3px solid var(--border)">SYM</th>`;
    cases.forEach(({cs,i})=>{
      const isLast=i===lastCaseIdx;
      h+=`<th colspan="5" style="padding:4px 3px;text-align:center;color:${CASE_COLORS[i]};font-weight:700;font-size:0.58rem;letter-spacing:1px;border-left:2px solid var(--border);border-top:3px solid var(--border);${isLast?'border-right:3px solid var(--border);':''}">${cs}</th>`;
    });
    h+=`</tr><tr style="border-bottom:2px solid var(--border);background:var(--bg)">`;
    cases.forEach(({i})=>{
      const hfs=isMob?'0.42rem':'0.5rem';
      const isLast=i===lastCaseIdx;
      h+=`<th style="${td('border-left:2px solid var(--border);')}font-size:${hfs};color:var(--faint);font-weight:500;white-space:nowrap">AUTO</th>
          <th style="${td()}font-size:${hfs};color:#0077bb;font-weight:500;white-space:nowrap">MAX</th>
          <th style="${td()}font-size:${hfs};color:var(--muted);font-weight:500;white-space:nowrap">WR%</th>
          <th style="${td()}font-size:${hfs};color:${colTP};font-weight:500;white-space:nowrap">TP</th>
          <th style="${td(isLast?'border-right:3px solid var(--border);':'')}font-size:${hfs};color:${colSL};font-weight:500;white-space:nowrap">SL</th>`;
    });
    h+=`</tr></thead><tbody>`;

    // Accent colors cycling per symbol for left border
    const symAccents=['#0077bb','#ee7733','#009988','#cc3311','#8844aa','#bbaa00'];

    allSyms.forEach((sym,ri)=>{
      const accent=symAccents[ri%symAccents.length];
      const bg='var(--surface)';
      const sessBg='#fafafa';
      // Collect unique sessions for this sym (across all cases being shown)
      const sessSet=new Set();
      cases.forEach(({cs})=>{
        Object.keys((symCaseSessWR[sym]||{})[cs]||{}).forEach(s=>sessSet.add(s));
      });
      const sessions=[...sessSet].sort();

      // ── Main data row ──
      const isLastCase=i=>i===cases.length-1;
      const symTopB='border-top:3px solid var(--border);';
      const symBotB=sessions.length?'':'border-bottom:3px solid var(--border);';
      h+=`<tr style="background:${bg}">
        <td style="${symW}padding:6px 6px 6px 8px;font-weight:800;color:var(--ink);font-size:0.68rem;vertical-align:middle;${symTopB}${symBotB}border-left:3px solid var(--border);border-right:1px solid var(--border)">${sym}</td>`;
      cases.forEach(({cs,i})=>{
        const rr=symCaseRR[sym]?.[cs];
        const wr=symCaseWR[sym]?.[cs];
        const avgAuto=rr&&rr.nAuto?+(rr.sumAuto/rr.nAuto):null;
        const avgMax=rr&&rr.nActual?+(rr.sumActual/rr.nActual):null;
        const pct=wr&&wr.total?Math.round(wr.w/wr.total*100):null;
        const tp=wr?wr.w:null;
        const sl=wr?wr.total-wr.w:null;
        const cbg=i%2===0?'rgba(0,119,187,0.05)':'rgba(238,119,51,0.05)';
        const rightB=isLastCase(i)?'border-right:3px solid var(--border);':'';
        h+=`<td style="${td(`border-left:2px solid var(--border);background:${cbg};${symTopB}${symBotB}`)}font-weight:700;color:${colRR(avgAuto)}">${avgAuto!=null?fmtRR(avgAuto):''}</td>
            <td style="${td(`background:${cbg};${symTopB}${symBotB}`)}font-weight:700;color:${colRR(avgMax)}">${avgMax!=null?fmtRR(avgMax):''}</td>
            <td style="${td(`background:${cbg};${symTopB}${symBotB}`)}font-weight:700;color:${colWR(pct)}">${pct!=null?pct+'%':''}</td>
            <td style="${td(`background:${cbg};${symTopB}${symBotB}`)}font-weight:700;color:${tp?colTP:'var(--faint)'}">${tp!=null&&tp>0?tp:''}</td>
            <td style="${td(`background:${cbg};${symTopB}${symBotB}${rightB}`)}font-weight:700;color:${sl?colSL:'var(--faint)'}">${sl!=null&&sl>0?sl:''}</td>`;
      });
      h+=`</tr>`;

      // ── Session sub-rows ──
      sessions.forEach((sess,si)=>{
        const isLast=si===sessions.length-1;
        const sessBotB=isLast?'border-bottom:3px solid var(--border);':'';
        h+=`<tr style="background:${sessBg}">
          <td style="${symW}padding:2px 6px 2px 10px;font-size:0.52rem;font-weight:600;color:#777;white-space:nowrap;${sessBotB}border-left:3px solid var(--border);border-right:1px solid var(--border);text-align:left;font-style:italic">${sess}</td>`;
        cases.forEach(({cs,i})=>{
          const d=((symCaseSessWR[sym]||{})[cs]||{})[sess];
          const pct=d&&d.total?Math.round(d.w/d.total*100):null;
          const tp=d?d.w:null;
          const sl=d?d.total-d.w:null;
          const cbg=i%2===0?'rgba(0,119,187,0.03)':'rgba(238,119,51,0.03)';
          const rightB=isLastCase(i)?'border-right:3px solid var(--border);':'';
          h+=`<td style="${td(`border-left:2px solid var(--border);background:${cbg};${sessBotB}`)}"></td>
              <td style="${td(`background:${cbg};${sessBotB}`)}"></td>
              <td style="${td(`background:${cbg};${sessBotB}`)}font-weight:700;color:${colWR(pct)}">${pct!=null?pct+'%':''}</td>
              <td style="${td(`background:${cbg};${sessBotB}`)}font-weight:700;color:${tp?colTP:''}">${tp!=null&&tp>0?tp:''}</td>
              <td style="${td(`background:${cbg};${sessBotB}${rightB}`)}font-weight:700;color:${sl?colSL:''}">${sl!=null&&sl>0?sl:''}</td>`;
        });
        h+=`</tr>`;
      });
    });
    h+=`</tbody></table>`;
    return h;
  }

  window.logRenderRRTableMobile=function(val){
    const tblEl=document.getElementById('lrr-sym-case-table');
    if(!tblEl)return;
    const idx=val==='all'?null:parseInt(val);
    tblEl.innerHTML=_buildRRTable(idx);
  };

  const tblEl=document.getElementById('lrr-sym-case-table');
  if(tblEl){
    if(!allSyms.length){
      tblEl.innerHTML='<div style="padding:2rem;text-align:center;font-size:0.72rem;color:var(--faint)">'+window.t('js.nodata.rr')+'</div>';
    } else {
      const isMobile=window.innerWidth<640;
      const selEl=document.getElementById('lrr-case-select');
      if(selEl) selEl.style.display=isMobile?'block':'none';
      const defaultIdx=isMobile?0:null;
      if(isMobile&&selEl) selEl.value='0';
      tblEl.innerHTML=_buildRRTable(defaultIdx);
    }
  }
}

window.logCalcLot = ()=>{

  const risk=+document.getElementById('lcal-risk')?.value||1;
  const sl=+document.getElementById('lcal-sl')?.value||20;
  const sym=document.getElementById('lcal-sym')?.value||'EURUSD';

window.logRenderDD = ()=>{
  const now=new Date();
  const ws=new Date(now); ws.setDate(now.getDate()-now.getDay());
  const ms=new Date(now.getFullYear(),now.getMonth(),1);
  const sum=ts=>ts.reduce((s,t)=>s+t.profit,0);
  const dp=sum(logTrades.filter(t=>new Date(t.openTime).toDateString()===now.toDateString()));
  const wp=sum(logTrades.filter(t=>new Date(t.openTime)>=ws));
  const mp=sum(logTrades.filter(t=>new Date(t.openTime)>=ms));
  const bal=+document.getElementById('lcal-bal')?.value||1000;
  const items=[{l:'Daily',p:dp,lk:'d'},{l:'Weekly',p:wp,lk:'w'},{l:'Monthly',p:mp,lk:'m'}];
  const ddEl=document.getElementById('ldd-bars');
  if(!ddEl)return;
  ddEl.innerHTML=items.map(({l,p,lk})=>{
    const lim=logLimits[lk]||2;
    const dd=Math.abs(Math.min(0,p))/bal*100;
    const pct=Math.min(100,dd/lim*100);
    const col=dd>=lim?'var(--red)':dd>=lim*.7?'#c9a84c':'var(--green)';
    return `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
        <span style="color:var(--ink-2)">${l} DD</span>
        <span style="color:${p<0?'var(--red)':'var(--green)'};font-weight:700">${p>=0?'+':''}${p.toFixed(2)}$</span>
      </div>
      <div style="height:4px;background:var(--border);border-radius:2px"><div style="height:4px;border-radius:2px;background:${col};width:${pct}%"></div></div>
      ${dd>=lim&&lim>0?'<div style="font-size:10px;color:var(--red);margin-top:4px">⛔ Đã chạm giới hạn — dừng giao dịch!</div>':''}
    </div>`;
  }).join('');
};

// ── TRADE CARD TAP / HOVER (mobile-friendly actions) ─────────
let _logCardActive = null;
function _logShowActions(card) {
  const actions = card.querySelector('.lhist-actions');
  const outcomeEl = card.querySelector('.lhist-outcome-tag');
  if (actions) { actions.style.opacity = '1'; actions.style.pointerEvents = 'auto'; }
  if (outcomeEl) outcomeEl.style.opacity = '0';
  card.style.boxShadow = '0 8px 32px rgba(0,0,0,.18)';
  card.style.borderColor = 'var(--border-dark)';
}
function _logHideActions(card) {
  const actions = card.querySelector('.lhist-actions');
  const outcomeEl = card.querySelector('.lhist-outcome-tag');
  if (actions) { actions.style.opacity = '0'; actions.style.pointerEvents = 'none'; }
  if (outcomeEl) outcomeEl.style.opacity = '1';
  card.style.boxShadow = '';
  card.style.borderColor = 'var(--border)';
}

window.logCardTap = (card) => {
  // Mobile: tap toggles the action buttons
  const actions = card.querySelector('.lhist-actions');
  if (!actions) return;
  if (_logCardActive && _logCardActive !== card) {
    _logHideActions(_logCardActive);
    _logCardActive = null;
  }
  const isOpen = actions.style.opacity === '1';
  if (isOpen) {
    _logHideActions(card);
    _logCardActive = null;
  } else {
    _logShowActions(card);
    _logCardActive = card;
  }
};
window.logCardHoverIn = (card) => {
  if (!('ontouchstart' in window)) {
    _logShowActions(card);
  }
};
window.logCardHoverOut = (card) => {
  if (!('ontouchstart' in window)) {
    _logHideActions(card);
  }
};
// Close active card when tapping outside
document.addEventListener('click', e => {
  if (_logCardActive && !_logCardActive.contains(e.target)) {
    _logHideActions(_logCardActive);
    _logCardActive = null;
  }
});

  const FONT_CSS = {
    vi: ``, // Noto Sans JP / Noto Serif JP — mặc định trong CSS
    jp: `
      body, button, input, select, textarea, .ftab, .nav-dropdown-item, #nav-auth button {
        font-family: 'Pretendard JP', 'Noto Sans JP', sans-serif !important;
      }
      .nav-title, .sec-num, .case-title, .cmp-pct, .kpi-val, .wm, h1, h2, h3 {
        font-family: 'Pretendard JP', 'Noto Serif JP', serif !important;
      }
    `
  };

  // ── Áp dụng ngôn ngữ ─────────────────────────
  function applyLang(lang) {
    // 1. Font
    const styleEl = document.getElementById('font-override');
    if (styleEl) styleEl.textContent = FONT_CSS[lang] || '';

    // 2. Text (các element có data-i18n="key")
    const dict = LANG[lang] || LANG['vi'];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (dict[key] !== undefined) el.innerHTML = dict[key];
    });

    // 2b. Option labels (data-i18n-opt)
    document.querySelectorAll('[data-i18n-opt]').forEach(el => {
      const key = el.getAttribute('data-i18n-opt');
      if (dict[key] !== undefined) el.textContent = dict[key];
    });

    // 2c. Placeholder attributes (data-i18n-ph)
    document.querySelectorAll('[data-i18n-ph]').forEach(el => {
      const key = el.getAttribute('data-i18n-ph');
      if (dict[key] !== undefined) el.placeholder = dict[key];
    });

    // 3. Highlight nút active
    ['vi','jp'].forEach(l => {
      const btn = document.getElementById('lang-btn-' + l);
      if (!btn) return;
      if (l === lang) {
        btn.style.background = 'var(--bg)';
        btn.style.color = 'var(--ink)';
      } else {
        btn.style.background = 'transparent';
        btn.style.color = 'var(--muted)';
      }

  window.t = function(key) {
    const lang = window._currentLang || 'vi';
    const dict = LANG[lang] || LANG['vi'];
    return dict[key] !== undefined ? dict[key] : (LANG['vi'][key] || key);
  };

  // ── Khởi tạo ──────────────────────────────────
  const saved = localStorage.getItem('ema50-lang') || 'vi';
  window._currentLang = saved;
  // Chạy sau khi DOM ready để chắc chắn các element đã có
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => applyLang(saved));
  } else {

(function() {

      const top = [], bot = [];
      for (let s = 0; s <= segs; s++) {

        const tw = wAmp * Math.sin((s/segs) * Math.PI*2 + p.wobble*2);

        ctx.quadraticCurveTo(top[s-1][0], top[s-1][1], cp[0], cp[1]);

        opacity:1, wobble:Math.random()*Math.PI*2, wobbleSpeed:0.04+Math.random()*0.04,
        life:0, maxLife:90+Math.floor(Math.random()*50),
        shapeId:0, gravity:0.04, type:'wave',
      });
    }
  }

  // ── Spawn dispatcher ──────────────────────────
  function spawnAt(x, y, n, sm) {
    const SIMPLE = ['rect','star','dot','ribbon','heart','snow','diamond','lightning','leaf','mix'];
    if (style === 'sakura') {
      for (let i = 0; i < n; i++) pieces.push(makeSakuraPetal(x, y));
    } else if (style === 'firework') {
      fwTimer++;
      if (fwTimer % 18 === 0) launchFirework(x, y);
    } else if (style === 'wave') {
      spawnWave(x, y);
    } else {
      for (let i = 0; i < n; i++) pieces.push(makePiece(x, y, sm));
    }
  }

  // ══════════════════════════════════════════════
  //  RENDER LOOP
  // ══════════════════════════════════════════════
  function drawPiece(p) {
    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    ctx.fillStyle = p.color;
    const t = p.type || style;
    if      (t === 'sakura')    SHAPES.sakura(ctx, p);
    else if (t === 'firework')  SHAPES.firework(ctx, p);
    else if (t === 'wave')      SHAPES.wave(ctx, p);
    else if (t === 'mix')       SHAPES.mix(ctx, p);
    else if (t === 'heart')     SHAPES.heart(ctx, p);
    else if (t === 'snow')      SHAPES.snow(ctx, p);
    else if (t === 'diamond')   SHAPES.diamond(ctx, p);
    else if (t === 'lightning') SHAPES.lightning(ctx, p);
    else if (t === 'leaf')      SHAPES.leaf(ctx, p);
    else if (t === 'star')      SHAPES.star(ctx, p);
    else if (t === 'dot')       SHAPES.dot(ctx, p);
    else if (t === 'ribbon')    SHAPES.ribbon(ctx, p);
    else                        SHAPES.rect(ctx, p);
    ctx.restore();
  }

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (mouseEnabled && mouseActive) spawnAt(mouseX, mouseY, 2, 1.6);

    // Sakura: drizzle petals from top edge continuously (mouse mode)
    if (mouseEnabled && style === 'sakura' && running) {
      if (Math.random() < 0.35) pieces.push(makeSakuraPetal(null, null));
    }

    // Rain mode: spawn pieces falling from top edge — nhiều hơn, dày hơn
    if (rainMode && style !== 'sakura') {
      const rate = style === 'firework' ? 0.12 : style === 'wave' ? 0.35 : 0.55;
      const batch = style === 'firework' ? 1 : style === 'wave' ? 2 : 3;
      for (let b = 0; b < batch; b++) {
        if (Math.random() < rate) {
          const rx = Math.random() * (canvas ? canvas.width : window.innerWidth);
          if (style === 'firework') {
            if (Math.random() < 0.06) launchFirework(rx, 50 + Math.random() * (canvas.height * 0.5));
          } else if (style === 'wave') {
            spawnWave(rx, -10);
          } else {
            const p = makePiece(rx, -20);
            p.vy  = 1.5 + Math.random() * 3;
            p.vx  = (Math.random() - 0.5) * 3;
            p.maxLife = 300;
            p.gravity = 0.035;
            pieces.push(p);
          }
        }
      }
    }
    // Rain sakura — dày đặc hơn
    if (rainMode && style === 'sakura') {
      if (Math.random() < 0.7) pieces.push(makeSakuraPetal(null, null));
    }

    for (let i = pieces.length - 1; i >= 0; i--) {
      const p = pieces[i];
      p.wobble += p.wobbleSpeed;
      const wx = p.type === 'sakura'
        ? Math.sin(p.wobble) * 1.6   // petals drift more sideways
        : Math.sin(p.wobble) * 0.5;
      p.x += p.vx + wx;
      p.y += p.vy;
      p.vy += p.gravity;
      if (p.type !== 'firework') p.vx *= 0.992;
      p.angle += p.spin;
      p.life++;
      p.opacity = Math.max(0, 1 - p.life / (p.maxLife || 130));

      if (p.opacity <= 0 || p.y > canvas.height+80 || p.x < -100 || p.x > canvas.width+100) {
        pieces.splice(i,1); continue;
      }
      drawPiece(p);
    }

    if (pieces.length > 0 || (mouseEnabled && mouseActive) || (mouseEnabled && style === 'sakura') || rainMode) {
      raf = requestAnimationFrame(loop);
    } else {
      running = false; raf = null;
    }
  }

  function ensureRunning() {
    if (running) return;
    running = true; loop();
  }

  // ══════════════════════════════════════════════
  //  INIT
  // ══════════════════════════════════════════════
  function init() {
    canvas = document.getElementById('confetti-canvas');
    if (!canvas) return;
    ctx = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    });
    document.addEventListener('mousemove', e => {
      mouseX = e.clientX; mouseY = e.clientY; mouseActive = true;
      if (mouseEnabled && !document.hidden) ensureRunning();
    });

    // Pause confetti RAF khi tab ẩn, resume khi quay lại
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (raf) { cancelAnimationFrame(raf); raf = null; }
      } else {
        // Reset mouseActive để tránh burst khi quay lại
        mouseActive = false;
        if ((rainMode || (mouseEnabled && style === 'sakura') || pieces.length > 0) && !raf) {
          running = true; loop();
        }
      }
    });
    document.addEventListener('mouseleave', () => { mouseActive = false; });
    const sel = document.getElementById('confetti-style-sel');
    if (sel) sel.value = style;
    updateToggleBtn();
    updateRainBtn();
    // If sakura was saved, start loop immediately on load after login
    if (style === 'sakura' && mouseEnabled) ensureRunning();
    if (rainMode) ensureRunning();
  }

  // ══════════════════════════════════════════════
  //  PUBLIC API
  // ══════════════════════════════════════════════
  function updateToggleBtn() {
    const btn = document.getElementById('confetti-toggle-btn');
    if (!btn) return;
    if (mouseEnabled) { btn.style.background='var(--bg)'; btn.style.opacity='1'; btn.title='Hiệu ứng chuột: BẬT — click để tắt'; }
    else              { btn.style.background='transparent'; btn.style.opacity='0.4'; btn.title='Hiệu ứng chuột: TẮT — click để bật'; }
  }

  function updateRainBtn() {
    const btn = document.getElementById('confetti-rain-btn');
    if (!btn) return;
    if (rainMode) { btn.style.background='var(--bg)'; btn.style.opacity='1'; btn.title='Mưa confetti: BẬT — click để tắt'; }
    else          { btn.style.background='transparent'; btn.style.opacity='0.4'; btn.title='Mưa confetti từ trên xuống — click để bật'; }
  }

  window.toggleConfettiMode = function() {
    mouseEnabled = !mouseEnabled;
    localStorage.setItem('ema50-confetti', mouseEnabled ? 'on' : 'off');
    updateToggleBtn();
    if (!mouseEnabled) {
      // Nếu rain vẫn bật thì giữ loop, không xóa pieces
      if (!rainMode) pieces = [];
    } else {
      ensureRunning();
    }
  };

  window.toggleRainMode = function() {
    rainMode = !rainMode;
    localStorage.setItem('ema50-confetti-rain', rainMode ? 'on' : 'off');
    updateRainBtn();
    if (rainMode) ensureRunning();
    // Nếu tắt rain, loop tự dừng khi hết pieces (trừ khi mouse đang active)
  };

  window.setConfettiStyle = function(val) {
    style = val;
    localStorage.setItem('ema50-confetti-style', val);
    if (val === 'sakura' && mouseEnabled) {
      // Pre-seed petals across screen
      for (let i = 0; i < 50; i++) {
        const p = makeSakuraPetal(null, null);
        p.y = Math.random() * (canvas ? canvas.height : window.innerHeight);
        p.life = Math.floor(Math.random() * p.maxLife * 0.6);
        pieces.push(p);
      }
      ensureRunning();
    }
    if (rainMode) ensureRunning();
  };

  window.showConfettiSwitcher = function() {
    const el = document.getElementById('confetti-switcher');
    if (el) el.style.display = 'flex';
  };

  window.launchConfetti = function() {
    if (!canvas) init();
    if (!canvas) return;
    const cx = window.innerWidth/2, cy = window.innerHeight*0.38;
    if (style === 'firework') {
      // 5 bursts scattered across screen
      const spots = [[cx-200,cy+30],[cx,cy-30],[cx+200,cy+50],[cx-100,cy+100],[cx+100,cy-60]];
      spots.forEach(([x,y],i) => setTimeout(() => launchFirework(x,y), i*130));
    } else if (style === 'sakura') {
      for (let i=0;i<80;i++){
        const p=makeSakuraPetal(Math.random()*window.innerWidth,-20-Math.random()*200);
        pieces.push(p);
      }
      ensureRunning();
    } else if (style === 'wave') {
      for (let i=0;i<6;i++) setTimeout(()=>{ for(let j=0;j<8;j++) spawnWave(cx+(Math.random()-0.5)*400,cy+80); },i*80);
    } else {
      for (let i=0;i<130;i++){
        const p=makePiece(cx+(Math.random()-0.5)*320,cy+(Math.random()-0.5)*60);
        p.vy=-5-Math.random()*5; p.vx=(Math.random()-0.5)*9; pieces.push(p);
      }
    }
    ensureRunning();
  };

  document.addEventListener('DOMContentLoaded', init);
})();


// ── ANTIGRAVITY PARTICLE ENGINE ──────────────────
(function() {
  const canvas = document.getElementById('particle-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  let W, H, particles = [], mouse = { x: -9999, y: -9999 };
  let enabled = localStorage.getItem('ema50-particles') !== 'off'; // default ON
  let raf = null, running = false;
  let particleMode = localStorage.getItem('ema50-particle-mode') || 'normal'; // 'normal' | 'nebula'

  // Mutable opts — load from localStorage
  let SPEED = 0.6, COUNT = 80, CONNECT_DIST = 130, MOUSE_REPEL = 100, MAX_R = 2.8;
  let palette = 'blue';
  const PALETTES = {
    blue:  { hMin:200, hMax:260, sat:70, lit:70, stroke:'100,140,240' },
    gold:  { hMin:35,  hMax:55,  sat:80, lit:65, stroke:'210,170,60'  },
    green: { hMin:110, hMax:160, sat:65, lit:58, stroke:'80,180,100'  },
    pink:  { hMin:300, hMax:340, sat:70, lit:72, stroke:'220,100,180' },
    mono:  { hMin:0,   hMax:0,   sat:0,  lit:70, stroke:'150,150,150' },
  };

  try {
    const s = JSON.parse(localStorage.getItem('ema50-particle-opts') || '{}');
    if (s.speed   != null) SPEED        = s.speed;
    if (s.count   != null) COUNT        = s.count;
    if (s.connect != null) CONNECT_DIST = s.connect;
    if (s.repel   != null) MOUSE_REPEL  = s.repel;
    if (s.size    != null) MAX_R        = s.size;
    if (s.palette != null) palette      = s.palette;
  } catch(e) {}

  function saveOpts() {
    try { localStorage.setItem('ema50-particle-opts', JSON.stringify({speed:SPEED,count:COUNT,connect:CONNECT_DIST,repel:MOUSE_REPEL,size:MAX_R,palette})); } catch(e) {}
  }

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function rand(a, b) { return a + Math.random() * (b - a); }

  function makeParticle() {
    const pal = PALETTES[palette] || PALETTES.blue;
    const angle = rand(0, Math.PI * 2), speed = rand(0.1, SPEED);
    const hue = (pal.hMin === pal.hMax) ? pal.hMin : rand(pal.hMin, pal.hMax);
    return {
      x: rand(0,W), y: rand(0,H),
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      r: rand(MAX_R*0.4, MAX_R),
      alpha: rand(0.25, 0.65),
      hue, sat: pal.sat, lit: pal.lit,
    };
  }

  function init() { resize(); particles = Array.from({ length: COUNT }, makeParticle); }

  // ── NORMAL MODE DRAW ──
  function draw() {
    if (particleMode !== 'normal') { raf = requestAnimationFrame(draw); return; }
    ctx.clearRect(0, 0, W, H);
    const pal = PALETTES[palette] || PALETTES.blue;
    for (const p of particles) {
      p.vx += (Math.random() - 0.5) * 0.012;
      p.vy += (Math.random() - 0.5) * 0.012;
      const spd = Math.hypot(p.vx, p.vy);
      if (spd > SPEED) { p.vx = p.vx/spd*SPEED; p.vy = p.vy/spd*SPEED; }
      if (spd < 0.05)  { p.vx *= 1.05; p.vy *= 1.05; }
      const dx = p.x - mouse.x, dy = p.y - mouse.y;
      const dist = Math.hypot(dx, dy);
      if (dist < MOUSE_REPEL && dist > 0) {
        const force = (MOUSE_REPEL - dist) / MOUSE_REPEL * 0.55;
        p.vx += (dx/dist)*force; p.vy += (dy/dist)*force;
      }
      p.x += p.vx; p.y += p.vy;
      if (p.x < -10) p.x = W+10; if (p.x > W+10) p.x = -10;
      if (p.y < -10) p.y = H+10; if (p.y > H+10) p.y = -10;
    }
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const d = Math.hypot(a.x-b.x, a.y-b.y);
        if (d < CONNECT_DIST) {
          const alpha = (1 - d/CONNECT_DIST) * 0.18;
          ctx.beginPath();
          ctx.strokeStyle = `rgba(${pal.stroke},${alpha})`;
          ctx.lineWidth = 0.8;
          ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${p.hue},${p.sat||70}%,${p.lit||70}%,${p.alpha})`;
      ctx.fill();
    }
    raf = requestAnimationFrame(draw);
  }

  // ── NEBULA MODE ENGINE ──
  const nebula = {
    particles: [], ripples: [], mouse: { x: 0, y: 0, active: false },
    mouseSmooth: { x: 0, y: 0 }, lastTime: 0,

    makeParticle() {
      const speed = 0.5 + Math.random() * 0.8;
      const angle = Math.random() * Math.PI * 2;
      return {
        x: Math.random() * W, y: Math.random() * H,
        vx: Math.cos(angle) * speed * 0.15,
        vy: Math.sin(angle) * speed * 0.15,
        baseR: 0.6 + Math.random() * 1.4, r: 1,
        phase: Math.random() * Math.PI * 2,
        hue: 175 + Math.random() * 80,
      };
    },

    init() {
      const n = Math.min(190, Math.max(90, Math.round(W * H / 5000)));
      this.particles = Array.from({ length: n }, () => this.makeParticle());
      this.mouseSmooth.x = W * 0.5; this.mouseSmooth.y = H * 0.5;
    },

    step(p, time) {
      const t = time * 0.001;
      p.phase += 0.02;
      if (this.mouse.active) {
        const dx = this.mouseSmooth.x - p.x, dy = this.mouseSmooth.y - p.y;
        const distSq = dx*dx + dy*dy + 400;
        const pull = 4200 / distSq;
        p.vx += dx * pull * 0.012; p.vy += dy * pull * 0.012;
      }
      p.vx += Math.sin(p.phase) * 0.002; p.vy += Math.cos(p.phase * 0.7) * 0.002;
      p.vx *= 0.985; p.vy *= 0.985;
      p.x += p.vx; p.y += p.vy;
      if (p.x < -20) p.x = W+20; if (p.x > W+20) p.x = -20;
      if (p.y < -20) p.y = H+20; if (p.y > H+20) p.y = -20;
      p.r = p.baseR + Math.sin(t*2 + p.phase) * 0.25;
      for (const r of this.ripples) {
        const rdx = p.x - r.x, rdy = p.y - r.y;
        const rd = Math.sqrt(rdx*rdx + rdy*rdy);
        const ring = Math.abs(rd - r.radius);
        if (ring < 50 && r.strength > 0.05) {
          const push = ((50 - ring) / 50) * r.strength * 0.35;
          p.vx -= (rdx/(rd||1)) * push; p.vy -= (rdy/(rd||1)) * push;
        }
      }
    },

    drawParticle(p) {
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
      g.addColorStop(0, `hsla(${p.hue},90%,70%,0.95)`);
      g.addColorStop(0.4, `hsla(${p.hue},85%,55%,0.35)`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI*2);
      ctx.fill();
    },

    connect() {
      const maxD = Math.min(W, H) * 0.09, maxDSq = maxD * maxD;
      const ps = this.particles;
      for (let i = 0; i < ps.length; i++) {
        for (let j = i+1; j < ps.length; j++) {
          const dx = ps[i].x-ps[j].x, dy = ps[i].y-ps[j].y;
          const dSq = dx*dx+dy*dy;
          if (dSq > maxDSq) continue;
          const alpha = (1 - Math.sqrt(dSq)/maxD) * 0.35;
          ctx.strokeStyle = `rgba(140,220,255,${alpha})`;
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(ps[i].x, ps[i].y);
          ctx.lineTo(ps[j].x, ps[j].y);
          ctx.stroke();
        }
      }
    },

    draw(time) {
      if (particleMode !== 'nebula') { raf = requestAnimationFrame(t => this.draw(t)); return; }
      const dt = Math.min((time - this.lastTime) / 16.67, 2.5);
      this.lastTime = time;
      this.mouseSmooth.x += (this.mouse.x - this.mouseSmooth.x) * 0.08 * dt;
      this.mouseSmooth.y += (this.mouse.y - this.mouseSmooth.y) * 0.08 * dt;
      for (let i = this.ripples.length-1; i >= 0; i--) {
        this.ripples[i].radius += 7 * dt;
        this.ripples[i].strength *= 0.965;
        if (this.ripples[i].strength < 0.02) this.ripples.splice(i, 1);
      }
      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'lighter';
      this.particles.forEach(p => this.step(p, time));
      this.connect();
      this.particles.forEach(p => this.drawParticle(p));
      ctx.globalCompositeOperation = 'source-over';
      // subtle vignette
      const vg = ctx.createRadialGradient(W*0.5,H*0.45,Math.min(W,H)*0.15, W*0.5,H*0.5,Math.max(W,H)*0.65);
      vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(5,5,16,0.25)');
      ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
      raf = requestAnimationFrame(t => this.draw(t));
    },

    addRipple(x, y) {
      this.ripples.push({ x, y, radius: 0, strength: 1 });
      if (this.ripples.length > 6) this.ripples.shift();
    },
  };

  function startParticles() {
    if (running) return;
    running = true;
    if (particleMode === 'nebula') {
      nebula.init();
      nebula.lastTime = performance.now();
      canvas.style.opacity = '1';
      raf = requestAnimationFrame(t => nebula.draw(t));
    } else {
      init(); draw();
      canvas.style.opacity = '0.72';
    }
  }
  function stopParticles() {
    running = false;
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    canvas.style.opacity = '0';
  }

  function updateBtn() {
    const btn  = document.getElementById('particle-toggle-btn');
    const opts = document.getElementById('particle-opts-btn');
    const wrap = document.getElementById('particle-btn-wrap');
    if (enabled) {
      if (btn)  { btn.style.opacity='1'; btn.style.color='var(--ink)'; btn.style.background='var(--bg)'; }
      if (opts) { opts.style.opacity='1'; opts.style.color='var(--ink)'; }
      if (wrap) wrap.style.borderColor='var(--border-dark)';
    } else {
      if (btn)  { btn.style.opacity='0.45'; btn.style.color='var(--muted)'; btn.style.background='transparent'; }
      if (opts) { opts.style.opacity='0.45'; opts.style.color='var(--muted)'; }
    }
  }

  function syncPanelUI() {
    const setVal = (id, v) => { const el=document.getElementById(id); if(el) el.value=v; };
    const setTxt = (id, v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
    setVal('p-speed',  SPEED);        setTxt('p-speed-val',   SPEED.toFixed(1));
    setVal('p-count',  COUNT);        setTxt('p-count-val',   COUNT);
    setVal('p-connect',CONNECT_DIST); setTxt('p-connect-val', CONNECT_DIST);
    setVal('p-repel',  MOUSE_REPEL);  setTxt('p-repel-val',   MOUSE_REPEL);
    setVal('p-size',   MAX_R);        setTxt('p-size-val',    MAX_R.toFixed(1));
    document.querySelectorAll('.pal-btn').forEach(b => {
      b.style.outline = (b.dataset.pal === palette) ? '2px solid var(--blue)' : 'none';
      b.style.outlineOffset = '2px';
    });
    syncModeBtns();
  }

  window.toggleParticles = function() {
    enabled = !enabled;
    localStorage.setItem('ema50-particles', enabled ? 'on' : 'off');
    updateBtn();
    if (enabled) startParticles(); else stopParticles();
  };

  window.toggleParticlePanel = function(e) {
    e.stopPropagation();
    const panel = document.getElementById('particle-options-panel');
    if (!panel) return;
    const isOpen = panel.style.display === 'block';
    panel.style.display = isOpen ? 'none' : 'block';
    if (!isOpen) syncPanelUI();
  };

  document.addEventListener('click', function(e) {
    const panel = document.getElementById('particle-options-panel');
    const wrap  = document.getElementById('particle-btn-wrap');
    const insideWrap = wrap && wrap.contains(e.target);
    // Close panel if clicking outside
    if (panel && panel.style.display === 'block' && !insideWrap) {
      panel.style.display = 'none';
    }
    // Nebula ripple only when clicking outside the nav (not on buttons/links)
    if (particleMode === 'nebula' && enabled && !insideWrap) {
      const tag = e.target.tagName;
      if (!e.target.closest('nav, .modal-bg, .wl-popup-bg, button, a, input, select, textarea')) {
        nebula.addRipple(e.clientX, e.clientY);
      }
    }
  });

  window.updateParticleOpt = function(key, val) {
    if (key === 'speed')   { SPEED        = val; document.getElementById('p-speed-val').textContent   = (+val).toFixed(1); }
    if (key === 'count')   { COUNT        = val; document.getElementById('p-count-val').textContent   = val; }
    if (key === 'connect') { CONNECT_DIST = val; document.getElementById('p-connect-val').textContent = val; }
    if (key === 'repel')   { MOUSE_REPEL  = val; document.getElementById('p-repel-val').textContent   = val; }
    if (key === 'size')    { MAX_R        = val; document.getElementById('p-size-val').textContent    = (+val).toFixed(1); }
    if (key === 'palette') {
      palette = val;
      document.querySelectorAll('.pal-btn').forEach(b => {
        b.style.outline = (b.dataset.pal === val) ? '2px solid var(--blue)' : 'none';
        b.style.outlineOffset = '2px';
      });
    }
    if (key === 'count' || key === 'palette' || key === 'size') {
      particles = Array.from({ length: COUNT }, makeParticle);
    }
    saveOpts();
  };

  function syncModeBtns() {
    const nb = document.getElementById('pmode-nebula');
    const nm = document.getElementById('pmode-normal');
    const nopts = document.getElementById('particle-normal-opts');
    const ninfo = document.getElementById('particle-nebula-info');
    if (particleMode === 'nebula') {
      if (nb) { nb.style.background='#ede8f8'; nb.style.color='#7c5cbf'; nb.style.borderColor='#c8b8f0'; }
      if (nm) { nm.style.background='transparent'; nm.style.color='var(--muted)'; nm.style.borderColor='var(--border-dark)'; }
      if (nopts) nopts.style.display = 'none';
      if (ninfo) ninfo.style.display = 'block';
    } else {
      if (nm) { nm.style.background='var(--bg)'; nm.style.color='var(--ink-2)'; nm.style.borderColor='var(--border-dark)'; }
      if (nb) { nb.style.background='transparent'; nb.style.color='var(--muted)'; nb.style.borderColor='var(--border-dark)'; }
      if (nopts) nopts.style.display = 'block';
      if (ninfo) ninfo.style.display = 'none';
    }
  }

  window.setParticleMode = function(mode) {
    particleMode = mode;
    localStorage.setItem('ema50-particle-mode', mode);
    syncModeBtns();
    if (enabled) { stopParticles(); running = false; startParticles(); }
    // canvas always pointer-events:none — nebula uses document events
  };

  // Mouse tracking — document-level only so canvas never blocks clicks
  // Nebula mouse/ripple also tracked here (canvas pointer-events always none)
  document.addEventListener('mousemove', e => {
    mouse.x = e.clientX; mouse.y = e.clientY;
    if (particleMode === 'nebula') { nebula.mouse.x = e.clientX; nebula.mouse.y = e.clientY; nebula.mouse.active = true; }
  });
  document.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; nebula.mouse.active = false; });
  // Touch support for nebula on mobile
  document.addEventListener('touchmove', e => {
    if (particleMode !== 'nebula') return;
    const t = e.touches[0];
    nebula.mouse.x = t.clientX; nebula.mouse.y = t.clientY; nebula.mouse.active = true;
  }, { passive: true });
  document.addEventListener('touchend', () => { if (particleMode === 'nebula') nebula.mouse.active = false; });
  window.addEventListener('resize', () => { if (running) resize(); });

  // Pause particle RAF khi tab ẩn, resume khi quay lại
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (raf) { cancelAnimationFrame(raf); raf = null; }
    } else if (enabled && running) {
      // Re-sync lastTime cho nebula để tránh delta time lớn gây giật
      if (particleMode === 'nebula') nebula.lastTime = performance.now();
      if (particleMode === 'nebula') {
        raf = requestAnimationFrame(t => nebula.draw(t));
      } else {
        raf = requestAnimationFrame(draw);
      }
    }
  });

  // Init after DOM ready
  document.addEventListener('DOMContentLoaded', () => {
    updateBtn();
    syncPanelUI();
    if (enabled) startParticles();
  });
})();

// ── TOAST ─────────────────────────────────────────

<script>
(function(){

// ── Firebase Firestore helpers (reuse auth/db từ main app) ──
// db và auth đã khởi tạo ở phần Firebase chính của app
const TZ = 7 * 3600; // GMT+7

// ═══════════════════════════════════════════════════════════════
//  CHUNK-BASED STORAGE — mỗi document chứa CANDLES_PER_CHUNK nến
//  Lần đầu (312–74k nến): ~75–125 writes tổng
//  Hàng ngày (append nến mới): chỉ 1 write/timeframe = ~6 writes/ngày
//  Firestore free tier: 20,000 writes/ngày → dư sức dùng cả năm
// ═══════════════════════════════════════════════════════════════
const CANDLES_PER_CHUNK = 1000; // ~120KB/doc, max 1MB → an toàn

// Ref tới parent doc lưu metadata (lastTime, chunkCount)
function chtParentRef(uid, sym, tf) {
  return window.fbDoc(window.db, 'candleData', `${uid}_${sym}_${tf}`);
}

// Ref tới chunk document theo index
function chtChunkRef(uid, sym, tf, chunkIdx) {
  return window.fbDoc(window.db, 'candleData', `${uid}_${sym}_${tf}`,
                      'chunks', String(chunkIdx).padStart(6, '0'));
}

// ── SAVE (với progress callback) ──────────────────────────────
// Logic:
//   1. Đọc parent doc → biết lastTime và chunkCount hiện tại
//   2. Lọc nến mới (time > lastTime)
//   3. Đọc chunk cuối cùng để append vào trước
//   4. Ghi từng chunk đầy vào Firestore (mỗi chunk = 1 write)
//   5. Cập nhật parent doc + manifest (1 write)
async function chtSaveToFirestoreWithProgress(sym, tf, candles, onProgress) {
  if (!window.db)
    throw new Error('Không lấy được Firebase — kiểm tra config');
  if (!candles.length)
    throw new Error('Không có nến nào để lưu');

  const uid = (window.currentUser && window.currentUser.uid) || 'shared_user';
  onProgress && onProgress(0, candles.length, 'Đang đọc Firebase...');

  // 1. Đọc parent doc
  const parentRef = chtParentRef(uid, sym, tf);
  let lastSaved   = 0;
  let chunkCount  = 0;
  try {
    const parentSnap = await window.fbGetDoc(parentRef);
    if (parentSnap.exists()) {
      lastSaved  = parentSnap.data().lastTime   || 0;
      chunkCount = parentSnap.data().chunkCount || 0;
    }
  } catch(e) {
    throw new Error('Không đọc được Firebase: ' + e.message);
  }

  // 2. Lọc nến mới
  const sorted     = [...candles].sort((a, b) => a.time - b.time);
  const newCandles = sorted.filter(c => c.time > lastSaved);
  if (!newCandles.length) {
    onProgress && onProgress(candles.length, candles.length, 'Đã có đủ data — không cần push');
    return 0;
  }

  // 3. Đọc chunk cuối để append (nếu có và chưa đầy)
  let tailCandles = [];
  let tailChunkIdx = chunkCount - 1;
  if (chunkCount > 0) {
    try {
      const tailSnap = await window.fbGetDoc(chtChunkRef(uid, sym, tf, tailChunkIdx));
      if (tailSnap.exists()) {
        const raw = tailSnap.data().d || '';
        if (typeof raw === 'string' && raw.length > 0) {
          tailCandles = raw.split('|').map(row => {
            const p = row.split(',');
            return { time: +p[0], open: +p[1], high: +p[2], low: +p[3], close: +p[4] };
          });
        } else if (Array.isArray(raw)) {
          tailCandles = raw.map(r => Array.isArray(r)
            ? { time: r[0], open: r[1], high: r[2], low: r[3], close: r[4] }
            : { time: r.t||r.time, open: r.o||r.open, high: r.h||r.high, low: r.l||r.low, close: r.c||r.close });
        }
      }
    } catch(e) { /* chunk cuối không đọc được → bắt đầu chunk mới */ }
  }

  // Gộp tail + new rồi chia thành chunks
  const allNew    = [...tailCandles, ...newCandles];
  // Xác định chunk index bắt đầu ghi
  const startIdx  = (chunkCount > 0 && tailCandles.length > 0) ? tailChunkIdx : chunkCount;
  const chunks    = [];
  for (let i = 0; i < allNew.length; i += CANDLES_PER_CHUNK) {
    chunks.push(allNew.slice(i, i + CANDLES_PER_CHUNK));
  }

  const totalWrites = chunks.length + 1; // +1 cho parent doc
  onProgress && onProgress(0, newCandles.length,
    `Chuẩn bị ghi ${chunks.length} chunk (${newCandles.length} nến mới)...`);

  // 4. Ghi từng chunk
  let written = 0;
  for (let ci = 0; ci < chunks.length; ci++) {
    const chunkIdx  = startIdx + ci;
    // Firestore không hỗ trợ nested array → encode thành string CSV
    // Format: "time,o,h,l,c|time,o,h,l,c|..."
    const chunkData = chunks[ci].map(c =>
      `${c.time},${c.open},${c.high},${c.low},${c.close}`
    ).join('|');
    const chunkRef  = chtChunkRef(uid, sym, tf, chunkIdx);
    onProgress && onProgress(written, newCandles.length,
      `Chunk ${ci + 1}/${chunks.length} (${chunks[ci].length} nến)...`);
    await window.fbSetDoc(chunkRef, {
      sym, tf,
      chunkIdx,
      from:  chunks[ci][0].time,
      to:    chunks[ci][chunks[ci].length - 1].time,
      count: chunks[ci].length,
      d:     chunkData   // string CSV, không dùng nested array
    });
    written += chunks[ci].length;
    onProgress && onProgress(
      Math.min(written - tailCandles.length, newCandles.length),
      newCandles.length,
      `Chunk ${ci + 1}/${chunks.length} ✓`
    );
  }

  // 5. Cập nhật parent doc + manifest (1 write batch)
  onProgress && onProgress(newCandles.length, newCandles.length, 'Đang cập nhật manifest...');
  const newChunkCount = startIdx + chunks.length;
  const maxTime       = newCandles[newCandles.length - 1].time;
  const metaBatch     = window.fbWriteBatch(window.db);
  metaBatch.set(parentRef, {
    lastTime:   maxTime,
    chunkCount: newChunkCount,
    sym, tf,
    updatedAt:  Date.now()
  }, { merge: true });
  metaBatch.set(
    window.fbDoc(window.db, 'candleManifest', uid),
    { keys: window.fbArrayUnion(`${sym}_${tf}`) },
    { merge: true }
  );
  await metaBatch.commit();
  chtLoadSymList();
  return newCandles.length;
}

// Wrapper không có progress (dùng ở chtLoad auto-save)
async function chtSaveToFirestore(sym, tf, candles) {
  return chtSaveToFirestoreWithProgress(sym, tf, candles, null);
}

// ── LOAD ──────────────────────────────────────────────────────
// Đọc tất cả chunks theo thứ tự rồi ghép lại
async function chtLoadFromFirestore(sym, tf) {
  if (!window.db) return [];
  const uid = (window.currentUser && window.currentUser.uid) || 'shared_user';
  const key = chtKey(sym, tf);

  // Cache hit
  if (chtStore[key] && chtStore[key].length) return chtStore[key];

  const status = document.getElementById('cht-status');
  if (status) status.textContent = `⏳ Đang tải ${sym} ${tf.toUpperCase()} từ Firebase...`;

  try {
    // Đọc parent doc trước để biết chunkCount
    const parentRef  = chtParentRef(uid, sym, tf);
    const parentSnap = await window.fbGetDoc(parentRef);
    if (!parentSnap.exists() || !parentSnap.data().lastTime) {
      if (status) status.textContent = `Chưa có data ${sym} ${tf.toUpperCase()} trên Firebase`;
      return [];
    }
    const chunkCount = parentSnap.data().chunkCount || 0;
    if (chunkCount === 0) {
      if (status) status.textContent = `Chưa có data ${sym} ${tf.toUpperCase()} trên Firebase`;
      return [];
    }

    // Đọc song song tất cả chunks
    if (status) status.textContent = `⏳ Đang tải ${chunkCount} chunks · ${sym} ${tf.toUpperCase()}...`;
    const chunkRefs   = Array.from({ length: chunkCount }, (_, i) => chtChunkRef(uid, sym, tf, i));
    const chunkSnaps  = await Promise.all(chunkRefs.map(r => window.fbGetDoc(r)));

    const candles = [];
    for (const snap of chunkSnaps) {
      if (!snap.exists()) continue;
      const raw = snap.data().d || '';
      // d là string CSV: "time,o,h,l,c|time,o,h,l,c|..."
      if (typeof raw === 'string' && raw.length > 0) {
        for (const row of raw.split('|')) {
          const p = row.split(',');
          candles.push({ time: +p[0], open: +p[1], high: +p[2], low: +p[3], close: +p[4] });
        }
      } else if (Array.isArray(raw)) {
        // fallback: format cũ array of objects
        for (const r of raw) {
          if (Array.isArray(r)) candles.push({ time: r[0], open: r[1], high: r[2], low: r[3], close: r[4] });
          else candles.push({ time: r.t||r.time, open: r.o||r.open, high: r.h||r.high, low: r.l||r.low, close: r.c||r.close });
        }
      }
    }
    // Đảm bảo sort đúng thứ tự (phòng chunk ghi không theo thứ tự)
    candles.sort((a, b) => a.time - b.time);

    chtStore[key] = candles;
    if (status) status.textContent = `✅ ${candles.length} nến · ${sym} ${tf.toUpperCase()}`;
    return candles;
  } catch(e) {
    if (status) status.textContent = '❌ Lỗi tải: ' + e.message;
    console.error('[chtLoadFromFirestore]', e);
    return [];
  }
}

// ── DELETE ────────────────────────────────────────────────────
// Xóa tất cả chunks + parent doc + manifest entry
async function chtDeleteFromFirestore(sym, tf) {
  if (!window.db) return;
  const uid = (window.currentUser && window.currentUser.uid) || 'shared_user';
  const key = `${sym}_${tf}`;

  try {
    // Đọc chunkCount từ parent
    const parentRef  = chtParentRef(uid, sym, tf);
    const parentSnap = await window.fbGetDoc(parentRef);
    const chunkCount = parentSnap.exists() ? (parentSnap.data().chunkCount || 0) : 0;

    // Xóa từng chunk theo batch (tối đa 500 ops/batch)
    const BATCH_OPS = 400;
    for (let i = 0; i < chunkCount; i += BATCH_OPS) {
      const batch = window.fbWriteBatch(window.db);
      for (let ci = i; ci < Math.min(i + BATCH_OPS, chunkCount); ci++) {
        batch.delete(chtChunkRef(uid, sym, tf, ci));
      }
      await batch.commit();
    }

    // Xóa parent doc + manifest entry
    const finalBatch = window.fbWriteBatch(window.db);
    finalBatch.delete(parentRef);
    finalBatch.set(
      window.fbDoc(window.db, 'candleManifest', uid),
      { keys: window.fbArrayRemove(key) },
      { merge: true }
    );
    await finalBatch.commit();
  } catch(e) {
    console.error('[chtDeleteFromFirestore]', e);
  }
}

async function chtLoadSymList() {
  const uid = (window.currentUser && window.currentUser.uid) || 'shared_user';
  const sel = document.getElementById('cht-sym');

// Expose chart functions ra window ngay sau khi định nghĩa xong

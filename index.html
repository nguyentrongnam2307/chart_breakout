// ═══════════════════════════════════════════════════
//  EMA MODULE
// ═══════════════════════════════════════════════════

const EMA_COLORS = ['#e67e22','#2980b9','#8e44ad','#27ae60','#e74c3c','#16a085','#d35400','#2c3e50'];
const chtEmaMap = new Map(); // key → { seriesH, seriesL, fillSeries, color, period, isChannel }

// Tính EMA từ source: 'close' | 'high' | 'low' | 'open' | 'hl2'
function calcEMA(candles, period, source = 'close') {
  if (!candles || candles.length < period) return [];
  const getVal = c => {
    if (source === 'high')  return c.high;
    if (source === 'low')   return c.low;
    if (source === 'open')  return c.open;
    if (source === 'hl2')   return (c.high + c.low) / 2;
    return c.close;
  };
  const k = 2 / (period + 1);
  const result = [];
  let ema = null;
  for (let i = 0; i < candles.length; i++) {
    const c = candles[i];
    if (i < period - 1) continue;
    if (i === period - 1) {
      ema = candles.slice(0, period).reduce((a, x) => a + getVal(x), 0) / period;
    } else {
      ema = getVal(c) * k + ema * (1 - k);
    }
    result.push({ time: c.time, value: +ema.toFixed(6) });
  }
  return result;
}

// ── EMA Channel (High + Low + fill) ──────────────────
// Lightweight Charts v4 hỗ trợ fill giữa 2 line series qua createPriceLine
// Dùng cách ghép: 1 area series ở high (topLine), 1 line series ở low
// Thực tế dùng 2 LineSeries + vẽ fill bằng 1 AreaSeries mỏng

let chtChannel = null;
let chtChannelCanvas = null;
let chtChannelRAF = null;

window.chtToggleChannel = () => {
  if (!chtChart || !chtAllCandles.length) { alert('Load data trước'); return; }
  if (chtChannel && chtChannel.active) {
    chtDestroyChannel();
  } else {
    chtBuildChannel(chtAllCandles);
  }
  chtUpdateChannelBtn();
};

function chtBuildChannel(candles) {
  const period = 50;
  const colorH = '#2980b9';
  const colorL = '#e67e22';

  const dataH = calcEMA(candles, period, 'high');
  const dataL = calcEMA(candles, period, 'low');

  // 2 line series cho đường H và L
  const seriesH = chtChart.addLineSeries({
    color: colorH, lineWidth: 1,
    priceLineVisible: false, lastValueVisible: true,
    crosshairMarkerVisible: false, title: 'EMA50H',
  });
  seriesH.setData(dataH);

  const seriesL = chtChart.addLineSeries({
    color: colorL, lineWidth: 1,
    priceLineVisible: false, lastValueVisible: true,
    crosshairMarkerVisible: false, title: 'EMA50L',
  });
  seriesL.setData(dataL);

  chtChannel = { seriesH, seriesL, dataH, dataL, active: true, period, colorH, colorL };

  // Tạo canvas overlay
  chtCreateFillCanvas();
  chtDrawFill();

  // Subscribe vào time scale + price scale để redraw khi scroll/zoom
  chtChart.timeScale().subscribeVisibleTimeRangeChange(chtDrawFill);
  chtChart.subscribeCrosshairMove(chtDrawFill);
}

function chtCreateFillCanvas() {
  if (chtChannelCanvas) { chtChannelCanvas.remove(); chtChannelCanvas = null; }
  const wrap = document.getElementById('cht-container');
  const canvas = document.createElement('canvas');
  canvas.id = 'cht-fill-canvas';
  canvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:1;';
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  wrap.appendChild(canvas);
  chtChannelCanvas = canvas;

  // Resize observer
  const ro = new ResizeObserver(() => {
    if (!chtChannelCanvas) return;
    chtChannelCanvas.width  = wrap.clientWidth;
    chtChannelCanvas.height = wrap.clientHeight;
    chtDrawFill();
  });
  ro.observe(wrap);
}

function chtDrawFill() {
  if (!chtChannel || !chtChannel.active || !chtChannelCanvas || !chtChart) return;
  cancelAnimationFrame(chtChannelRAF);
  chtChannelRAF = requestAnimationFrame(() => {
    const canvas = chtChannelCanvas;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const { dataH, dataL } = chtChannel;
    if (!dataH.length || !dataL.length) return;

    const timeScale  = chtChart.timeScale();
    const priceScale = chtChannel.seriesH;

    // Lấy visible range để chỉ vẽ điểm trong tầm nhìn
    const visRange = timeScale.getVisibleRange();
    if (!visRange) return;

    // Convert từng điểm sang pixel coordinate
    function toPixel(d) {
      try {
        const x = timeScale.timeToCoordinate(d.time);
        const y = priceScale.priceToCoordinate(d.value);
        return (x != null && y != null) ? { x, y } : null;
      } catch(e) { return null; }
    }

    // Lọc điểm trong visible range (thêm 1 điểm buffer hai bên)
    const filterVisible = (data) => data.filter(d =>
      d.time >= visRange.from - 86400 && d.time <= visRange.to + 86400
    );

    const ptsH = filterVisible(dataH).map(toPixel).filter(Boolean);
    const ptsL = filterVisible(dataL).map(toPixel).filter(Boolean);
    if (ptsH.length < 2 || ptsL.length < 2) return;

    // Vẽ polygon: đi theo H từ trái → phải, rồi L từ phải → trái
    ctx.beginPath();
    ctx.moveTo(ptsH[0].x, ptsH[0].y);
    for (let i = 1; i < ptsH.length; i++) ctx.lineTo(ptsH[i].x, ptsH[i].y);
    for (let i = ptsL.length - 1; i >= 0; i--) ctx.lineTo(ptsL[i].x, ptsL[i].y);
    ctx.closePath();

    // Gradient fill
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, 'rgba(41,128,185,0.18)');
    grad.addColorStop(1, 'rgba(230,126,34,0.10)');
    ctx.fillStyle = grad;
    ctx.fill();
  });
}

function chtDestroyChannel() {
  if (!chtChannel) return;
  // Unsubscribe
  try { chtChart.timeScale().unsubscribeVisibleTimeRangeChange(chtDrawFill); } catch(e) {}
  try { chtChart.unsubscribeCrosshairMove(chtDrawFill); } catch(e) {}
  try { chtChart.removeSeries(chtChannel.seriesH); } catch(e) {}
  try { chtChart.removeSeries(chtChannel.seriesL); } catch(e) {}
  if (chtChannelCanvas) { chtChannelCanvas.remove(); chtChannelCanvas = null; }
  cancelAnimationFrame(chtChannelRAF);
  chtChannel = null;
}

function chtRedrawChannel(candles) {
  if (!chtChannel || !chtChannel.active || !chtChart) return;
  const period = chtChannel.period || 50;
  const dataH = calcEMA(candles, period, 'high');
  const dataL = calcEMA(candles, period, 'low');
  chtChannel.dataH = dataH;
  chtChannel.dataL = dataL;
  chtChannel.seriesH.setData(dataH);
  chtChannel.seriesL.setData(dataL);
  // Recreate canvas (size may have changed)
  chtCreateFillCanvas();
  chtDrawFill();
}

function chtUpdateChannelBtn() {
  const btn = document.getElementById('cht-channel-btn');
  if (!btn) return;
  const on = chtChannel && chtChannel.active;
  btn.style.background  = on ? 'var(--ink)' : 'var(--surface)';
  btn.style.color       = on ? '#fff' : 'var(--muted)';
  btn.style.borderColor = on ? 'var(--ink)' : 'var(--border-dark)';
}


// ── EMA đơn (close) ───────────────────────────────────
window.chtAddEMA = (period) => {
  period = Math.floor(period);
  if (!period || period < 1 || period > 500) return;
  const key = `ema_${period}`;
  if (chtEmaMap.has(key)) { chtRemoveEMA(key); return; }
  if (!chtChart || !chtAllCandles.length) { alert('Load data trước khi thêm EMA'); return; }
  const color = EMA_COLORS[chtEmaMap.size % EMA_COLORS.length];
  const series = chtChart.addLineSeries({
    color, lineWidth: 1,
    priceLineVisible: false, lastValueVisible: true,
    crosshairMarkerVisible: false,
    title: `EMA${period}`,
  });
  series.setData(calcEMA(chtAllCandles, period, 'close'));
  chtEmaMap.set(key, { series, color, period });
  chtRenderEmaTags();
  const inp = document.getElementById('cht-ema-input');
  if (inp) inp.value = '';
};

function chtRemoveEMA(key) {
  const entry = chtEmaMap.get(key);
  if (!entry) return;
  try { chtChart.removeSeries(entry.series); } catch(e) {}
  chtEmaMap.delete(key);
  chtRenderEmaTags();
}

function chtRenderEmaTags() {
  const wrap = document.getElementById('cht-ema-tags');
  if (!wrap) return;
  wrap.innerHTML = '';
  [...chtEmaMap.entries()].sort((a,b)=>a[1].period-b[1].period).forEach(([key, {color, period}]) => {
    const tag = document.createElement('span');
    tag.style.cssText = `display:inline-flex;align-items:center;gap:2px;padding:1px 6px 1px 7px;border-radius:3px;font-size:0.62rem;font-weight:700;cursor:pointer;border:1px solid ${color};color:${color};background:${color}18;white-space:nowrap;`;
    tag.title = `Bấm để xóa EMA ${period}`;
    tag.innerHTML = `${period}<span style="margin-left:3px;opacity:0.6;font-size:0.7rem;">✕</span>`;
    tag.onclick = () => chtRemoveEMA(key);
    wrap.appendChild(tag);
  });
}

function chtRedrawEMAs(candles) {
  if (!chtChart || !candles || !candles.length) return;
  chtEmaMap.forEach(({series, period}) => {
    series.setData(calcEMA(candles, period, 'close'));
  });
  // Nếu channel đang bật (hoặc vừa bị clear do rebuild), rebuild lại
  if (chtChannel && !chtChannel.active) {
    // Chart đã rebuild, cần tạo lại series + canvas
    const period = chtChannel.period || 50;
    chtChannel = null; // reset để chtBuildChannel không bị conflict
    chtBuildChannel(candles);
    chtUpdateChannelBtn();
  } else {
    chtRedrawChannel(candles);
  }
}

function chtClearEMAs() {
  chtEmaMap.forEach(({series}) => {
    try { if (chtChart) chtChart.removeSeries(series); } catch(e) {}
  });
  chtEmaMap.clear();
  // Destroy channel (chart sắp bị rebuild, canvas cũng phải xóa)
  if (chtChannel) {
    try { chtChart.timeScale().unsubscribeVisibleTimeRangeChange(chtDrawFill); } catch(e) {}
    try { chtChart.unsubscribeCrosshairMove(chtDrawFill); } catch(e) {}
    try { if(chtChart) chtChart.removeSeries(chtChannel.seriesH); } catch(e) {}
    try { if(chtChart) chtChart.removeSeries(chtChannel.seriesL); } catch(e) {}
    if (chtChannelCanvas) { chtChannelCanvas.remove(); chtChannelCanvas = null; }
    cancelAnimationFrame(chtChannelRAF);
    // Giữ chtChannel object (chỉ clear series) để sau rebuild tự redraw lại
    chtChannel.active = false;
  }
  chtRenderEmaTags();
  chtUpdateChannelBtn();
}

// ══════════════════════════════════════════════════════
//  MARKET STRUCTURE (5,5) — ORDER BLOCK BOXES
//  Vẽ hình chữ nhật High→Low nến pivot, đến nến break
// ══════════════════════════════════════════════════════

let ms55Canvas   = null;
let ms55RAF      = null;
let ms55Boxes    = [];
let ms55Active   = false;
let ms55DrawBound = null;

// ── Pivot High/Low ─────────────────────────────────────
function ms55PivotHighs(candles, L, R) {
  const out = [];
  for (let i = L; i < candles.length - R; i++) {
    const v = candles[i].high;
    let ok = true;
    for (let j = i - L; j <= i + R; j++) {
      if (j !== i && candles[j].high >= v) { ok = false; break; }
    }
    if (ok) out.push({ idx: i, price: v, time: candles[i].time });
  }
  return out;
}
function ms55PivotLows(candles, L, R) {
  const out = [];
  for (let i = L; i < candles.length - R; i++) {
    const v = candles[i].low;
    let ok = true;
    for (let j = i - L; j <= i + R; j++) {
      if (j !== i && candles[j].low <= v) { ok = false; break; }
    }
    if (ok) out.push({ idx: i, price: v, time: candles[i].time });
  }
  return out;
}

// ── Build boxes ────────────────────────────────────────
// Logic khớp với Pine Script TradingView:
// - pvtH/pvtL KHÔNG reset sau break, giữ nguyên đến pivot mới
// - BUY  = close > pvtH và open <= pvtH  →  BOS nếu HH, CHOCH nếu LH
// - SELL = close < pvtL và open >= pvtL  →  BOS nếu LL, CHOCH nếu HL
// - Vẽ line từ barIndex của pivot → barIndex của nến break, tại mức pvtH/pvtL
function ms55BuildBoxes(candles, L, R, limitBarsParam) {
  const _limitBars = limitBarsParam || window._ms55LimitBars || 5;
  const highs = ms55PivotHighs(candles, L, R);
  const lows  = ms55PivotLows (candles, L, R);

  const phAt = {}; highs.forEach(p => phAt[p.idx] = p);
  const plAt = {}; lows .forEach(p => plAt[p.idx] = p);

  let pvtH = null, prevPH = null;
  let pvtL = null, prevPL = null;

  // SL tracking (Pine: slBuyLevel = low[rightLenH5] khi ph5 xảy ra, sau đó min với low)
  let slBuyLevel  = null;  // low tại pivot high bar
  let slSellLevel = null;  // high tại pivot low bar

  // Pending order (Pine: lưu khi buy5/sell5, check N nến sau)
  let pendingBuy  = null;  // { entry, sl, barIdx, time }
  let pendingSell = null;

  const boxes = [];

  for (let i = 0; i < candles.length; i++) {
    const c = candles[i];

    // ── SL tracking: cập nhật min/max low/high liên tục ──
    if (slBuyLevel  !== null && !(pvtH && phAt[i])) slBuyLevel  = Math.min(slBuyLevel,  c.low);
    if (slSellLevel !== null && !(pvtL && plAt[i])) slSellLevel = Math.max(slSellLevel, c.high);

    if (i > 0) {
      // BUY break
      if (pvtH && c.close > pvtH.price && c.open <= pvtH.price) {
        const isBOS = prevPH ? pvtH.price > prevPH.price : false;
        boxes.push({
          timeL: pvtH.time, timeR: c.time,
          breakPrice: pvtH.price,
          type: isBOS ? 'BOS' : 'CHOCH', dir: 'up',
        });
        // Lưu pending BUY order
        if (slBuyLevel !== null) {
          pendingBuy = { entry: pvtH.price, sl: slBuyLevel, barIdx: i, time: c.time };
        }
        // Reset pivot sau break — tránh trigger lại cùng pivot
        prevPH = pvtH; pvtH = null; slBuyLevel = null;
      }

      // SELL break
      if (pvtL && c.close < pvtL.price && c.open >= pvtL.price) {
        const isBOS = prevPL ? pvtL.price < prevPL.price : false;
        boxes.push({
          timeL: pvtL.time, timeR: c.time,
          breakPrice: pvtL.price,
          type: isBOS ? 'BOS' : 'CHOCH', dir: 'dn',
        });
        // Lưu pending SELL order
        if (slSellLevel !== null) {
          pendingSell = { entry: pvtL.price, sl: slSellLevel, barIdx: i, time: c.time };
        }
        // Reset pivot sau break
        prevPL = pvtL; pvtL = null; slSellLevel = null;
      }

      // ── Check BUY limit: giá chạm lại entry trong limitBars ──
      if (pendingBuy) {
        const elapsed = i - pendingBuy.barIdx;
        if (elapsed > 0 && elapsed <= _limitBars) {
          if (c.low <= pendingBuy.entry) {
            boxes.push({
              kind       : 'order',
              dir        : 'buy',
              entry      : pendingBuy.entry,
              sl         : pendingBuy.sl,
              barIdx     : i,
              barIdxEnd  : i,
              time       : c.time,
              triggerBarIdx: pendingBuy.barIdx,
            });
            pendingBuy = null;
          }
        } else if (elapsed > _limitBars) {
          pendingBuy = null;
        }
      }

      // ── Check SELL limit ──
      if (pendingSell) {
        const elapsed = i - pendingSell.barIdx;
        if (elapsed > 0 && elapsed <= _limitBars) {
          if (c.high >= pendingSell.entry) {
            boxes.push({
              kind       : 'order',
              dir        : 'sell',
              entry      : pendingSell.entry,
              sl         : pendingSell.sl,
              barIdx     : i,
              barIdxEnd  : i,
              time       : c.time,
              triggerBarIdx: pendingSell.barIdx,
            });
            pendingSell = null;
          }
        } else if (elapsed > _limitBars) {
          pendingSell = null;
        }
      }
    }

    // ── Cập nhật pivot SAU khi check break ──
    if (phAt[i]) {
      prevPH = pvtH; pvtH = phAt[i];
      slBuyLevel = c.low; // reset SL từ low của pivot bar
    }
    if (plAt[i]) {
      prevPL = pvtL; pvtL = plAt[i];
      slSellLevel = c.high; // reset SL từ high của pivot bar
    }
  }
  return boxes;
}

// ── Canvas ─────────────────────────────────────────────
function ms55CreateCanvas() {
  if (ms55Canvas) { ms55Canvas.remove(); ms55Canvas = null; }
  const wrap = document.getElementById('cht-container');
  if (!wrap) return;
  const c = document.createElement('canvas');
  c.id = 'ms55-box-canvas';
  c.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:2;';
  c.width  = wrap.clientWidth;
  c.height = wrap.clientHeight;
  wrap.appendChild(c);
  ms55Canvas = c;
  const ro = new ResizeObserver(() => {
    if (!ms55Canvas) return;
    ms55Canvas.width  = wrap.clientWidth;
    ms55Canvas.height = wrap.clientHeight;
    ms55DrawBoxes();
  });
  ro.observe(wrap);
}

function ms55DrawBoxes() {
  if (!ms55Active || !ms55Canvas || !chtChart || !chtSeries) return;
  cancelAnimationFrame(ms55RAF);
  ms55RAF = requestAnimationFrame(() => {
    const canvas = ms55Canvas;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const tsScale = chtChart.timeScale();
    const vis = tsScale.getVisibleRange();
    if (!vis) return;

    const showBOS   = document.getElementById('ms55-show-bos')?.checked !== false;
    const showCHOCH = document.getElementById('ms55-show-choch')?.checked !== false;

    // Vẽ tất cả box trong visible range (giới hạn 300 gần nhất)
    const toShow = ms55Boxes.slice(-300);
    toShow.forEach(box => {
      if (box.type === 'BOS'   && !showBOS)   return;
      if (box.type === 'CHOCH' && !showCHOCH) return;

      let x1, x2;
      try {
        x1 = tsScale.timeToCoordinate(box.timeL);
        x2 = tsScale.timeToCoordinate(box.timeR);
      } catch(e) { return; }

      if (x1==null||x2==null) return;
      if (x2 < 0 || x1 > canvas.width) return;

      const w = x2 - x1;
      if (Math.abs(w) < 1) return;

      // Màu line: Pine Script dùng colorH5 (đen) cho up, colorL5 (đen) cho dn
      // BOS (solid, đậm hơn) / CHOCH (mờ hơn) — phân biệt bằng opacity
      let stroke, lineW;
      if (box.dir === 'up') {
        stroke = box.type==='BOS' ? 'rgba(0,0,0,0.85)' : 'rgba(44,74,124,0.65)';
        lineW  = box.type==='BOS' ? 2 : 1;
      } else {
        stroke = box.type==='BOS' ? 'rgba(0,0,0,0.85)' : 'rgba(192,57,43,0.65)';
        lineW  = box.type==='BOS' ? 2 : 1;
      }

      // Mức giá bị phá vỡ (lưu trực tiếp trong box.breakPrice)
      const breakPrice = box.breakPrice;



      let yBreak;
      try { yBreak = chtSeries.priceToCoordinate(breakPrice); } catch(e) { return; }
      if (yBreak == null) return;

      // Vẽ đường ngang từ x1 (nến pivot) đến x2 (nến break)
      ctx.beginPath();
      ctx.moveTo(x1, yBreak);
      ctx.lineTo(x2, yBreak);
      ctx.strokeStyle = stroke;
      ctx.lineWidth   = lineW;
      ctx.setLineDash([]);
      ctx.stroke();

      // Label nhỏ tại điểm kết thúc
      if (Math.abs(w) > 20) {
        ctx.font      = 'bold 9px sans-serif';
        ctx.fillStyle = stroke;
        ctx.fillText(box.type, x2 + 3, yBreak + 3);
      }
    });

    // ── Vẽ Order Setup boxes ──────────────────────────────
    const showOrder  = document.getElementById('ms55-show-order')?.checked !== false;
    const showBuyBox  = document.getElementById('ms55-show-buy')?.checked !== false;
    const showSellBox = document.getElementById('ms55-show-sell')?.checked !== false;
    const rrRatio    = parseFloat(document.getElementById('ms55-rr')?.value)    || 2;
    const extendBars = parseInt(document.getElementById('ms55-extend')?.value)  || 20;
    const slPadPts   = parseFloat(document.getElementById('ms55-sl-pad')?.value) || 0;
    // 1 point = 0.00001 cho 5-digit pairs; tự detect pip size từ entry nếu có
    const slPad = slPadPts * 0.00001;

    if (showOrder && chtAllCandles && chtAllCandles.length) {
      const allCandles = chtAllCandles;
      // Tính pixel-per-bar từ scale
      let barW = 6;
      try {
        const range = tsScale.getVisibleRange();
        if (range) {
          const x_a = tsScale.timeToCoordinate(range.from);
          const x_b = tsScale.timeToCoordinate(range.to);
          const visCandles = allCandles.filter(c => c.time >= range.from && c.time <= range.to);
          if (visCandles.length > 1) barW = Math.abs(x_b - x_a) / visCandles.length;
        }
      } catch(e) {}

      const orderBoxes = toShow.filter(b => b.kind === 'order');
      orderBoxes.forEach(ob => {
        if (ob.dir === 'buy'  && !showBuyBox)  return;
        if (ob.dir === 'sell' && !showSellBox) return;

        // Tìm time của bar (barIdx + extendBars) — cần map barIdx → time
        const trigCandle = allCandles[ob.barIdx];
        if (!trigCandle) return;

        // x start = nến limit chạm, x end = +extend bars
        let xStart, xEnd;
        try {
          xStart = tsScale.timeToCoordinate(trigCandle.time);
          const endIdx = Math.min(ob.barIdx + extendBars, allCandles.length - 1);
          xEnd   = tsScale.timeToCoordinate(allCandles[endIdx].time);
        } catch(e) { return; }
        if (xStart == null || xEnd == null) return;
        if (xEnd < 0 || xStart > canvas.width) return;

        const dist = ob.dir === 'buy'
          ? (ob.entry - ob.sl) + slPad
          : (ob.sl    - ob.entry) + slPad;
        if (dist <= 0) return;

        // ── Vẽ SL box ──
        const slTop    = ob.dir === 'buy' ? ob.entry        : ob.sl + slPad;
        const slBot    = ob.dir === 'buy' ? ob.sl - slPad   : ob.entry;
        let ySLTop, ySLBot;
        try {
          ySLTop = chtSeries.priceToCoordinate(slTop);
          ySLBot = chtSeries.priceToCoordinate(slBot);
        } catch(e) { return; }
        if (ySLTop == null || ySLBot == null) return;

        ctx.fillStyle   = 'rgba(192,57,43,0.18)';
        ctx.strokeStyle = 'rgba(192,57,43,0.55)';
        ctx.lineWidth   = 1;
        ctx.setLineDash([3,3]);
        ctx.beginPath();
        ctx.rect(xStart, ySLTop, xEnd - xStart, ySLBot - ySLTop);
        ctx.fill(); ctx.stroke();
        ctx.setLineDash([]);
        // SL label
        ctx.font      = 'bold 9px sans-serif';
        ctx.fillStyle = 'rgba(192,57,43,0.9)';
        ctx.fillText('SL', xStart + 3, ySLBot - 3);

        // ── Vẽ TP boxes theo từng nấc ──
        const steps = Math.max(1, Math.floor(rrRatio));
        for (let s = 1; s <= steps; s++) {
          const tpBot = ob.dir === 'buy'
            ? ob.entry + dist * (s - 1)
            : ob.entry - dist * s;
          const tpTop = ob.dir === 'buy'
            ? ob.entry + dist * s
            : ob.entry - dist * (s - 1);

          let yTPTop, yTPBot;
          try {
            yTPTop = chtSeries.priceToCoordinate(tpTop);
            yTPBot = chtSeries.priceToCoordinate(tpBot);
          } catch(e) { continue; }
          if (yTPTop == null || yTPBot == null) continue;

          ctx.fillStyle   = ob.dir === 'buy' ? 'rgba(26,122,82,0.15)' : 'rgba(26,122,82,0.15)';
          ctx.strokeStyle = ob.dir === 'buy' ? 'rgba(26,122,82,0.50)' : 'rgba(26,122,82,0.50)';
          ctx.lineWidth   = 1;
          ctx.setLineDash([3,3]);
          ctx.beginPath();
          ctx.rect(xStart, yTPTop, xEnd - xStart, yTPBot - yTPTop);
          ctx.fill(); ctx.stroke();
          ctx.setLineDash([]);

          // TP label
          ctx.font      = 'bold 9px sans-serif';
          ctx.fillStyle = 'rgba(26,122,82,0.9)';
          const labelY = ob.dir === 'buy' ? yTPTop + 10 : yTPBot - 3;
          ctx.fillText('TP' + s, xStart + 3, labelY);
        }

        // Entry line
        let yEntry;
        try { yEntry = chtSeries.priceToCoordinate(ob.entry); } catch(e) { return; }
        if (yEntry == null) return;
        ctx.beginPath();
        ctx.moveTo(xStart, yEntry);
        ctx.lineTo(xEnd,   yEntry);
        ctx.strokeStyle = ob.dir === 'buy' ? 'rgba(44,74,124,0.8)' : 'rgba(192,57,43,0.8)';
        ctx.lineWidth   = 1.5;
        ctx.setLineDash([4,3]);
        ctx.stroke();
        ctx.setLineDash([]);
      });
    }

    // ── Vẽ vạch Session ──────────────────────────────────
    const sessOn   = document.getElementById('ms55-session-on')?.checked;
    if (sessOn && chtAllCandles && chtAllCandles.length) {
      const sfVal = document.getElementById('ms55-session-from')?.value || '07:00';
      const stVal = document.getElementById('ms55-session-to')?.value   || '23:30';
      const [sfH2, sfM2] = sfVal.split(':').map(Number);
      const [stH2, stM2] = stVal.split(':').map(Number);
      const sfSec = (sfH2*60 + (sfM2||0)) * 60;
      const stSec = (stH2*60 + (stM2||0)) * 60;

      const visRange = tsScale.getVisibleRange();
      if (visRange) {
        const allC = chtAllCandles;
        const seen = new Set();
        allC.forEach(c => {
          if (c.time < visRange.from - 86400 || c.time > visRange.to + 86400) return;
          const d = new Date(c.time * 1000);
          const dayKey = `${d.getUTCFullYear()}-${d.getUTCMonth()}-${d.getUTCDate()}`;
          if (seen.has(dayKey)) return;
          seen.add(dayKey);

          const midnight = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()) / 1000;
          const tFrom = midnight + sfSec;
          const tTo   = stSec < 86400 ? midnight + stSec : midnight + 86400;

          let xFrom, xTo;
          try { xFrom = tsScale.timeToCoordinate(tFrom); } catch(e) { return; }
          try { xTo   = tsScale.timeToCoordinate(tTo);   } catch(e) { return; }

          // Clamp to canvas
          const xF = Math.max(xFrom ?? -1, 0);
          const xT = Math.min(xTo   ?? canvas.width + 1, canvas.width);

          // ── Nền mờ trong session ──
          if (xFrom != null && xTo != null && xTo > xFrom) {
            ctx.fillStyle = 'rgba(220,53,69,0.05)';
            ctx.fillRect(xF, 0, xT - xF, canvas.height);
            // Viền trên
            ctx.fillStyle = 'rgba(220,53,69,0.25)';
            ctx.fillRect(xF, 0, xT - xF, 2);
          }

          // ── Vạch dọc từ + to ──
          [[xFrom, tFrom, sfVal], [xTo, tTo, stSec >= 86400 ? '00:00' : stVal]].forEach(([x, , label]) => {
            if (x == null || x < -2 || x > canvas.width + 2) return;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.strokeStyle = 'rgba(220,53,69,0.55)';
            ctx.lineWidth   = 1.5;
            ctx.setLineDash([6, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.font      = 'bold 9px sans-serif';
            ctx.fillStyle = 'rgba(220,53,69,0.8)';
            ctx.fillText(label, x + 3, 20);
            ctx.restore();
          });
        });
      }
    }
  });
}

function ms55DestroyCanvas() {
  if (ms55Canvas) { ms55Canvas.remove(); ms55Canvas = null; }
  cancelAnimationFrame(ms55RAF);
  ms55Active = false;
  if (ms55DrawBound && chtChart) {
    try { chtChart.timeScale().unsubscribeVisibleTimeRangeChange(ms55DrawBound); } catch(e) {}
    try { chtChart.unsubscribeCrosshairMove(ms55DrawBound); } catch(e) {}
  }
  ms55DrawBound = null;
}

// ── Main compute ───────────────────────────────────────
window.ms55Compute = function() {
  const candles = chtAllCandles;
  if (!candles || candles.length < 20) {
    document.getElementById('ms55-status').textContent = '';
    ms55DestroyCanvas();
    return;
  }

  const L = Math.max(1, parseInt(document.getElementById('ms55-left')?.value)||5);
  const R = Math.max(1, parseInt(document.getElementById('ms55-right')?.value)||5);
  window._ms55LimitBars = Math.max(1, parseInt(document.getElementById('ms55-limit-bars')?.value)||5);
  ms55Boxes = ms55BuildBoxes(candles, L, R, window._ms55LimitBars);

  const signalBoxes = ms55Boxes.filter(b => b.kind !== 'order');
  const bosUp   = signalBoxes.filter(b=>b.type==='BOS'  &&b.dir==='up').length;
  const bosDn   = signalBoxes.filter(b=>b.type==='BOS'  &&b.dir==='dn').length;
  const chUp    = signalBoxes.filter(b=>b.type==='CHOCH'&&b.dir==='up').length;
  const chDn    = signalBoxes.filter(b=>b.type==='CHOCH'&&b.dir==='dn').length;
  const last    = signalBoxes[signalBoxes.length-1]||null;

  document.getElementById('ms55-status').textContent =
    `${candles.length} nến · ${signalBoxes.length} boxes  BOS↑${bosUp}↓${bosDn}  CHOCH↑${chUp}↓${chDn}`;

  function fmtT(u){const d=new Date(u*1000);return`${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')} ${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}`;}



  // ── Order stats ──────────────────────────────────────────
  const sessionOn   = document.getElementById('ms55-session-on')?.checked;
  const sessionFrom = document.getElementById('ms55-session-from')?.value || '00:00';
  const sessionTo   = document.getElementById('ms55-session-to')?.value   || '24:00';
  const [sfH, sfM]  = sessionFrom.split(':').map(Number);
  const [stH, stM]  = sessionTo.split(':').map(Number);
  const sfMin = sfH * 60 + (sfM||0);
  const stMin = stH * 60 + (stM||0);   // 24:00 → 1440

  const showBuyStat  = document.getElementById('ms55-show-buy')?.checked !== false;
  const showSellStat = document.getElementById('ms55-show-sell')?.checked !== false;

  const orderBoxes = ms55Boxes.filter(b => {
    if (b.kind !== 'order') return false;
    if (b.dir === 'buy'  && !showBuyStat)  return false;
    if (b.dir === 'sell' && !showSellStat) return false;
    if (!sessionOn) return true;
    const d   = new Date(b.time * 1000);
    const min = d.getUTCHours() * 60 + d.getUTCMinutes();
    return min >= sfMin && min < stMin;
  });
  const rrVal      = parseFloat(document.getElementById('ms55-rr')?.value) || 2;
  const slPadPts2  = parseFloat(document.getElementById('ms55-sl-pad')?.value) || 0;
  const slPad2     = slPadPts2 * 0.00001;

  let buyTotal=0, sellTotal=0;
  const tpHits   = {};   // tpHits[s] = count
  const steps2   = Math.max(1, Math.floor(rrVal));
  for (let s=1;s<=steps2;s++) tpHits[s]=0;
  let slHitBuy=0, slHitSell=0;
  let beHitBuy=0, beHitSell=0;  // BE: đạt TP1 rồi quay về entry

  orderBoxes.forEach(ob => {
    const dist = ob.dir==='buy' ? (ob.entry - ob.sl)+slPad2 : (ob.sl - ob.entry)+slPad2;
    if (dist<=0) return;
    if (ob.dir==='buy')  buyTotal++;
    else                 sellTotal++;

    // Check nến sau trigger đến hết candles
    const startI = ob.barIdx + 1;
    let slPrice  = ob.dir==='buy' ? ob.sl - slPad2 : ob.sl + slPad2;
    let hitSL=false;
    const tpPrices = [];
    for (let s=1;s<=steps2;s++) {
      tpPrices.push(ob.dir==='buy' ? ob.entry+dist*s : ob.entry-dist*s);
    }
    const tpReached = new Array(steps2).fill(false);
    let tp1Reached = false;  // đã đạt RR 1:1
    let hitBE = false;       // sau TP1 quay về entry

    for (let k=startI; k<candles.length && k<startI+200; k++) {
      const ck = candles[k];
      if (ob.dir==='buy') {
        // Nếu đã đạt TP1 → SL được dời về entry (BE), check giá chạm entry
        if (tp1Reached) {
          if (ck.low <= ob.entry) { hitBE = true; break; }
        } else {
          if (ck.low <= slPrice) { hitSL=true; break; }
        }
        for (let s=0;s<steps2;s++) {
          if (!tpReached[s] && ck.high >= tpPrices[s]) {
            tpReached[s]=true;
            if (s===0) tp1Reached = true;  // TP1 đã đạt
          }
        }
      } else {
        if (tp1Reached) {
          if (ck.high >= ob.entry) { hitBE = true; break; }
        } else {
          if (ck.high >= slPrice) { hitSL=true; break; }
        }
        for (let s=0;s<steps2;s++) {
          if (!tpReached[s] && ck.low <= tpPrices[s]) {
            tpReached[s]=true;
            if (s===0) tp1Reached = true;
          }
        }
      }
    }
    if (hitSL) { if(ob.dir==='buy') slHitBuy++; else slHitSell++; }
    if (hitBE) { if(ob.dir==='buy') beHitBuy++; else beHitSell++; }
    tpReached.forEach((hit,i)=>{ if(hit) tpHits[i+1]++; });
  });

  const totalOrders = buyTotal+sellTotal;
  const totalSLHit  = slHitBuy+slHitSell;
  const totalBEHit  = beHitBuy+beHitSell;
  const tpRows = Array.from({length:steps2},(_,i)=>{
    const s=i+1;
    const pct = totalOrders ? (tpHits[s]/totalOrders*100).toFixed(0) : 0;
    return `<div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:0.65rem;color:#1a7a52;font-weight:600;min-width:36px;">TP${s}</span>
      <div style="flex:1;background:var(--border);border-radius:3px;height:7px;overflow:hidden;">
        <div style="width:${pct}%;background:#1a7a52;height:100%;border-radius:3px;"></div></div>
      <span style="font-size:0.65rem;font-weight:700;color:#1a7a52;min-width:70px;text-align:right">${tpHits[s]}/${totalOrders} (${pct}%)</span>
    </div>`;
  }).join('');
  const slPct = totalOrders ? (totalSLHit/totalOrders*100).toFixed(0) : 0;
  const bePct = totalOrders ? (totalBEHit/totalOrders*100).toFixed(0) : 0;

  document.getElementById('ms55-order-stats').style.display = totalOrders ? '' : 'none';
  document.getElementById('ms55-order-stats').innerHTML = totalOrders ? `
    <div style="border:1px solid var(--border);border-radius:6px;padding:10px 14px;background:var(--surface);">
      <div style="font-size:0.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:8px;">Thống kê lệnh Order Setup${sessionOn ? ` <span style="font-weight:400;letter-spacing:0;text-transform:none;color:var(--blue);">(Session ${sessionFrom}–${sessionTo} UTC)</span>` : ''}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;">
        <div style="text-align:center;padding:6px;background:var(--bg);border-radius:4px;">
          <div style="font-size:0.6rem;color:var(--muted);margin-bottom:2px;">Tổng lệnh</div>
          <div style="font-size:1.1rem;font-weight:700;color:var(--ink);">${totalOrders}</div>
          <div style="font-size:0.58rem;color:var(--muted);">BUY ${buyTotal} · SELL ${sellTotal}</div>
        </div>
        <div style="text-align:center;padding:6px;background:var(--bg);border-radius:4px;">
          <div style="font-size:0.6rem;color:var(--muted);margin-bottom:2px;">Hit SL</div>
          <div style="font-size:1.1rem;font-weight:700;color:var(--red);">${totalSLHit} <span style="font-size:0.7rem;font-weight:400;">(${slPct}%)</span></div>
          <div style="font-size:0.58rem;color:var(--muted);">B${slHitBuy} · S${slHitSell}</div>
        </div>
        <div style="text-align:center;padding:6px;background:#fffbf0;border-radius:4px;border:1px solid #e8d88a;">
          <div style="font-size:0.6rem;color:#7a6a1a;margin-bottom:2px;">BE (≥TP1→Entry)</div>
          <div style="font-size:1.1rem;font-weight:700;color:#b8860b;">${totalBEHit} <span style="font-size:0.7rem;font-weight:400;">(${bePct}%)</span></div>
          <div style="font-size:0.58rem;color:#7a6a1a;">B${beHitBuy} · S${beHitSell}</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        ${tpRows}
        <div style="display:flex;align-items:center;gap:8px;margin-top:2px;">
          <span style="font-size:0.65rem;color:#b8860b;font-weight:600;min-width:36px;">BE</span>
          <div style="flex:1;background:var(--border);border-radius:3px;height:7px;overflow:hidden;">
            <div style="width:${bePct}%;background:#b8860b;height:100%;border-radius:3px;"></div></div>
          <span style="font-size:0.65rem;font-weight:700;color:#b8860b;min-width:70px;text-align:right">${totalBEHit}/${totalOrders} (${bePct}%)</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:2px;">
          <span style="font-size:0.65rem;color:var(--red);font-weight:600;min-width:36px;">SL</span>
          <div style="flex:1;background:var(--border);border-radius:3px;height:7px;overflow:hidden;">
            <div style="width:${slPct}%;background:#c0392b;height:100%;border-radius:3px;"></div></div>
          <span style="font-size:0.65rem;font-weight:700;color:var(--red);min-width:70px;text-align:right">${totalSLHit}/${totalOrders} (${slPct}%)</span>
        </div>
      </div>
    </div>` : '';

  // Vẽ lên chart
  if (!ms55Active) {
    ms55CreateCanvas();
    ms55Active    = true;
    ms55DrawBound = ms55DrawBoxes;
    chtChart.timeScale().subscribeVisibleTimeRangeChange(ms55DrawBound);
    chtChart.subscribeCrosshairMove(ms55DrawBound);
  }
  ms55DrawBoxes();
};

// Toggle
// Toggle order controls visibility
document.addEventListener('DOMContentLoaded', () => {
  const orderChk = document.getElementById('ms55-show-order');
  const orderCtrl = document.getElementById('ms55-order-controls');
  if (orderChk && orderCtrl) {
    orderChk.addEventListener('change', () => {
      orderCtrl.style.opacity = orderChk.checked ? '1' : '0.4';
      ms55DrawBoxes();
    });
  }
  // Session filter — toggle time inputs enabled/disabled
  const sessionChk  = document.getElementById('ms55-session-on');
  const sessionFrEl = document.getElementById('ms55-session-from');
  const sessionToEl = document.getElementById('ms55-session-to');
  function ms55UpdateSessionUI() {
    const on = sessionChk?.checked;
    [sessionFrEl, sessionToEl].forEach(el => {
      if (!el) return;
      el.style.opacity       = on ? '1' : '0.4';
      el.style.pointerEvents = on ? '' : 'none';
    });
  }
  sessionChk?.addEventListener('change', () => { ms55UpdateSessionUI(); ms55Compute(); });
  sessionFrEl?.addEventListener('change', () => ms55Compute());
  sessionToEl?.addEventListener('change', () => ms55Compute());

  // RR và SL Pad ảnh hưởng thống kê → cần tính lại toàn bộ
  ['ms55-rr','ms55-sl-pad'].forEach(id => {
    document.getElementById(id)?.addEventListener('change', () => ms55Compute());
  });
  // Các control còn lại chỉ cần vẽ lại chart
  ['ms55-limit-bars','ms55-extend'].forEach(id => {
    document.getElementById(id)?.addEventListener('change', () => ms55DrawBoxes());
  });
  ['ms55-show-buy','ms55-show-sell'].forEach(id => {
    document.getElementById(id)?.addEventListener('change', () => ms55Compute());
  });
});

window.ms55Toggle = function() {
  const panel = document.getElementById('ms55-panel');
  const btn   = document.getElementById('cht-ms55-btn');
  const isOn  = panel.style.display !== 'none';
  if (isOn) {
    panel.style.display   = 'none';
    btn.style.background  = 'var(--surface)';
    btn.style.color       = 'var(--muted)';
    btn.style.borderColor = 'var(--border-dark)';
    ms55DestroyCanvas();
  } else {
    panel.style.display   = '';
    btn.style.background  = 'var(--ink)';
    btn.style.color       = '#fff';
    btn.style.borderColor = 'var(--ink)';
    window.ms55Compute();
  }
};

// ms55 được trigger trực tiếp từ chtRenderTF và chtLoad — không cần hook ở đây


})();

</script>
